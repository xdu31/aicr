# Language Versions
# Go toolchain version is owned by .go-version (single source of truth).
# Makefile, CI workflows, and validator Dockerfiles all read from there.

# Build Tools
build_tools:
  # renovate: datasource=github-releases depName=goreleaser/goreleaser depType=build_tools
  goreleaser: 'v2.16.0'
  # renovate: datasource=github-releases depName=ko-build/ko depType=build_tools
  ko: 'v0.18.1'
  # renovate: datasource=github-releases depName=google/go-containerregistry depType=build_tools
  crane: 'v0.21.6'
  # renovate: datasource=github-releases depName=orhun/git-cliff depType=build_tools
  git_cliff: '2.13.1'

# Linting
linting:
  # renovate: datasource=github-releases depName=golangci/golangci-lint depType=linting
  golangci_lint: 'v2.12.2'
  # renovate: datasource=pypi depName=yamllint depType=linting
  yamllint: '1.38.0'
  # renovate: datasource=github-releases depName=google/addlicense depType=linting
  addlicense: 'v1.2.0'
  # renovate: datasource=github-releases depName=google/go-licenses depType=linting
  go_licenses: 'v2.0.1'

# Security Tools
security_tools:
  # renovate: datasource=github-releases depName=anchore/grype depType=security_tools
  grype: 'v0.112.0'
  # renovate: datasource=github-releases depName=sigstore/cosign depType=security_tools
  cosign: 'v3.0.6'
  # renovate: datasource=github-releases depName=anchore/syft depType=security_tools
  syft: 'v1.44.0'

# E2E Testing Tools
testing_tools:
  # renovate: datasource=github-releases depName=kubernetes/kubernetes depType=testing_tools
  kubectl: 'v1.36.1'
  # renovate: datasource=github-releases depName=kubernetes-sigs/kind depType=testing_tools
  kind: '0.31.0'
  # renovate-digest: datasource=git-refs depName=nvkind packageName=https://github.com/NVIDIA/nvkind branch=main depType=testing_tools
  nvkind: '56db9be854036c2f5a0133e3ccb0990e13ea9e6c'
  # renovate: datasource=github-releases depName=tilt-dev/ctlptl depType=testing_tools
  ctlptl: '0.9.3'
  # renovate: datasource=github-releases depName=tilt-dev/tilt depType=testing_tools
  tilt: '0.37.3'
  # renovate: datasource=github-releases depName=helm/helm depType=testing_tools
  helm: 'v4.2.0'
  # renovate: datasource=github-releases depName=helmfile/helmfile depType=testing_tools
  helmfile: 'v1.5.2'
  # helmfile_checksums are refreshed automatically by tools/update-helmfile-checksums
  # via Renovate postUpgradeTasks whenever the helmfile version above is bumped.
  helmfile_checksums:
    linux_amd64: '96e342ff19a45c2e36371f93cf6264f3ef285bbde0fc363e56cb53bdef3df1ff'
    linux_arm64: '4488ca172141a2ad563ac99fffdd8f4761620b40e8e7878ab3fd0e436d4ec057'
    darwin_amd64: '1f3a84c4772ca475165b93b7da0b507808df809f41d08033627184b9e6dc75c4'
    darwin_arm64: '55e22265177e3d21fcf5a5dfed51f7deaf9c4f6bd460f3961263ebefd428579f'
  # renovate: datasource=github-releases depName=kubernetes-sigs/kwok depType=testing_tools
  kwok: 'v0.7.0'
  # renovate: datasource=github-releases depName=kyverno/chainsaw depType=testing_tools
  chainsaw: 'v0.2.15'
  # chainsaw_checksums are refreshed automatically by tools/update-chainsaw-checksums
  # via Renovate postUpgradeTasks whenever the chainsaw version above is bumped.
  chainsaw_checksums:
    linux_amd64: '295d226c89f126c0a97775d364be149f47a810c8a3f9829ee410583d0c1abe3c'
    linux_arm64: 'fecf5f3ea74d11da2cd5d95a4c016d5d2543cbc4844ce21adf5e727e7ffd9e44'
    darwin_amd64: 'ddb56002ff8c6265f55ec40c82eb0ef0dddec5127dd12d4fc5e7953453481f4b'
    darwin_arm64: '502bef17dd822217e82590e9ccf01c1e26a56b3fa34a835789b9af73e82a169a'
  # renovate: datasource=github-releases depName=mikefarah/yq depType=testing_tools
  yq: 'v4.53.2'
  # renovate: datasource=github-releases depName=kubernetes-sigs/karpenter depType=testing_tools
  karpenter: 'v1.12.1'
  # In-cluster OCI registry for KWOK deployer-matrix CI (issue #843).
  # renovate: datasource=docker depName=registry depType=testing_tools
  registry_image: 'registry:3.1.1'
  # Argo CD Helm chart for KWOK deployer-matrix CI. v9.5.x pins app v3.4.x,
  # the first stable line with native OCI artifact source (issue #843).
  # renovate: datasource=helm depName=argo-cd registryUrl=https://argoproj.github.io/argo-helm depType=testing_tools
  argocd_chart: '9.5.14'
  # Flux 2 release for KWOK deployer-matrix CI flux-oci lane (issue #843).
  # install.yaml is downloaded from the GitHub release; source-controller,
  # kustomize-controller and helm-controller are the only controllers the
  # bundle consumes (OCIRepository -> Kustomization -> HelmRelease).
  # renovate: datasource=github-releases depName=fluxcd/flux2 depType=testing_tools
  flux_version: 'v2.8.8'
  # renovate: datasource=github-releases depName=hauler-dev/hauler depType=testing_tools
  hauler: 'v1.4.3'
  # renovate: datasource=github-releases depName=zarf-dev/zarf depType=testing_tools
  zarf: 'v0.77.0'
# Quality Thresholds
quality:
  coverage_threshold: '75'
  lint_timeout: '10m'
  test_timeout: '10m'

# Build Configuration
build:
  image_registry: 'ghcr.io/nvidia'

# Testing Configuration
testing:
  # renovate: datasource=docker depName=kindest/node depType=testing
  kind_node_image: 'kindest/node:v1.36.1'
  # renovate: datasource=docker depName=kindest/node depType=testing
  h100_kind_node_image: 'kindest/node:v1.36.1'

  # GPU CI runtime pins consumed through .github/actions/load-versions.
  # renovate: datasource=helm depName=gpu-operator depType=testing
  gpu_operator_chart_version: 'v25.10.1'
  # renovate: datasource=docker depName=nvcr.io/nvidia/cuda depType=testing
  snapshot_agent_cuda_image: 'nvcr.io/nvidia/cuda:13.1.0-base-ubuntu24.04'

  # Component test harness configuration
  # Used by tools/component-test/ scripts to validate individual components
  component_test:
    nvml_mock_version: '0.1.0'
    nvml_mock_image: 'ghcr.io/nvidia/nvml-mock'
    default_gpu_profile: 'a100'
    default_gpu_count: 8
    cluster_name: 'aicr-component-test'
    helm_timeout: '300s'
    health_check_timeout: '5m'
