# resource.k8s.io/v1beta1 variant of resource-claim-template.yaml, for
# clusters whose newest served DRA version is v1beta1 (K8s 1.32/1.33 with
# custom validation catalogs; built-in recipes floor K8s 1.34). v1beta1's
# DeviceRequest carries deviceClassName/allocationMode/count INLINE — the
# `exactly:` wrapper exists only in v1beta2/v1.
# Must stay in sync with inferenceClaimTemplateName in inference_perf_constraint.go.

apiVersion: resource.k8s.io/v1beta1
kind: ResourceClaimTemplate
metadata:
  name: ${CLAIM_TEMPLATE_NAME}
  namespace: ${NAMESPACE}
spec:
  spec:
    devices:
      requests:
        - name: gpu
          deviceClassName: gpu.nvidia.com
          allocationMode: ExactCount
          count: 1
