# Dynamo inference workload for performance benchmarking.
# Deploys a vLLM aggregated backend with a small model for smoke testing.
# Worker replicas scale to match available GPUs (1 GPU per replica).
# Frontend-to-worker traffic uses Dynamo's request plane default (TCP). The
# local vLLM ZMQ KV-event publisher feeds the worker runtime, which relays
# KV-cache events onto the NATS-backed Dynamo event plane.
#
# Worker GPU wiring is MODE-DISPATCHED (capability-driven, issue #1327): on
# nodes with usable full-GPU DRA the workers bind a DRA ResourceClaimTemplate
# (kai-scheduler rejects scalar GPU requests on nodes bearing raw node-local GPU ResourceSlices);
# elsewhere they carry device-plugin nvidia.com/gpu limits, which need no
# gpu.nvidia.com DeviceClass.
#
# Pod scheduling (nodeSelector / tolerations / GPU wiring) is injected
# programmatically from Go (see applyInferenceWorkerScheduling in
# inference_perf_constraint.go) so taint values with YAML-special characters
# cannot break the template.

apiVersion: nvidia.com/v1beta1
kind: DynamoGraphDeployment
metadata:
  name: ${DEPLOYMENT_NAME}
  namespace: ${NAMESPACE}
spec:
  backendFramework: vllm
  components:
    - name: Frontend
      type: frontend
      replicas: 1
      podTemplate:
        spec:
          containers:
            - name: main
              image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.2.1
              env:
                - name: SERVED_MODEL_NAME
                  # Quoted so a scalar-looking model ID (e.g. a pure-numeric or
                  # boolean-like name that passes validateModelID) parses as a
                  # string, not int/bool/null, after ${MODEL} substitution.
                  value: "${MODEL}"
                # Least-loaded routing balances by each worker's active
                # in-flight load rather than KV-overlap, so a transiently-slow
                # worker stops receiving its full share. This mitigates the
                # stochastic EKS H100 worker-stall / throughput degradation at
                # the saturation knee (see issue #1197): capacity-blind and
                # KV-overlap routing both let a backed-up worker accumulate
                # requests, spiking TTFT p99 to 4-77s.
                - name: DYN_ROUTER_MODE
                  value: least-loaded
                - name: HF_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: aicr-hf-token
                      key: token
                      optional: true
                - name: HUGGING_FACE_HUB_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: aicr-hf-token
                      key: token
                      optional: true
    - name: VllmDecodeWorker
      type: worker
      replicas: ${GPU_COUNT}
      sharedMemorySize: 2Gi
      podTemplate:
        spec:
          containers:
            - name: main
              image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.2.1
              workingDir: /workspace/examples/backends/vllm
              command: ["python3", "-m", "dynamo.vllm"]
              args:
                - --model
                - "${MODEL}"
                - --kv-events-config
                - '{"enable_kv_cache_events":true,"publisher":"zmq","endpoint":"tcp://*:5557"}'
              env:
                - name: HF_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: aicr-hf-token
                      key: token
                      optional: true
                - name: HUGGING_FACE_HUB_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: aicr-hf-token
                      key: token
                      optional: true
