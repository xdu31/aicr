# Dynamo inference workload for performance benchmarking through GAIE/EPP.
# EPP performs KV-cache-aware endpoint selection and worker frontend sidecars
# run in direct mode so they honor EPP's routing headers. Direct mode is not
# the local ZMQ-to-NATS relay; the Dynamo worker runtime relays vLLM KV-cache
# events from the local ZMQ publisher onto the NATS-backed event plane.
#
# Worker GPU wiring is MODE-DISPATCHED (capability-driven, issue #1327): DRA
# ResourceClaimTemplate on nodes with usable full-GPU DRA, device-plugin
# nvidia.com/gpu limits elsewhere.
# Pod scheduling (nodeSelector / tolerations / GPU wiring) is injected
# programmatically from Go (see applyInferenceWorkerScheduling in
# inference_perf_constraint.go) so taint values with YAML-special characters
# cannot break the template.

apiVersion: nvidia.com/v1beta1
kind: DynamoGraphDeployment
metadata:
  name: ${DEPLOYMENT_NAME}
  namespace: ${NAMESPACE}
spec:
  backendFramework: vllm
  components:
    - name: Epp
      type: epp
      replicas: 1
      podTemplate:
        spec:
          containers:
            - name: main
              image: nvcr.io/nvidia/ai-dynamo/epp-image:1.2.1
              env:
                - name: DYN_KV_CACHE_BLOCK_SIZE
                  value: "128"
                - name: DYN_MODEL_NAME
                  # Quoted so a scalar-looking model ID parses as a string
                  # after ${MODEL} substitution.
                  value: "${MODEL}"
                - name: DYN_ENFORCE_DISAGG
                  value: "false"
                - name: HF_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: aicr-hf-token
                      key: token
                      optional: true
                - name: HUGGING_FACE_HUB_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: aicr-hf-token
                      key: token
                      optional: true
      eppConfig:
        config:
          plugins:
            - type: disagg-profile-handler
            - name: decode-filter
              type: label-filter
              parameters:
                label: nvidia.com/dynamo-component-type
                validValues:
                  - decode
                allowsNoLabel: true
            - name: picker
              type: max-score-picker
            - name: dyn-decode
              type: dyn-decode-scorer
          schedulingProfiles:
            - name: decode
              plugins:
                - pluginRef: decode-filter
                  weight: 1
                - pluginRef: dyn-decode
                  weight: 1
                - pluginRef: picker
                  weight: 1
    - name: VllmDecodeWorker
      type: decode
      replicas: ${GPU_COUNT}
      sharedMemorySize: 2Gi
      frontendSidecar: sidecar-frontend
      podTemplate:
        spec:
          containers:
            - name: main
              image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.2.1
              workingDir: /workspace/examples/backends/vllm
              command: ["python3", "-m", "dynamo.vllm"]
              args:
                - --model
                - "${MODEL}"
                - --served-model-name
                - "${MODEL}"
                - --enable-prefix-caching
                - --block-size
                - "128"
                - --kv-events-config
                - '{"enable_kv_cache_events":true}'
              env:
                - name: HF_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: aicr-hf-token
                      key: token
                      optional: true
                - name: HUGGING_FACE_HUB_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: aicr-hf-token
                      key: token
                      optional: true
            - name: sidecar-frontend
              image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.2.1
              args:
                - -m
                - dynamo.frontend
                - --router-mode
                - direct
              env:
                - name: HF_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: aicr-hf-token
                      key: token
                      optional: true
                - name: HUGGING_FACE_HUB_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: aicr-hf-token
                      key: token
                      optional: true
