# RoCE DRA ResourceClaimTemplate for the NCCL NET test (AICR_NCCL_FABRIC=roce).
#
# Requests ConnectX RoCE NICs from the AWS networking DRA driver's DeviceClass
# (roce.networking.k8s.aws, surfaced by aws-net-k8s-dra-plugin). The NCCL NET
# worker pod references this via resourceClaims. Applied as a standalone object
# by applyNCCLResources before the TrainingRuntime (parseYAMLTemplate is
# single-document). Count is templated to the per-node GPU count.
apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  name: nccl-roce-rct
  namespace: ${NAMESPACE}
spec:
  spec:
    devices:
      requests:
      - name: roce
        exactly:
          deviceClassName: roce.networking.k8s.aws
          count: ${ROCE_DEVICE_COUNT}
