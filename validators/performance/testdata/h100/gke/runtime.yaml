# GKE NCCL All-Reduce TrainingRuntime — TCPXO FastRak + a3-megagpu-8g.
#
# Full runtime with TCPXO sidecar, FastRak mpirun args, GKE multi-NIC
# and GPU device annotations, and a3-megagpu-8g node selector.
#
# TCPXO sidecar uses native sidecar pattern (initContainer + restartPolicy: Always)
# with NRI device injection (devices.gke.io annotation) instead of privileged mode.
#
# Prerequisite: GPU node pool must NOT have a gVNIC additional network.
# A gVNIC network takes a PCI slot, displacing one GPU NIC (7/8 detection).
# See https://github.com/NVIDIA/aicr/issues/381 for details.
#
# Must stay in sync with ncclTrainingRuntimeName in nccl_all_reduce_bw_constraint.go.

apiVersion: trainer.kubeflow.org/v1alpha1
kind: TrainingRuntime
metadata:
  name: nccl-all-reduce-runtime
  namespace: ${NAMESPACE}
  labels:
    trainer.kubeflow.org/framework: mpi
spec:
  mlPolicy:
    mpi:
      mpiImplementation: OpenMPI
      numProcPerNode: ${GPU_COUNT_PER_NODE}
      runLauncherAsNode: false
      sshAuthMountPath: /tmp/mpi-keys
  template:
    spec:
      network:
        enableDNSHostnames: true
        publishNotReadyAddresses: true
      replicatedJobs:
      - name: launcher
        replicas: 1
        template:
          spec:
            template:
              spec:
                tolerations:
                - operator: Exists
                initContainers:
                - name: fix-ssh-perms
                  image: nvcr.io/nvidia/pytorch:25.06-py3
                  command:
                  - /bin/sh
                  - -c
                  - |
                    set -x
                    mkdir -p /root/.ssh
                    cp /tmp/mpi-keys/id_rsa /root/.ssh/id_rsa
                    cp /tmp/mpi-keys/authorized_keys /root/.ssh/authorized_keys
                    chmod 700 /root/.ssh
                    chmod 600 /root/.ssh/id_rsa /root/.ssh/authorized_keys
                  volumeMounts:
                  - name: mpi-ssh-auth
                    mountPath: /tmp/mpi-keys
                    readOnly: true
                  - name: ssh-config
                    mountPath: /root/.ssh
                containers:
                - name: node
                  image: nvcr.io/nvidia/pytorch:25.06-py3
                  # On non-zero exit, kubelet captures the tail (~4KiB) of this
                  # container's own logs into pod status. The JobSet tears the
                  # launcher down within ~150ms of failure, so a post-mortem
                  # `kubectl logs`/GetPodLogs often races container GC and returns
                  # "unable to retrieve container logs"; this termination message
                  # lives in the pod object and survives that GC, giving the
                  # diagnostics a reliable fallback for the fatal mpirun/NCCL tail.
                  terminationMessagePolicy: FallbackToLogsOnError
                  env:
                  - name: LD_LIBRARY_PATH
                    value: "/usr/lib/x86_64-linux-gnu:/usr/local/nvidia/lib64:/usr/local/cuda/lib64"
                  # Wrap mpirun so the NCCL results rows land in the termination
                  # message on success — rotation-proof, unlike the streamed log.
                  # The NCCL/TCPXO teardown spam can rotate the results table out
                  # of the log segment GetPodLogs returns (issue #1712); the Go
                  # side appends this message so parseBandwidthFromLogs recovers
                  # the bandwidth. tee keeps live stdout intact; only the results
                  # rows (not the teardown) go to /dev/termination-log, under the
                  # ~4KiB kubelet cap. `bash -c '<script>' bash "$@"` runs the
                  # mpirun args below verbatim as positional params.
                  command:
                  - /bin/bash
                  - -c
                  - |
                    set -o pipefail
                    /usr/local/mpi/bin/mpirun "$@" 2>&1 | tee /tmp/nccl-results.out
                    rc=${PIPESTATUS[0]}
                    # Write results ONLY on success (rc==0). A partial-failure run
                    # can print early rows then abort; a non-empty termination file
                    # would suppress FallbackToLogsOnError's failure tail (#1651).
                    # Any failure leaves the file empty so kubelet uses the log tail.
                    # Data rows are "<size> <count> <type> ..."; the summary is
                    # "# Avg bus bandwidth"; teardown spam matches neither.
                    if [ "$rc" -eq 0 ]; then
                      pat='^[[:space:]]*[0-9]+[[:space:]]+[0-9]+[[:space:]]+[[:alpha:]]+|Avg bus bandwidth'
                      grep -E "$pat" /tmp/nccl-results.out 2>/dev/null | tail -c 3900 > /dev/termination-log 2>/dev/null || true
                    fi
                    exit "$rc"
                  - bash
                  args:
                  - -np
                  - "${GPU_COUNT}"
                  - --allow-run-as-root
                  - --mca
                  - plm_rsh_args
                  # Worker "node" pods install openssh-server and source the
                  # TCPXO env profile at container start before sshd comes up,
                  # so on freshly provisioned nodes sshd can lag the launcher by
                  # minutes. mpirun's rsh IS the retry loop here: while sshd is
                  # not listening the port is refused, so ssh retries ~1s apart
                  # (ConnectTimeout only bounds the unreachable-IP case, not a
                  # refusal), making the real ceiling ~= ConnectionAttempts
                  # seconds. Size it to ~5 min so a slow worker bring-up retries
                  # instead of aborting the launcher. Note: if a worker IP is
                  # instead unreachable (never scheduled, NetworkPolicy drop),
                  # each attempt burns the full ConnectTimeout (~11s), so 300
                  # attempts could run ~55 min — but the outer NCCLTrainJobTimeout
                  # (30 min) bounds that path, which then surfaces as a wait
                  # timeout rather than an mpirun abort. Keep the two timeouts in
                  # mind together before changing either.
                  - -o StrictHostKeyChecking=no -o ConnectTimeout=10 -o ConnectionAttempts=300
                  # Restrict MPI OOB and UCX to control NIC — without hostNetwork,
                  # eth0 is the default/control NIC, eth1-eth8 are GPU NICs.
                  - --mca
                  - oob_tcp_if_include
                  - eth0
                  - --mca
                  - btl_tcp_if_include
                  - eth0
                  - -x
                  - UCX_NET_DEVICES=eth0
                  # NCCL tuning variables are NOT hardcoded here. Workers source
                  # nccl-env-profile.sh from the host (installed by nccl-tcpxo-installer
                  # DaemonSet) and export NCCL_*/CUDA_* vars via ~/.ssh/environment
                  # so values always match the installed TCPXO version.
                  #
                  # The following vars are NOT in the profile (it assumes privileged
                  # mode where FastRak discovers devices automatically). They are
                  # set explicitly for compatibility with non-privileged environments.
                  - -x
                  - LD_LIBRARY_PATH=/usr/lib/x86_64-linux-gnu:/usr/local/nvidia/lib64
                  # WARN (reverted from #1647's INFO): at INFO the NCCL/TCPXO
                  # teardown emits tens of thousands of NET/FasTrak lines that
                  # overflow kubelet's containerLogMaxSize and rotate the results
                  # table out of the retrievable log (#1712). The RxDM/gVNIC failure
                  # that motivated INFO is resolved; results are now captured
                  # rotation-proof via the termination message (#1713), and #1651's
                  # FallbackToLogsOnError still surfaces the failure tail. To debug a
                  # new FastRak/TCPXO connection failure, re-enable INFO ad hoc:
                  #   -x NCCL_DEBUG=INFO -x NCCL_DEBUG_SUBSYS=INIT,NET,ENV,GRAPH
                  - -x
                  - NCCL_DEBUG=WARN
                  - -x
                  - NCCL_FASTRAK_LLCM_DEVICE_DIRECTORY=/dev/aperture_devices
                  - -x
                  - NCCL_DYNAMIC_CHUNK_SIZE=524288
                  - -x
                  - CUDA_DEVICE_MAX_CONNECTIONS=1
                  - /usr/local/bin/${TEST_TYPE}_mpi
                  - -b
                  - ${MIN_MESSAGE_SIZE}
                  - -e
                  - ${MAX_MESSAGE_SIZE}
                  - -f
                  - "2"
                  - -g
                  - "1"
                  resources:
                    limits:
                      cpu: "2"
                      memory: 128Mi
                  volumeMounts:
                  - name: ssh-config
                    mountPath: /root/.ssh
                volumes:
                - name: ssh-config
                  emptyDir: {}
      - name: node
        template:
          spec:
            template:
              metadata:
                annotations:
                  # NRI device injection: expose GPU and DMA devices to the tcpxo-daemon
                  # sidecar without requiring privileged mode. Device list is generated
                  # by buildNRIDeviceAnnotation() based on GPU count per node.
                  devices.gke.io/container.tcpxo-daemon: |
                    ${NRI_DEVICE_ANNOTATION}
                  # Multi-NIC for 8 GPU NICs (GPUDirect TCPXO).
                  # Network names are cluster-specific (e.g., "aicr-demo2-gpu-nic-0");
                  # discovered at runtime by discoverGKEGPUNICNetworks().
                  networking.gke.io/default-interface: eth0
                  networking.gke.io/interfaces: '${GKE_NETWORK_INTERFACES}'
              spec:
                initContainers:
                # TCPXO FastRak native sidecar — runs fastrak_gpumem_manager
                # alongside the worker. Uses NRI device injection (devices.gke.io
                # annotation) for GPU device access instead of privileged mode.
                - name: tcpxo-daemon
                  image: us-docker.pkg.dev/gce-ai-infra/gpudirect-tcpxo/tcpgpudmarxd-dev:v1.0.20
                  imagePullPolicy: Always
                  restartPolicy: Always
                  command: ["/bin/sh", "-c"]
                  args:
                  - |
                    set -ex
                    chmod 755 /fts/entrypoint_rxdm_container.sh
                    /fts/entrypoint_rxdm_container.sh --num_hops=2 --num_nics ${GPU_COUNT_PER_NODE}
                  securityContext:
                    capabilities:
                      add: ["NET_ADMIN", "NET_BIND_SERVICE"]
                  volumeMounts:
                  - name: nvtcpxo-libraries
                    mountPath: /usr/local/nvidia
                    readOnly: true
                  - name: nvtcpxo-sys
                    mountPath: /hostsysfs
                  - name: nvtcpxo-proc-sys
                    mountPath: /hostprocsysfs
                  env:
                  - name: LD_LIBRARY_PATH
                    value: "/usr/local/nvidia/lib64"
                containers:
                - name: node
                  image: nvcr.io/nvidia/pytorch:25.06-py3
                  command: ["sh", "-c"]
                  args:
                  - |
                    set -x &&
                    apt-get update &&
                    apt-get install -y --no-install-recommends openssh-server  &&
                    mkdir -p /var/run/sshd  &&
                    chmod 0755 /var/run/sshd  &&
                    mkdir -p /root/.ssh &&
                    chmod 700 /root/.ssh &&
                    cp /tmp/mpi-keys/* /root/.ssh/ &&
                    chmod 600 /root/.ssh/id_rsa &&
                    chmod 644 /root/.ssh/id_rsa.pub /root/.ssh/authorized_keys &&
                    NCCL_LIB_DIR=/usr/local/nvidia/lib64 . /usr/local/nvidia/lib64/nccl-env-profile.sh &&
                    env | grep -E '^NCCL_|^CUDA_' > /root/.ssh/environment &&
                    echo "PermitUserEnvironment yes" >> /etc/ssh/sshd_config &&
                    /usr/sbin/sshd -De
                  resources:
                    limits:
                      nvidia.com/gpu: ${GPU_COUNT_PER_NODE}
                    requests:
                      nvidia.com/gpu: ${GPU_COUNT_PER_NODE}
                  securityContext:
                    capabilities:
                      add: ["IPC_LOCK"]
                  volumeMounts:
                  - name: dshm
                    mountPath: /dev/shm
                  - name: nvtcpxo-libraries
                    mountPath: /usr/local/nvidia
                    readOnly: true
                  - name: nvtcpxo-aperture-devices
                    mountPath: /dev/aperture_devices
                volumes:
                - name: dshm
                  emptyDir:
                    medium: Memory
                - name: nvtcpxo-libraries
                  hostPath:
                    path: /home/kubernetes/bin/nvidia
                - name: nvtcpxo-sys
                  hostPath:
                    path: /sys
                - name: nvtcpxo-proc-sys
                  hostPath:
                    path: /proc/sys
                - name: nvtcpxo-aperture-devices
                  hostPath:
                    path: /dev/aperture_devices
      successPolicy:
        operator: All
        targetReplicatedJobs:
        - launcher
