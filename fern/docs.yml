instances:
  - url: aicr.docs.buildwithfern.com/aicr
    custom-domain: docs.nvidia.com/aicr
    multi-source: true
title: NVIDIA AI Cluster Runtime
global-theme: nvidia
metadata:
  canonical-host: "docs.nvidia.com/aicr"
products:
  - display-name: AI Cluster Runtime
    slug: /
    path: ../docs/index.yml
    versions:
      # display-name is stamped by publish-fern-docs.yml at publish time
      - display-name: "Latest"
        path: ../docs/index.yml
        slug: latest
        availability: stable
      - display-name: v0.17.0
        path: versions/v0.17.0.yml
        slug: v0.17.0
        availability: stable
      - display-name: v0.16.0
        path: versions/v0.16.0.yml
        slug: v0.16.0
        availability: stable
      - display-name: v0.15.0
        path: versions/v0.15.0.yml
        slug: v0.15.0
        availability: stable
redirects:
  - source: "/aicr/index.html"
    destination: "/aicr/"
logo:
  href: /aicr
  right-text: AI Cluster Runtime
navbar-links:
  - type: github
    value: https://github.com/NVIDIA/aicr
