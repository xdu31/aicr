# Example recipe demonstrating multi-phase validation configuration
# This shows how to configure validation checks for different deployment phases

kind: RecipeResult
apiVersion: aicr.nvidia.com/v1alpha1
metadata:
  version: dev
  appliedOverlays:
    - base
    - eks
    - eks-training
    - gb200-eks-training
    - gb200-eks-ubuntu-training

criteria:
  service: eks
  accelerator: gb200
  intent: training
  os: ubuntu

# Constraints validated during readiness phase
constraints:
  - name: K8s.server.version
    value: '>= 1.32.4'
    severity: error
    remediation: "Upgrade Kubernetes to version 1.32.4 or later"
  - name: OS.release.ID
    value: ubuntu
    severity: error
    remediation: "Use Ubuntu as the operating system"
  - name: OS.release.VERSION_ID
    value: "24.04"
    severity: warning
    remediation: "Ubuntu 24.04 is recommended for optimal compatibility"
  - name: OS.sysctl./proc/sys/kernel/osrelease
    value: '>= 6.8'
    severity: error
    remediation: "Upgrade kernel to version 6.8 or later"

# Multi-phase validation configuration
validation:
  # Readiness phase: Constraint-only gate (evaluated inline from snapshot, no Jobs)
  # Constraints are defined at the top level (spec.constraints) and evaluated
  # during readiness. No checks or Jobs needed.

  # Deployment phase: Validate component deployment
  deployment:
    constraints:
      - name: gpu-operator.version
        value: "== v26.3.1"
        severity: warning
        remediation: "Update GPU Operator to v26.3.1"
    checks:
      - expected-resources

  # Performance phase: Validate system performance.
  #
  # Each NCCL variant requires an exact-named constraint — a generic
  # `nccl-all-reduce-bw` only satisfies the legacy default variant, so the
  # `-net` and `-nvls` variants Skip when their named constraints are absent.
  # Thresholds below mirror recipes/overlays/gb200-eks-training.yaml.
  performance:
    checks:
      - nccl-all-reduce-bw-net
      - nccl-all-reduce-bw-nvls
    constraints:
      - name: nccl-all-reduce-bw-net
        value: ">= 40"
      - name: nccl-all-reduce-bw-nvls
        value: ">= 500"

  # Conformance phase: Validate workload-specific requirements
  # (not configured in this example - will be skipped)

componentRefs:
  - name: cert-manager
    namespace: cert-manager
    chart: cert-manager
    type: Helm
    source: https://charts.jetstack.io
    version: v1.20.2
    valuesFile: components/cert-manager/values.yaml

  - name: gpu-operator
    namespace: gpu-operator
    chart: gpu-operator
    type: Helm
    source: https://helm.ngc.nvidia.com/nvidia
    version: v26.3.1
    valuesFile: components/gpu-operator/values-eks-training.yaml
    expectedResources:
      - kind: Deployment
        name: gpu-operator
        namespace: gpu-operator
      - kind: DaemonSet
        name: nvidia-driver-daemonset
        namespace: gpu-operator
      - kind: DaemonSet
        name: nvidia-device-plugin-daemonset
        namespace: gpu-operator
    overrides:
      cdi:
        default: false
        enabled: true
      driver:
        kernelModuleConfig:
          name: kernel-module-params
        version: 580.82.07
      gdrcopy:
        enabled: true
    dependencyRefs:
      - cert-manager

  - name: nvidia-dra-driver-gpu
    namespace: nvidia-system
    chart: nvidia-dra-driver-gpu
    type: Helm
    source: https://helm.ngc.nvidia.com/nvidia
    version: 25.12.0
    valuesFile: components/nvidia-dra-driver-gpu/values.yaml
    dependencyRefs:
      - gpu-operator

  - name: nvsentinel
    namespace: nvidia-system
    chart: nvsentinel
    type: Helm
    source: oci://ghcr.io/nvidia
    version: v1.3.0
    valuesFile: components/nvsentinel/values.yaml
    dependencyRefs:
      - cert-manager

  - name: nodewright-operator
    namespace: skyhook
    chart: skyhook-operator
    type: Helm
    source: https://helm.ngc.nvidia.com/nvidia/skyhook
    version: v0.15.1
    valuesFile: components/nodewright-operator/values.yaml
    overrides:
      customization: ubuntu

  - name: prometheus-operator-crds
    namespace: monitoring
    chart: prometheus-operator-crds
    type: Helm
    source: https://prometheus-community.github.io/helm-charts
    version: 28.0.1
    valuesFile: components/prometheus-operator-crds/values.yaml

  - name: kube-prometheus-stack
    namespace: monitoring
    chart: kube-prometheus-stack
    type: Helm
    source: https://prometheus-community.github.io/helm-charts
    version: 84.4.0
    valuesFile: components/kube-prometheus-stack/values.yaml
    dependencyRefs:
      - prometheus-operator-crds

deploymentOrder:
  - cert-manager
  - prometheus-operator-crds
  - kube-prometheus-stack
  - gpu-operator
  - nvidia-dra-driver-gpu
  - nvsentinel
  - nodewright-operator
