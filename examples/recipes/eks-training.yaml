kind: RecipeResult
apiVersion: aicr.nvidia.com/v1alpha1
metadata:
  version: dev
  appliedOverlays:
    - base
    - eks
    - eks-training
criteria:
  service: eks
  accelerator: any
  intent: training
  os: any
constraints:
  - name: K8s.server.version
    value: '>= 1.30'
componentRefs:
  - name: cert-manager
    namespace: cert-manager
    chart: cert-manager
    type: Helm
    source: https://charts.jetstack.io
    version: v1.20.2
    valuesFile: components/cert-manager/values.yaml
  - name: gpu-operator
    namespace: gpu-operator
    chart: gpu-operator
    type: Helm
    source: https://helm.ngc.nvidia.com/nvidia
    version: v25.10.1
    valuesFile: components/gpu-operator/values-eks-training.yaml
    dependencyRefs:
      - cert-manager
  - name: nvsentinel
    namespace: nvidia-system
    chart: nvsentinel
    type: Helm
    source: oci://ghcr.io/nvidia
    version: v1.3.0
    valuesFile: components/nvsentinel/values.yaml
    dependencyRefs:
      - cert-manager
  - name: nodewright-operator
    namespace: skyhook
    chart: skyhook-operator
    type: Helm
    source: https://helm.ngc.nvidia.com/nvidia/skyhook
    version: v0.15.1
    valuesFile: components/nodewright-operator/values.yaml
  - name: prometheus-operator-crds
    namespace: monitoring
    chart: prometheus-operator-crds
    type: Helm
    source: https://prometheus-community.github.io/helm-charts
    version: 28.0.1
    valuesFile: components/prometheus-operator-crds/values.yaml
  - name: kube-prometheus-stack
    namespace: monitoring
    chart: kube-prometheus-stack
    type: Helm
    source: https://prometheus-community.github.io/helm-charts
    version: 84.4.0
    valuesFile: components/kube-prometheus-stack/values.yaml
    dependencyRefs:
      - prometheus-operator-crds
deploymentOrder:
  - cert-manager
  - prometheus-operator-crds
  - kube-prometheus-stack
  - gpu-operator
  - nvsentinel
  - nodewright-operator
