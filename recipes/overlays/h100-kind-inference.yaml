kind: RecipeMetadata
apiVersion: aicr.run/v1alpha2
metadata:
  name: h100-kind-inference

spec:
  # Inherits from kind-inference recipe (kind + inference settings)
  base: kind-inference

  criteria:
    service: kind
    accelerator: h100
    intent: inference

  # No additional components — nodewright-customizations (tuning CR) is excluded
  # because the tuning operation drains the single worker node, which kills the
  # kai-scheduler admission webhook, creating an unresolvable deadlock in a
  # 2-node kind cluster. The nodewright-operator deployment itself is inherited
  # from the base kind recipe.
  componentRefs: []

  validation:
    conformance:
      checks:
        - platform-health
        - gpu-operator-health
        - dra-support
        - secure-accelerator-access
        - accelerator-metrics
        - ai-service-metrics
        - gang-scheduling
        - inference-gateway
        - pod-autoscaling
        - cluster-autoscaling
