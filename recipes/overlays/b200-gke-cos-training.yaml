kind: RecipeMetadata
apiVersion: aicr.run/v1alpha2
metadata:
  name: b200-gke-cos-training

spec:
  # Inherits from gke-cos-training recipe (GKE COS + training settings)
  base: gke-cos-training

  criteria:
    service: gke
    accelerator: b200
    os: cos
    intent: training

  # Specific constraints for B200 on GKE COS training workloads
  constraints:
    - name: K8s.server.version
      value: ">= 1.32"

  componentRefs:
    # B200-specific GPU Operator overrides. B200 has an x86 host (unlike
    # GB200's Grace ARM host), so no kernel-module-params override and no
    # NVreg_GrdmaPciTopoCheckOverride flag.
    #
    # Networking model on GKE A4: the production reference cluster
    # (nvcf-dgxc-k8s-gcp-azne1-prd7) deploys no separate NCCL plugin
    # installer (no gke-nccl-tcpxo, no GPUDirect-RDMA DaemonSet) — high-
    # bandwidth multi-node NCCL is provided by GPU Operator with `gdrcopy`
    # enabled, combined with GKE A4's native multi-NIC infrastructure
    # managed by GCP. The `gke-nccl-tcpxo` component is intentionally
    # omitted because its DaemonSets pin to `cloud.google.com/gke-
    # accelerator: nvidia-h100-mega-80gb` (a3-megagpu / H100) and a
    # different transport (TCPX), so they would not run on A4 nodes.
    - name: gpu-operator
      type: Helm
      dependencyRefs:
        - nfd
        - cert-manager
        - kube-prometheus-stack
        - nodewright-customizations
      overrides:
        cdi:
          enabled: true
        gdrcopy:
          enabled: true

    - name: nodewright-customizations
      type: Helm
      manifestFiles:
        - components/nodewright-customizations/manifests/tuning-gke.yaml
      overrides:
        accelerator: b200
        intent: multiNodeTraining
      dependencyRefs:
        - nodewright-operator

    - name: nfd
      type: Helm
      overrides:
        topologyUpdater:
          enable: true

  validation:
    deployment:
      checks:
        - operator-health
        - expected-resources
        - gpu-operator-version
        - check-nvidia-smi
      constraints:
        # B200 support stabilized in gpu-operator v25.10. Matches the
        # accelerator-wide floor in b200-any.yaml.
        - name: Deployment.gpu-operator.version
          value: ">= v25.10.0"
    # No performance phase: the nccl-all-reduce-bw check is intentionally not
    # declared here. The validator does not yet support gke+b200 (its only GKE
    # NCCL template is TCPXO/FastRak-specific to a3-megagpu H100, while A4 uses
    # GPUDirect RDMA over RoCE/CX-7), so a declared check would silently skip
    # and report the phase as passed without measuring anything — false
    # assurance. Wire it (testbed-validated testdata/b200/gke/runtime.yaml +
    # support-table entry + real threshold) once the B200 GKE testbed
    # (nvcf-dgxc-k8s-gcp-azne1-prd7) is characterized. See issue #1337.
    conformance:
      checks:
        - platform-health
        - gpu-operator-health
        - dra-support
        - accelerator-metrics
        - ai-service-metrics
        - gang-scheduling
        - pod-autoscaling
        - cluster-autoscaling
        - robust-controller
        - secure-accelerator-access
