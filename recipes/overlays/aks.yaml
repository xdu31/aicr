kind: RecipeMetadata
apiVersion: aicr.nvidia.com/v1alpha1
metadata:
  name: aks

spec:
  # Inherits from base (implicit when spec.base is empty)
  # This recipe contains AKS-specific settings shared by all AKS deployments

  criteria:
    service: aks

  # AKS-specific constraints
  # Constraint names use fully qualified measurement paths: {type}.{subtype}.{key}
  # DRA (Dynamic Resource Allocation) is included in all AKS recipes via base.yaml
  # (nvidia-dra-driver-gpu component). DRA graduated to GA in Kubernetes 1.34 —
  # the resource.k8s.io APIs are stable v1 and enabled by default, no AKS feature flag needed.
  constraints:
    - name: K8s.server.version
      value: ">= 1.34"

  # AKS-specific components
  componentRefs:
    # No aws-ebs-csi-driver equivalent needed.
    # Azure Disk CSI is a built-in AKS addon (enabled by default since AKS 1.21).

    # AKS-specific GPU Operator overrides
    # AKS pre-installs NVIDIA container toolkit; disable toolkit installation
    - name: gpu-operator
      type: Helm
      version: "v26.3.1"
      valuesFile: components/gpu-operator/values-aks.yaml
      dependencyRefs:
        - network-operator

    # NVIDIA Network Operator for InfiniBand RDMA on AKS ND-series.
    # Manifests deliver the full RDMA stack that the Helm chart does not template:
    #   - NicClusterPolicy: MOFED driver, RDMA shared device plugin, DOCA telemetry
    #   - NFD NodeFeatureRule: labels IB-capable nodes (pci-15b3.present=true)
    #   - ib-node-config: host MEMLOCK limits so workloads inherit unlimited rlimit
    # Reference: https://azure.github.io/aks-rdma-infiniband/configurations/network-operator
    #
    # RDMA is enabled by default. To opt out at bundle time:
    #   --set networkoperator:enabled=false \
    #   --set gpuoperator:driver.rdma.useHostMofed=false
    - name: network-operator
      type: Helm
      source: https://helm.ngc.nvidia.com/nvidia
      version: "26.1.1"
      valuesFile: components/network-operator/values-aks.yaml
      manifestFiles:
        - components/network-operator/manifests/nfd-network-rule.yaml
        - components/network-operator/manifests/nic-cluster-policy-aks.yaml
        - components/network-operator/manifests/ib-node-config-aks.yaml
      dependencyRefs:
        - nfd
        - cert-manager

    # Prometheus persistent storage (provide --storage-class at bundle time, e.g. managed-csi)
    - name: kube-prometheus-stack
      type: Helm
      version: "83.7.0"
      overrides:
        prometheus:
          prometheusSpec:
            storageSpec:
              emptyDir: null
              volumeClaimTemplate:
                spec:
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 50Gi
    # AKS has no control-plane nodes — remove the default nodeAffinity
    # that requires node-role.kubernetes.io/control-plane
    - name: nvidia-dra-driver-gpu
      type: Helm
      overrides:
        controller:
          affinity:
            nodeAffinity: null

  validation:
    conformance:
      checks:
        - platform-health
        - gpu-operator-health
        - dra-support
        - accelerator-metrics
        - ai-service-metrics
