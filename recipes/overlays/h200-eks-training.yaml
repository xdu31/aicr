kind: RecipeMetadata
apiVersion: aicr.run/v1alpha2
metadata:
  name: h200-eks-training

spec:
  # Inherits from eks-training recipe (EKS + training settings)
  base: eks-training

  criteria:
    service: eks
    accelerator: h200
    intent: training

  # Specific constraints for H200 on EKS training workloads
  # Constraint names use fully qualified measurement paths: {type}.{subtype}.{key}
  constraints:
    - name: K8s.server.version
      value: ">= 1.32.4"

  componentRefs:
    # H200-specific GPU Operator overrides (inherits valuesFile from eks-training)
    - name: gpu-operator
      type: Helm
      dependencyRefs:
        - nfd
        - cert-manager
        - kube-prometheus-stack
        - nodewright-customizations
      overrides:
        cdi:
          enabled: true
        gdrcopy:
          enabled: true

    - name: nodewright-customizations
      type: Helm
      manifestFiles:
        - components/nodewright-customizations/manifests/tuning.yaml
      overrides:
        service: eks
        # H200 reuses the h100 nodewright tuning: same Hopper platform
        # (HGX/DGX-class, NVLink + InfiniBand) and nvidia-setup/nvidia-tuned ship
        # no h200 target — only eks-h100/eks-gb200. The recipe criteria above
        # stays h200; only this tuning profile selector is h100.
        accelerator: h100
        intent: multiNodeTraining
      dependencyRefs:
        - nodewright-operator

    - name: nfd
      type: Helm
      overrides:
        topologyUpdater:
          enable: true

  # Validation checks for H200 on EKS training workloads.
  # Defined at the intent layer (not OS-specific) so all OS variants inherit them.
  validation:
    deployment:
      checks:
        - operator-health
        - expected-resources
        - gpu-operator-version
        - check-nvidia-smi
      constraints:
        - name: Deployment.gpu-operator.version
          value: ">= v24.6.0"
    performance:
      checks:
        - nccl-all-reduce-bw
      constraints:
        # Conservative floor inherited from h100-eks-training. H200 (HBM3e,
        # ~4.8 TB/s) sustains higher NCCL all-reduce bandwidth on EFA than H100
        # (HBM3, ~3.35 TB/s), so this floor is loose: it passes well below
        # H200's real performance envelope and won't catch regressions until
        # they fall near the H100 level. Tighten once empirical H200/EFA
        # numbers are available.
        - name: nccl-all-reduce-bw
          value: ">= 300"
    conformance:
      checks:
        - platform-health
        - gpu-operator-health
        - dra-support
        - accelerator-metrics
        - ai-service-metrics
        - gang-scheduling
        - pod-autoscaling
        - cluster-autoscaling
        - robust-controller
        - secure-accelerator-access
