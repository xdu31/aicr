kind: RecipeMetadata
apiVersion: aicr.nvidia.com/v1alpha1
metadata:
  name: h100-eks-training

spec:
  # Inherits from eks-training recipe (EKS + training settings)
  base: eks-training

  criteria:
    service: eks
    accelerator: h100
    intent: training

  # Specific constraints for H100 on EKS training workloads
  # Constraint names use fully qualified measurement paths: {type}.{subtype}.{key}
  constraints:
    - name: K8s.server.version
      value: ">= 1.32.4"

  componentRefs:
    # H100-specific GPU Operator overrides (inherits valuesFile from eks-training)
    - name: gpu-operator
      type: Helm
      dependencyRefs:
        - nfd
        - cert-manager
        - kube-prometheus-stack
        - nodewright-customizations
      overrides:
        cdi:
          enabled: true
        gdrcopy:
          enabled: true

    - name: nodewright-customizations
      type: Helm
      manifestFiles:
        - components/nodewright-customizations/manifests/tuning.yaml
      overrides:
        service: eks
        accelerator: h100
        intent: multiNodeTraining
      dependencyRefs:
        - nodewright-operator

    - name: nfd
      type: Helm
      overrides:
        topologyUpdater:
          enable: true

  # Validation checks for H100 on EKS training workloads.
  # Defined at the intent layer (not OS-specific) so all OS variants inherit them.
  validation:
    deployment:
      checks:
        - operator-health
        - expected-resources
        - gpu-operator-version
        - check-nvidia-smi
      constraints:
        - name: Deployment.gpu-operator.version
          value: ">= v24.6.0"
    performance:
      checks:
        - nccl-all-reduce-bw
      # NOTE: this NCCL bus-bandwidth floor is a fixed absolute value calibrated
      # on a full 8-GPU H100 NVLink/SXM node with multi-NIC transport. busbw is
      # fabric-class dependent (not GPU-count scaled), so a smaller or
      # different-fabric H100 SKU — e.g. a single-GPU-per-node shape, whose
      # all-reduce is pure inter-node NIC with no intra-node NVLink — can
      # false-fail. Making the gate fabric/transport-class aware is tracked in
      # https://github.com/NVIDIA/aicr/issues/1256.
      constraints:
        # Fixed absolute floor calibrated on p5.48xlarge (8x H100 SXM,
        # 32x EFA, NVLink/NVSwitch). This recipe is SKU-agnostic — it
        # matches all EKS/H100 instance types, including small shapes
        # (e.g. p5.4xlarge: 1 GPU, 1 EFA) whose pure inter-node NIC path
        # measures tens of GB/s and cannot clear this floor. See #1256.
        # The proper fix is either a weakest-in-scope liveness floor
        # (option a) or a per-fabric criteria dimension (option b);
        # both need measured numbers from the small SKUs that we don't
        # have yet. Keeping the calibrated value here until then.
        - name: nccl-all-reduce-bw
          value: ">= 300"
    conformance:
      checks:
        - platform-health
        - gpu-operator-health
        - dra-support
        - accelerator-metrics
        - ai-service-metrics
        - gang-scheduling
        - pod-autoscaling
        - cluster-autoscaling
        - robust-controller
        - secure-accelerator-access
