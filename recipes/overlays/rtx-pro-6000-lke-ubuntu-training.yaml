kind: RecipeMetadata
apiVersion: aicr.run/v1alpha2
metadata:
  name: rtx-pro-6000-lke-ubuntu-training

spec:
  # Inherits from rtx-pro-6000-lke-training recipe (RTX PRO 6000 + LKE + training settings)
  # This overlay adds Ubuntu-specific configurations
  base: rtx-pro-6000-lke-training

  criteria:
    service: lke
    accelerator: rtx-pro-6000
    os: ubuntu
    intent: training

  # Ubuntu OS constraints via mixin
  mixins:
    - os-ubuntu

  # Constraints for RTX PRO 6000 on LKE with Ubuntu for training workloads
  constraints:
    - name: K8s.server.version
      value: ">= 1.31"

  componentRefs: []

  # Validation is inherited from rtx-pro-6000-lke-training (not OS-specific)
