kind: RecipeMetadata
apiVersion: aicr.nvidia.com/v1alpha1
metadata:
  name: bcm

spec:
  # Inherits from base (implicit when spec.base is empty).
  # BCM 11.x (`cm-kubernetes-setup`) provisions only the base platform —
  # Kubernetes control plane, CNI (tigera-operator/calico by default), DNS,
  # and MetalLB. The NVIDIA runtime stack (GPU Operator, NFD, cert-manager,
  # Prometheus, nvsentinel, DRA driver, etc.) is delivered by AICR via
  # base.yaml and applied with the `helmfile` deployer
  # (`aicr bundle -r recipe.yaml --deployer helmfile -o ./bundles`).

  criteria:
    service: bcm

  # BCM-specific constraints
  # Constraint names use fully qualified measurement paths: {type}.{subtype}.{key}
  constraints:
    - name: K8s.server.version
      value: ">= 1.34"

  # BCM-specific component overrides.
  # BCM uses `node-role.kubernetes.io/master` for the control-plane label
  # in addition to the upstream `node-role.kubernetes.io/control-plane`,
  # and ships `local-path` as the default StorageClass.
  componentRefs:
    # Persist Prometheus on the BCM-provisioned local-path StorageClass.
    - name: kube-prometheus-stack
      type: Helm
      overrides:
        prometheus:
          prometheusSpec:
            storageSpec:
              emptyDir: null
              volumeClaimTemplate:
                spec:
                  accessModes: ["ReadWriteOnce"]
                  storageClassName: local-path
                  resources:
                    requests:
                      storage: 50Gi

    # Tolerate the BCM `master` label so control-plane workloads that
    # already tolerate `control-plane` schedule on BCM masters as well.
    # Mirrored onto kubeletPlugin so DRA's kubelet plugin DaemonSet still
    # schedules on small BCM deployments that combine control-plane and
    # worker roles on the same node.
    #
    # Note: AICR's bundler defaults to appending a blanket {operator: Exists}
    # to both controller.tolerations and kubeletPlugin.tolerations via the
    # nodeScheduling paths in recipes/registry.yaml (defaults sourced from
    # pkg/snapshotter/agent.go DefaultTolerations). The registry maps
    # controller.tolerations to the `system` scheduling scope and
    # kubeletPlugin.tolerations to the `accelerated` scope. The specific
    # entries below are belt-and-suspenders in default mode — the blanket
    # subsumes them — and only have effect when a user drops the blanket via
    # --system-node-toleration (controller) or --accelerated-node-toleration
    # (kubeletPlugin), in which case BCM clusters still need `master`
    # tolerated explicitly.
    - name: nvidia-dra-driver-gpu
      type: Helm
      overrides:
        controller:
          tolerations:
            - effect: NoSchedule
              key: node-role.kubernetes.io/master
              operator: Exists
            - effect: NoSchedule
              key: node-role.kubernetes.io/control-plane
              operator: Exists
        kubeletPlugin:
          tolerations:
            - effect: NoSchedule
              key: node-role.kubernetes.io/master
              operator: Exists
            - effect: NoSchedule
              key: node-role.kubernetes.io/control-plane
              operator: Exists

  validation:
    conformance:
      checks:
        - platform-health
        - gpu-operator-health
        - dra-support
        - accelerator-metrics
        - ai-service-metrics
