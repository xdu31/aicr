kind: RecipeMetadata
apiVersion: aicr.run/v1alpha2
metadata:
  name: base

spec:
  # Basic assumptions - will create warning in pre-flight but not block deployment
  # Constraint names use fully qualified measurement paths: {type}.{subtype}.{key}
  constraints:
    - name: K8s.server.version
      value: ">= 1.25"

  componentRefs:
    - name: nfd
      type: Helm
      source: https://kubernetes-sigs.github.io/node-feature-discovery/charts
      version: 0.19.0
      valuesFile: components/nfd/values.yaml

    - name: cert-manager
      type: Helm
      source: https://charts.jetstack.io
      version: v1.20.2
      valuesFile: components/cert-manager/values.yaml

    - name: gpu-operator
      type: Helm
      source: https://helm.ngc.nvidia.com/nvidia
      version: v26.3.2
      valuesFile: components/gpu-operator/values.yaml
      dependencyRefs:
        - nfd
        - cert-manager
        - kube-prometheus-stack

    - name: nvsentinel
      type: Helm
      source: oci://ghcr.io/nvidia
      version: v1.9.0
      valuesFile: components/nvsentinel/values.yaml
      dependencyRefs:
        - cert-manager
        - gpu-operator
        # Direct edge so a refactor of an intermediate node (e.g.,
        # removing gpu-operator → kube-prometheus-stack) cannot
        # silently break the helm-diff race on nvsentinel's
        # PodMonitor CR. Issue #928.
        - prometheus-operator-crds

    - name: nodewright-operator
      type: Helm
      source: oci://ghcr.io/nvidia/nodewright/charts
      version: v0.17.1
      valuesFile: components/nodewright-operator/values.yaml

    - name: prometheus-operator-crds
      type: Helm
      source: https://prometheus-community.github.io/helm-charts
      version: 28.0.1
      valuesFile: components/prometheus-operator-crds/values.yaml

    - name: kube-prometheus-stack
      type: Helm
      source: https://prometheus-community.github.io/helm-charts
      version: 84.4.0
      valuesFile: components/kube-prometheus-stack/values.yaml
      dependencyRefs:
        - prometheus-operator-crds

    - name: k8s-ephemeral-storage-metrics
      type: Helm
      source: https://jmcgrath207.github.io/k8s-ephemeral-storage-metrics/chart
      version: 1.19.2
      valuesFile: components/k8s-ephemeral-storage-metrics/values.yaml
      dependencyRefs:
        - kube-prometheus-stack
        # Direct edge so removing the kube-prometheus-stack edge
        # would not silently break the helm-diff race on this
        # chart's ServiceMonitor CR. Issue #928.
        - prometheus-operator-crds

    - name: nvidia-dra-driver-gpu
      type: Helm
      source: oci://registry.k8s.io/dra-driver-nvidia/charts
      version: "0.4.1"
      valuesFile: components/nvidia-dra-driver-gpu/values.yaml
      dependencyRefs:
        - gpu-operator

    - name: kai-scheduler
      type: Helm
      source: oci://ghcr.io/kai-scheduler/kai-scheduler
      version: v0.14.1
      valuesFile: components/kai-scheduler/values.yaml
      dependencyRefs:
        - gpu-operator
