kind: RecipeMetadata
apiVersion: aicr.run/v1alpha2
metadata:
  name: gb200-oke-inference

spec:
  # Inherits from oke-inference recipe (OKE + inference settings)
  base: oke-inference

  criteria:
    service: oke
    accelerator: gb200
    intent: inference

  # Specific constraints for GB200 on OKE inference workloads
  # Constraint names use fully qualified measurement paths: {type}.{subtype}.{key}
  constraints:
    - name: K8s.server.version
      value: ">= 1.32.4"

  componentRefs:
    - name: gpu-operator
      type: Helm
      dependencyRefs:
        - nfd
        - cert-manager
        - kube-prometheus-stack

    - name: nfd
      type: Helm
      overrides:
        topologyUpdater:
          enable: true
