kind: RecipeMetadata
apiVersion: aicr.run/v1alpha2
metadata:
  name: h100-gke-cos-inference-dynamo

spec:
  # Inherits from h100-gke-cos-inference (H100 + GKE COS inference settings)
  # Adds Dynamo inference platform components.
  base: h100-gke-cos-inference

  criteria:
    service: gke
    accelerator: h100
    os: cos
    intent: inference
    platform: dynamo

  # DRA requires Kubernetes 1.34+ (GA)
  constraints:
    - name: K8s.server.version
      value: ">= 1.34"

  componentRefs:
    - name: nvidia-dra-driver-gpu
      type: Helm
      overrides:
        gpuResourcesEnabledOverride: true

    - name: grove
      type: Helm
      source: oci://ghcr.io/ai-dynamo/grove
      version: "v0.1.0-alpha.8"
      valuesFile: components/grove/values.yaml

    - name: dynamo-platform
      type: Helm
      source: https://helm.ngc.nvidia.com/nvidia/ai-dynamo
      version: "1.2.0"
      valuesFile: components/dynamo-platform/values.yaml
      dependencyRefs:
        - grove
        - cert-manager
        - kube-prometheus-stack
        - gpu-operator
        - kai-scheduler

  validation:
    deployment:
      checks:
        - operator-health
        - expected-resources
        - gpu-operator-version
        - check-nvidia-smi
      constraints:
        - name: Deployment.gpu-operator.version
          value: ">= v24.6.0"
    performance:
      checks:
        - inference-perf
      # Baseline measured on H100 (GKE a3-megagpu-8g, 8 GPUs) with Qwen/Qwen3-8B
      # at concurrency=256/GPU: throughput ≈ 108,164 tok/s, TTFT p99 ≈ 730 ms
      # (within 0.6% of EKS p5.48xlarge — same gate).
      # The throughput floor (>= 50000) is a deliberately conservative floor
      # shared across the inference overlays, not an H100-specific regression
      # gate: the evaluator already scales it to the GPUs actually benchmarked
      # and applies a 10% tolerance (validators/performance/inference_perf.go),
      # so it is sized to clear any healthy run and catch only gross failures,
      # not modest regressions. The TTFT p99 ceiling sits above the measured
      # value with margin. Model + concurrency are pinned so the gate stays
      # valid independent of the compiled defaults.
      #
      # NOTE: this is a full-node value calibrated on an 8-GPU H100 node. The
      # evaluator's down-scaling only applies to PARTIAL occupancy of a node
      # (fewer GPUs benchmarked than the node exposes) — it does NOT normalize
      # across node sizes, so a smaller full H100 SKU (1-/2-GPU, e.g.
      # a3-highgpu-1g/2g/4g) can false-fail. A normalized per-GPU floor is
      # tracked in https://github.com/NVIDIA/aicr/issues/1254.
      constraints:
        - name: inference-model
          value: Qwen/Qwen3-8B
        - name: inference-concurrency-per-gpu
          value: "256"
        - name: inference-routing-mode
          value: dynamo-router
        - name: inference-throughput
          value: ">= 50000"
        - name: inference-ttft-p99
          value: "<= 2000"
    conformance:
      checks:
        - platform-health
        - gpu-operator-health
        - dra-support
        - accelerator-metrics
        - ai-service-metrics
        - inference-gateway
        - gang-scheduling
        - pod-autoscaling
        - cluster-autoscaling
        - robust-controller
        - secure-accelerator-access
