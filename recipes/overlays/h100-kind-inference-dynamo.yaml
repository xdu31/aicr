kind: RecipeMetadata
apiVersion: aicr.run/v1alpha2
metadata:
  name: h100-kind-inference-dynamo

spec:
  # Inherits from h100-kind-inference (H100 + kind + inference settings)
  # Adds Dynamo inference platform components.
  base: h100-kind-inference

  criteria:
    service: kind
    accelerator: h100
    intent: inference
    platform: dynamo

  # DRA requires Kubernetes 1.34+ (GA)
  constraints:
    - name: K8s.server.version
      value: ">= 1.34"

  componentRefs:
    - name: grove
      type: Helm
      source: oci://ghcr.io/ai-dynamo/grove
      version: "v0.1.0-alpha.8"
      valuesFile: components/grove/values.yaml

    - name: dynamo-platform
      type: Helm
      source: https://helm.ngc.nvidia.com/nvidia/ai-dynamo
      version: "1.2.0"
      valuesFile: components/dynamo-platform/values.yaml
      dependencyRefs:
        - grove
        - cert-manager
        - kube-prometheus-stack
        - kai-scheduler

  validation:
    conformance:
      checks:
        - platform-health
        - gpu-operator-health
        - dra-support
        - accelerator-metrics
        - ai-service-metrics
        - gang-scheduling
        - inference-gateway
        - robust-controller
        - secure-accelerator-access
        - pod-autoscaling
        - cluster-autoscaling
