kind: RecipeMetadata
apiVersion: aicr.run/v1alpha2
metadata:
  name: gb200-oke-ubuntu-inference-dynamo

spec:
  # Inherits from gb200-oke-ubuntu-inference (GB200 + Ubuntu inference settings)
  # Adds Dynamo inference platform components.
  base: gb200-oke-ubuntu-inference

  criteria:
    service: oke
    accelerator: gb200
    os: ubuntu
    intent: inference
    platform: dynamo

  # DRA requires Kubernetes 1.34+ (GA)
  constraints:
    - name: K8s.server.version
      value: ">= 1.34"

  componentRefs:
    - name: nvidia-dra-driver-gpu
      type: Helm
      overrides:
        gpuResourcesEnabledOverride: true

    - name: grove
      type: Helm
      source: oci://ghcr.io/ai-dynamo/grove
      version: "v0.1.0-alpha.8"
      valuesFile: components/grove/values.yaml

    - name: dynamo-platform
      type: Helm
      source: https://helm.ngc.nvidia.com/nvidia/ai-dynamo
      version: "1.2.0"
      valuesFile: components/dynamo-platform/values.yaml
      dependencyRefs:
        - grove
        - cert-manager
        - kube-prometheus-stack
        - gpu-operator
        - kai-scheduler

  validation:
    performance:
      checks:
        - inference-perf
      # Conservative smoke gate mirrored from the GB200 EKS Dynamo overlay
      # until OCI-specific inference baselines are available. Model +
      # concurrency are pinned so the gate stays valid independent of
      # the compiled defaults.
      #
      # NOTE: this throughput floor is a fixed absolute full-node value (here a
      # 4-GPU GB200 node) and is not normalized for GPU count, so a smaller SKU
      # of this accelerator can false-fail a healthy run. A normalized per-GPU
      # floor is tracked in https://github.com/NVIDIA/aicr/issues/1254.
      constraints:
        - name: inference-model
          value: Qwen/Qwen3-8B
        - name: inference-concurrency-per-gpu
          value: "256"
        - name: inference-routing-mode
          value: dynamo-router
        - name: inference-throughput
          value: ">= 50000"
        - name: inference-ttft-p99
          value: "<= 2000"
    conformance:
      checks:
        - platform-health
        - gpu-operator-health
        - dra-support
        - accelerator-metrics
        - ai-service-metrics
        - inference-gateway
        - robust-controller
        - secure-accelerator-access
        - pod-autoscaling
        - cluster-autoscaling
