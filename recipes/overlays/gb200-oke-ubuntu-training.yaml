kind: RecipeMetadata
apiVersion: aicr.run/v1alpha2
metadata:
  name: gb200-oke-ubuntu-training

spec:
  # Inherits from gb200-oke-training recipe (GB200 + OKE + training settings)
  # This overlay adds Ubuntu-specific configurations
  base: gb200-oke-training

  criteria:
    service: oke
    accelerator: gb200
    os: ubuntu
    intent: training

  # Ubuntu OS constraints via mixin
  mixins:
    - os-ubuntu

  # Constraints for GB200 on OKE with Ubuntu for training workloads
  constraints:
    # GB200 NVLS performance validation needs the GA resource.k8s.io/v1 DRA
    # API (Kubernetes 1.34+); keep this leaf aligned with gb200-oke-training.
    - name: K8s.server.version
      value: ">= 1.34"

  componentRefs: []

  # Validation is inherited from gb200-oke-training (not OS-specific)
