kind: RecipeMetadata
apiVersion: aicr.nvidia.com/v1alpha1
metadata:
  name: eks

spec:
  # Inherits from base (implicit when spec.base is empty)
  # This recipe contains EKS-specific settings shared by all EKS deployments

  criteria:
    service: eks

  # EKS-specific constraints
  # Constraint names use fully qualified measurement paths: {type}.{subtype}.{key}
  constraints:
    - name: K8s.server.version
      value: ">= 1.28"

  # EKS-specific components
  componentRefs:
    # EBS CSI driver for persistent volume provisioning on EKS.
    # Enabled by default since EKS does not include it as a managed addon.
    # Disable with: --set awsebscsidriver:enabled=false (if installed as EKS addon)
    - name: aws-ebs-csi-driver
      type: Helm
      source: https://kubernetes-sigs.github.io/aws-ebs-csi-driver
      version: 2.59.0
      valuesFile: components/aws-ebs-csi-driver/values.yaml

    # Enable Prometheus persistent storage for EKS (requires EBS CSI driver)
    - name: kube-prometheus-stack
      type: Helm
      overrides:
        prometheus:
          prometheusSpec:
            storageSpec:
              emptyDir: null
              volumeClaimTemplate:
                spec:
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 50Gi
    # EKS has no control-plane nodes — remove the default nodeAffinity
    # that requires node-role.kubernetes.io/control-plane
    - name: nvidia-dra-driver-gpu
      type: Helm
      overrides:
        controller:
          affinity:
            nodeAffinity: null

    - name: aws-efa
      type: Helm
      version: v0.5.26
      valuesFile: components/aws-efa/values.yaml

  validation:
    conformance:
      checks:
        - platform-health
        - gpu-operator-health
        - dra-support
        - accelerator-metrics
        - ai-service-metrics
