kind: RecipeMetadata
apiVersion: aicr.run/v1alpha2
metadata:
  name: h100-bcm-training

spec:
  # Inherits from bcm-training recipe (BCM + training settings)
  base: bcm-training

  criteria:
    service: bcm
    accelerator: h100
    intent: training

  componentRefs:
    # H100-specific GPU Operator overrides
    - name: gpu-operator
      type: Helm
      dependencyRefs:
        - nfd
        - cert-manager
        - kube-prometheus-stack
      overrides:
        cdi:
          enabled: true
        gdrcopy:
          enabled: true

    - name: nfd
      type: Helm
      overrides:
        topologyUpdater:
          enable: true

  # Validation checks for H100 on BCM training workloads.
  # Defined at the intent layer (not OS-specific) so all OS variants inherit them.
  validation:
    deployment:
      checks:
        - operator-health
        - expected-resources
        - gpu-operator-version
        - check-nvidia-smi
      constraints:
        - name: Deployment.gpu-operator.version
          value: ">= v24.6.0"
    conformance:
      checks:
        - platform-health
        - gpu-operator-health
        - dra-support
        - accelerator-metrics
        - ai-service-metrics
