kind: RecipeMetadata
apiVersion: aicr.run/v1alpha2
metadata:
  name: h100-kind-training

spec:
  # Inherits from kind recipe (kind-specific GPU operator + monitoring settings)
  base: kind

  criteria:
    service: kind
    accelerator: h100
    intent: training

  # DRA requires Kubernetes 1.34+ (GA)
  constraints:
    - name: K8s.server.version
      value: ">= 1.34"

  validation:
    conformance:
      checks:
        - platform-health
        - gpu-operator-health
        - dra-support
        - accelerator-metrics
        - ai-service-metrics
        - gang-scheduling
        - secure-accelerator-access
        - pod-autoscaling
        - cluster-autoscaling
