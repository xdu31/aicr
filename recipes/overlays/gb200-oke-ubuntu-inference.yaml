kind: RecipeMetadata
apiVersion: aicr.run/v1alpha2
metadata:
  name: gb200-oke-ubuntu-inference

spec:
  # Inherits from gb200-oke-inference recipe (GB200 + OKE + inference settings)
  # This overlay adds Ubuntu-specific configurations
  base: gb200-oke-inference

  criteria:
    service: oke
    accelerator: gb200
    os: ubuntu
    intent: inference

  # Ubuntu OS constraints via mixin
  mixins:
    - os-ubuntu

  # GB200 + Ubuntu specific constraints for inference workloads
  constraints:
    - name: K8s.server.version
      value: ">= 1.32.4"

  componentRefs: []
