kind: RecipeMetadata
apiVersion: aicr.run/v1alpha2
metadata:
  name: gb200-eks-ubuntu-training-kubeflow

spec:
  # Inherits from gb200-eks-ubuntu-training recipe (GB200 + EKS + Ubuntu + training settings)
  # This overlay adds Kubeflow Training Operator for distributed training with TrainJob
  base: gb200-eks-ubuntu-training

  criteria:
    service: eks
    accelerator: gb200
    os: ubuntu
    intent: training
    platform: kubeflow

  # Ubuntu OS constraints + Kubeflow platform via mixins
  mixins:
    - os-ubuntu
    - platform-kubeflow

  # GB200 + EKS specific constraints (not covered by mixin)
  constraints:
    - name: K8s.server.version
      value: ">= 1.32.4"

  componentRefs: []
