kind: RecipeMetadata
apiVersion: aicr.run/v1alpha2
metadata:
  name: rtx-pro-6000-eks-ubuntu-inference-nim

spec:
  # Inherits from rtx-pro-6000-eks-ubuntu-inference (RTX PRO 6000 + EKS + Ubuntu inference settings)
  # Adds NVIDIA NIM Operator for managing NIM microservice deployments.
  base: rtx-pro-6000-eks-ubuntu-inference

  criteria:
    service: eks
    accelerator: rtx-pro-6000
    os: ubuntu
    intent: inference
    platform: nim

  # DRA requires Kubernetes 1.34+ (GA)
  constraints:
    - name: K8s.server.version
      value: ">= 1.34"

  componentRefs:
    - name: nvidia-dra-driver-gpu
      type: Helm
      overrides:
        gpuResourcesEnabledOverride: true

    - name: k8s-nim-operator
      type: Helm
      source: https://helm.ngc.nvidia.com/nvidia
      version: "3.1.0"
      valuesFile: components/k8s-nim-operator/values.yaml
      dependencyRefs:
        - cert-manager
        - gpu-operator
      expectedResources:
        - kind: Deployment
          namespace: nvidia-nim
          name: k8s-nim-operator

  validation:
    deployment:
      checks:
        - operator-health
        - expected-resources
        - gpu-operator-version
        - check-nvidia-smi
      constraints:
        # RTX PRO 6000 Blackwell needs the Blackwell-era gpu-operator floor.
        # Matches the rtx-pro-6000-any.yaml wildcard's pin; per-field union
        # merge would inherit it anyway, but restating it documents intent.
        - name: Deployment.gpu-operator.version
          value: ">= v25.10.0"
    conformance:
      checks:
        - platform-health
        - gpu-operator-health
        - dra-support
        - accelerator-metrics
        - ai-service-metrics
        - inference-gateway
        - gang-scheduling
        - pod-autoscaling
        - cluster-autoscaling
        - robust-controller
        - secure-accelerator-access
