kind: RecipeMetadata
apiVersion: aicr.run/v1alpha2
metadata:
  name: b200-gke-cos-inference-dynamo

spec:
  # Inherits from b200-gke-cos-inference (B200 + GKE COS inference settings)
  # Adds Dynamo inference platform components.
  base: b200-gke-cos-inference

  criteria:
    service: gke
    accelerator: b200
    os: cos
    intent: inference
    platform: dynamo

  # DRA requires Kubernetes 1.34+ (GA)
  constraints:
    - name: K8s.server.version
      value: ">= 1.34"

  componentRefs:
    - name: nvidia-dra-driver-gpu
      type: Helm
      overrides:
        gpuResourcesEnabledOverride: true

    - name: grove
      type: Helm
      source: oci://ghcr.io/ai-dynamo/grove
      version: "v0.1.0-alpha.8"
      valuesFile: components/grove/values.yaml

    - name: dynamo-platform
      type: Helm
      source: https://helm.ngc.nvidia.com/nvidia/ai-dynamo
      version: "1.2.0"
      valuesFile: components/dynamo-platform/values.yaml
      dependencyRefs:
        - grove
        - cert-manager
        - kube-prometheus-stack
        - gpu-operator
        - kai-scheduler

  validation:
    deployment:
      checks:
        - operator-health
        - expected-resources
        - gpu-operator-version
        - check-nvidia-smi
      constraints:
        # B200 support stabilized in gpu-operator v25.10. Matches the
        # accelerator-wide floor in b200-any.yaml.
        - name: Deployment.gpu-operator.version
          value: ">= v25.10.0"
    performance:
      # inference-perf is DISABLED on B200 until a reference benchmark exists.
      # B200 has not been measured, and shipping a hard gate with UNTESTED
      # PLACEHOLDER thresholds risks passing against non-representative limits
      # and hiding a real regression. Re-enable once a B200 GKE testbed run
      # (e.g. nvcf-dgxc-k8s-gcp-azne1-prd7) publishes measured values: set
      # checks to [inference-perf] and add a constraints block with the
      # measured throughput / TTFT p99. As a conservative Blackwell-family
      # starting point, the measured GB200 gate at Qwen/Qwen3-8B,
      # concurrency=256/GPU was throughput ≈ 66k tok/s, TTFT p99 ≈ 1,240 ms.
      checks: []
    conformance:
      checks:
        - platform-health
        - gpu-operator-health
        - dra-support
        - accelerator-metrics
        - ai-service-metrics
        - inference-gateway
        - gang-scheduling
        - pod-autoscaling
        - cluster-autoscaling
        - robust-controller
        - secure-accelerator-access
