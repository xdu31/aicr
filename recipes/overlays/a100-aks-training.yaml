kind: RecipeMetadata
apiVersion: aicr.run/v1alpha2
metadata:
  name: a100-aks-training

spec:
  # Inherits from aks-training recipe (AKS + training settings)
  base: aks-training

  criteria:
    service: aks
    accelerator: a100
    intent: training

  # Specific constraints for A100 on AKS training workloads.
  # A100 has no IMEX/NVLink ComputeDomain requirement, so the recipe keeps
  # the AKS training baseline rather than the H100 1.32.4 floor.
  # Constraint names use fully qualified measurement paths: {type}.{subtype}.{key}
  constraints:
    - name: K8s.server.version
      value: ">= 1.30"

  componentRefs:
    # A100-specific GPU Operator overrides (inherits valuesFile from aks-training)
    - name: gpu-operator
      type: Helm
      dependencyRefs:
        - nfd
        - cert-manager
        - kube-prometheus-stack
        - nodewright-customizations
      overrides:
        gdrcopy:
          enabled: true

    # A100 reuses the h100 nodewright tuning profile (tuning.yaml), mirroring
    # a100-eks-training: nvidia-setup ships aks configs only for aks-h100, and
    # per the nodewright maintainer the h100 tuning is the correct profile for
    # A100 (the A100-vs-H100 deltas pertain only to baremetal). The recipe
    # criteria above stays a100; only this tuning profile selector is h100.
    - name: nodewright-customizations
      type: Helm
      manifestFiles:
        - components/nodewright-customizations/manifests/tuning.yaml
      overrides:
        service: aks
        accelerator: h100
        intent: multiNodeTraining
      dependencyRefs:
        - nodewright-operator

    - name: nfd
      type: Helm
      overrides:
        topologyUpdater:
          enable: true

  # Validation checks for A100 on AKS training workloads.
  # Defined at the intent layer (not OS-specific) so all OS variants inherit them.
  #
  # The deployment-phase floor (4 standard checks + gpu-operator version pin)
  # is contributed by the a100-any cross-cutting overlay and is not duplicated
  # here.
  #
  # Performance gating is intentionally omitted until an empirical A100-on-Azure
  # NCCL baseline is established. The validator's AKS NCCL runtime path covers
  # H100 only (supportedNCCLCombinations in
  # validators/performance/nccl_all_reduce_bw_constraint.go; h100-aks-training
  # declares nccl-all-reduce-bw with a floor calibrated on ND96isr_H100_v5).
  # A100 on Azure is unmeasured and needs its own fabric-aware baseline (#1256)
  # plus an aks/a100 support-table entry (#1337), so carrying any floor here
  # would only false-fail healthy runs.
  validation:
    conformance:
      checks:
        - platform-health
        - gpu-operator-health
        - dra-support
        - accelerator-metrics
        - ai-service-metrics
        - gang-scheduling
        - pod-autoscaling
        - cluster-autoscaling
        - robust-controller
        - secure-accelerator-access
