kind: RecipeMetadata
apiVersion: aicr.run/v1alpha2
metadata:
  name: rtx-pro-6000-eks-ubuntu-inference-dynamo

spec:
  # Inherits from rtx-pro-6000-eks-ubuntu-inference (RTX PRO 6000 + EKS + Ubuntu inference settings)
  # Adds Dynamo inference platform components.
  base: rtx-pro-6000-eks-ubuntu-inference

  criteria:
    service: eks
    accelerator: rtx-pro-6000
    os: ubuntu
    intent: inference
    platform: dynamo

  # DRA requires Kubernetes 1.34+ (GA)
  constraints:
    - name: K8s.server.version
      value: ">= 1.34"

  componentRefs:
    - name: nvidia-dra-driver-gpu
      type: Helm
      overrides:
        gpuResourcesEnabledOverride: true

    - name: grove
      type: Helm
      source: oci://ghcr.io/ai-dynamo/grove
      version: "v0.1.0-alpha.8"
      valuesFile: components/grove/values.yaml

    - name: dynamo-platform
      type: Helm
      source: https://helm.ngc.nvidia.com/nvidia/ai-dynamo
      version: "1.2.0"
      valuesFile: components/dynamo-platform/values.yaml
      dependencyRefs:
        - grove
        - cert-manager
        - kube-prometheus-stack
        - gpu-operator
        - kai-scheduler

  validation:
    deployment:
      checks:
        - operator-health
        - expected-resources
        - gpu-operator-version
        - check-nvidia-smi
      constraints:
        # RTX PRO 6000 Blackwell needs the Blackwell-era gpu-operator floor.
        # Matches the rtx-pro-6000-any.yaml wildcard's pin; per-field union
        # merge would inherit it anyway, but restating it documents intent.
        - name: Deployment.gpu-operator.version
          value: ">= v25.10.0"
    performance:
      checks:
        - inference-perf
      # Gate thresholds measured on RTX PRO 6000 Blackwell Server Edition
      # (g7e.48xlarge, 8 GPUs) with Qwen/Qwen3-8B at concurrency=256/GPU:
      # throughput ≈ 59,260 tok/s, TTFT p99 ≈ 445 ms. Floor/ceiling sit
      # below/above the reference with margin (the evaluator also applies 10%
      # tolerance) so the gate catches real regressions without flaking on
      # run-to-run variance. Model + concurrency are pinned so the gate stays
      # valid independent of the compiled validator defaults.
      #
      # NOTE: this throughput floor is a fixed absolute full-node value (here an
      # 8-GPU node) and is not normalized for GPU count, so a smaller SKU of
      # this accelerator can false-fail a healthy run. A normalized per-GPU
      # floor is tracked in https://github.com/NVIDIA/aicr/issues/1254.
      constraints:
        - name: inference-model
          value: Qwen/Qwen3-8B
        - name: inference-concurrency-per-gpu
          value: "256"
        - name: inference-routing-mode
          value: dynamo-router
        - name: inference-throughput
          value: ">= 50000"
        - name: inference-ttft-p99
          value: "<= 2000"
    conformance:
      checks:
        - platform-health
        - gpu-operator-health
        - dra-support
        - accelerator-metrics
        - ai-service-metrics
        - inference-gateway
        - gang-scheduling
        - pod-autoscaling
        - cluster-autoscaling
        - robust-controller
        - secure-accelerator-access
