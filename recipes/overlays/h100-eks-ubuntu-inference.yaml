kind: RecipeMetadata
apiVersion: aicr.run/v1alpha2
metadata:
  name: h100-eks-ubuntu-inference

spec:
  # Inherits from h100-eks-inference recipe (H100 + EKS + inference settings)
  # This overlay adds Ubuntu-specific configurations
  base: h100-eks-inference

  criteria:
    service: eks
    accelerator: h100
    os: ubuntu
    intent: inference

  # Ubuntu OS constraints via mixin (defined once in recipes/mixins/os-ubuntu.yaml)
  mixins:
    - os-ubuntu

  # H100 + EKS specific constraints (not covered by mixin)
  constraints:
    - name: K8s.server.version
      value: ">= 1.32.4"

  componentRefs: []
