kind: RecipeMetadata
apiVersion: aicr.run/v1alpha2
metadata:
  name: h100-aks-inference

spec:
  # Inherits from aks-inference recipe (AKS + inference settings)
  base: aks-inference

  criteria:
    service: aks
    accelerator: h100
    intent: inference

  # Specific constraints for H100 on AKS inference workloads
  # Constraint names use fully qualified measurement paths: {type}.{subtype}.{key}
  constraints:
    - name: K8s.server.version
      value: ">= 1.32.4"

  componentRefs:
    - name: gpu-operator
      type: Helm
      dependencyRefs:
        - nfd
        - cert-manager
        - kube-prometheus-stack
        - nodewright-customizations

    # Same tuning manifest as EKS: nvidia-setup 0.5.0 supports service: aks
    # (aks-h100), covering host IB RDMA + memlock setup that the
    # ib-node-config-aks DaemonSet used to perform, and nvidia-tuned applies
    # the aks-h100-inference profile.
    - name: nodewright-customizations
      type: Helm
      manifestFiles:
        - components/nodewright-customizations/manifests/tuning.yaml
      overrides:
        service: aks
        accelerator: h100
        intent: inference
      dependencyRefs:
        - nodewright-operator

    - name: nfd
      type: Helm
      overrides:
        topologyUpdater:
          enable: true
