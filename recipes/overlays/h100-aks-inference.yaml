kind: RecipeMetadata
apiVersion: aicr.run/v1alpha2
metadata:
  name: h100-aks-inference

spec:
  # Inherits from aks-inference recipe (AKS + inference settings)
  base: aks-inference

  criteria:
    service: aks
    accelerator: h100
    intent: inference

  # Specific constraints for H100 on AKS inference workloads
  # Constraint names use fully qualified measurement paths: {type}.{subtype}.{key}
  constraints:
    - name: K8s.server.version
      value: ">= 1.32.4"

  # Nodewright customizations omitted — Nodewright packages do not support
  # service: aks. The nodewright-operator itself is inherited from base
  # and still deploys. This follows the same pattern as Kind overlays
  # (h100-kind-inference.yaml) which also omit Nodewright tuning.
  componentRefs:
    - name: gpu-operator
      type: Helm
      dependencyRefs:
        - nfd
        - cert-manager
        - kube-prometheus-stack

    - name: nfd
      type: Helm
      overrides:
        topologyUpdater:
          enable: true
