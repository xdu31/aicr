kind: RecipeMetadata
apiVersion: aicr.run/v1alpha2
metadata:
  name: h100-aks-training

spec:
  # Inherits from aks-training recipe (AKS + training settings)
  base: aks-training

  criteria:
    service: aks
    accelerator: h100
    intent: training

  # Specific constraints for H100 on AKS training workloads
  # Constraint names use fully qualified measurement paths: {type}.{subtype}.{key}
  constraints:
    - name: K8s.server.version
      value: ">= 1.32.4"

  # Nodewright customizations omitted — Nodewright packages do not support
  # service: aks. The nodewright-operator itself is inherited from base
  # and still deploys. This follows the same pattern as Kind overlays
  # (h100-kind-training.yaml) which also omit Nodewright tuning.
  componentRefs:
    # H100-specific GPU Operator overrides (inherits valuesFile from aks-training)
    - name: gpu-operator
      type: Helm
      dependencyRefs:
        - nfd
        - cert-manager
        - kube-prometheus-stack
      overrides:
        gdrcopy:
          enabled: true

    - name: nfd
      type: Helm
      overrides:
        topologyUpdater:
          enable: true

  # Validation checks for H100 on AKS training workloads.
  # Defined at the intent layer (not OS-specific) so all OS variants inherit them.
  validation:
    deployment:
      checks:
        - operator-health
        - expected-resources
        - gpu-operator-version
        - check-nvidia-smi
      constraints:
        - name: Deployment.gpu-operator.version
          value: ">= v24.6.0"
    # No performance phase: the nccl-all-reduce-bw check is intentionally not
    # declared here. The validator has no AKS NCCL runtime template or
    # scheduling path (AKS is not in the support table), so a declared check
    # would silently skip and report the phase as passed without measuring
    # anything — false assurance. Wire it (testbed-validated AKS runtime
    # template + scheduling path + support-table entry + real threshold) once
    # an H100 AKS testbed is characterized. See issue #1337.
    conformance:
      checks:
        - platform-health
        - gpu-operator-health
        - dra-support
        - accelerator-metrics
        - ai-service-metrics
        - gang-scheduling
        - pod-autoscaling
        - cluster-autoscaling
        - robust-controller
        - secure-accelerator-access
