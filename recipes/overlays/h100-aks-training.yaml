kind: RecipeMetadata
apiVersion: aicr.run/v1alpha2
metadata:
  name: h100-aks-training

spec:
  # Inherits from aks-training recipe (AKS + training settings)
  base: aks-training

  criteria:
    service: aks
    accelerator: h100
    intent: training

  # Specific constraints for H100 on AKS training workloads
  # Constraint names use fully qualified measurement paths: {type}.{subtype}.{key}
  constraints:
    - name: K8s.server.version
      value: ">= 1.32.4"

  componentRefs:
    # H100-specific GPU Operator overrides (inherits valuesFile from aks-training)
    - name: gpu-operator
      type: Helm
      dependencyRefs:
        - nfd
        - cert-manager
        - kube-prometheus-stack
        - nodewright-customizations
      overrides:
        gdrcopy:
          enabled: true

    # Same tuning manifest as EKS: nvidia-setup 0.5.0 supports service: aks
    # (aks-h100), covering host IB RDMA + memlock setup that the
    # ib-node-config-aks DaemonSet used to perform, and nvidia-tuned applies
    # the aks-h100-multiNodeTraining profile.
    - name: nodewright-customizations
      type: Helm
      manifestFiles:
        - components/nodewright-customizations/manifests/tuning.yaml
      overrides:
        service: aks
        accelerator: h100
        intent: multiNodeTraining
      dependencyRefs:
        - nodewright-operator

    - name: nfd
      type: Helm
      overrides:
        topologyUpdater:
          enable: true

  # Validation checks for H100 on AKS training workloads.
  # Defined at the intent layer (not OS-specific) so all OS variants inherit them.
  validation:
    deployment:
      checks:
        - operator-health
        - expected-resources
        - gpu-operator-version
        - check-nvidia-smi
      constraints:
        - name: Deployment.gpu-operator.version
          value: ">= v24.6.0"
    performance:
      checks:
        - nccl-all-reduce-bw
      # PROVISIONAL floor, set at half the calibrated EKS H100 value (>= 300,
      # p5.48xlarge: 8x H100 SXM, 32x EFA). Live baseline: 157.24 GB/s busbw
      # measured UNTUNED (16 GiB all-reduce, NCCL built-in IB/verbs with
      # NCCL_NET_PLUGIN=none over the network-operator shared HCA pool) on
      # aicr-test1, 2x Standard_ND96isr_H100_v5 (8x H100 SXM, 8x 400Gb NDR
      # InfiniBand per node), 2026-07-09. There is substantial tuning headroom
      # — 8x 400Gb NDR line rate is ~400 GB/s — so recalibrate this floor
      # upward once the IB path is tuned rather than treating 157 as the
      # fabric's ceiling. See issue #1337; the general fabric-class-aware
      # floor work is tracked in
      # https://github.com/NVIDIA/aicr/issues/1256.
      constraints:
        - name: nccl-all-reduce-bw
          value: ">= 150"
    conformance:
      checks:
        - platform-health
        - gpu-operator-health
        - dra-support
        - accelerator-metrics
        - ai-service-metrics
        - gang-scheduling
        - pod-autoscaling
        - cluster-autoscaling
        - robust-controller
        - secure-accelerator-access
