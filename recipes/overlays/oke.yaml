kind: RecipeMetadata
apiVersion: aicr.nvidia.com/v1alpha1
metadata:
  name: oke

spec:
  # Inherits from base (implicit when spec.base is empty)
  # This recipe contains OKE-specific settings shared by all OKE deployments

  criteria:
    service: oke

  # OKE-specific constraints
  # Constraint names use fully qualified measurement paths: {type}.{subtype}.{key}
  constraints:
    - name: K8s.server.version
      value: ">= 1.28"

  # OKE-specific components
  componentRefs:
    # No CSI driver component needed.
    # OCI Block Volume CSI driver is a built-in OKE addon (enabled by default).

    # OKE-specific GPU Operator overrides
    # OKE pre-installs NVIDIA drivers and container toolkit on GPU shapes
    # (BM.GPU.B200, BM.GPU.H100, etc.). Disable both to avoid conflicts.
    - name: gpu-operator
      type: Helm
      version: v26.3.1
      valuesFile: components/gpu-operator/values-oke.yaml

    # Prometheus persistent storage (provide --storage-class at bundle time, e.g. oci-bv)
    - name: kube-prometheus-stack
      type: Helm
      overrides:
        prometheus:
          prometheusSpec:
            storageSpec:
              emptyDir: null
              volumeClaimTemplate:
                spec:
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 50Gi
    # OKE DRA driver: host-installed driver root, compute domains enabled
    - name: nvidia-dra-driver-gpu
      type: Helm
      valuesFile: components/nvidia-dra-driver-gpu/values-oke.yaml
      overrides:
        controller:
          affinity:
            nodeAffinity: null

  validation:
    conformance:
      checks:
        - platform-health
        - gpu-operator-health
        - dra-support
        - accelerator-metrics
        - ai-service-metrics
