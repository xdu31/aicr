kind: RecipeMetadata
apiVersion: aicr.nvidia.com/v1alpha1
metadata:
  name: kind

spec:
  # Inherits from base (implicit when spec.base is empty)
  # This recipe contains kind-specific settings for local development/testing

  criteria:
    service: kind

  # Kind-specific constraints
  constraints:
    - name: K8s.server.version
      value: ">= 1.25"

  # Kind-specific component overrides
  componentRefs:
    # gpu-operator: configure for kind with GPU passthrough (nvkind)
    # Assumes host has NVIDIA drivers and container toolkit pre-configured
    - name: gpu-operator
      type: Helm
      overrides:
        driver:
          # Disable driver installation - use pre-installed host drivers
          enabled: false
          rdma:
            # Disable RDMA - requires driver kernel modules not available in kind
            enabled: false
        toolkit:
          # Disable toolkit - nvkind pre-configures the host container runtime
          enabled: false
        gdrcopy:
          # Disable GDR copy - requires driver kernel modules not available in kind
          enabled: false
        migManager:
          # Disable MIG manager - requires driver not available in kind
          enabled: false
        dcgm:
          # Disable standalone DCGM hostengine in kind - use embedded exporter
          enabled: false
        # Use the exporter's built-in default metrics in kind — the custom
        # metrics list targets real datacenter GPUs (NVLink/profiling/etc.),
        # most of which are unavailable on the simulated devices kind uses.
        dcgmExporter:
          config:
            create: false
            name: ""
            data: ""
        # Use chart-default device plugin env in kind (no CDI overrides)
        devicePlugin:
          env: []
        # Keep GPU Operator operand DaemonSets off kind control-plane nodes.
        # The chart default `daemonsets.tolerations: [{operator: Exists}]`
        # tolerates the control-plane `NoSchedule` taint; combined with NFD
        # labeling the control-plane (shared host kernel exposes the NVIDIA
        # PCI device) and GPU Operator setting `nvidia.com/gpu.deploy.*=true`,
        # operand DaemonSets schedule onto the control-plane where they hang
        # because there's no real device access, keeping ClusterPolicy
        # notReady. Removing the catchall toleration restores the
        # NoSchedule taint as the real exclusion mechanism.
        # Note: per-operand `affinity` (dcgmExporter/devicePlugin/gfd/validator)
        # is not exposed by ClusterPolicy and is silently dropped by the chart,
        # so it cannot be used here.
        daemonsets:
          tolerations: []
        # Reduce resource requests for local development
        operator:
          resources:
            requests:
              cpu: 100m
              memory: 200Mi
            limits:
              cpu: 500m
              memory: 500Mi

    # kube-prometheus-stack: use emptyDir storage (default), reduce resources
    - name: kube-prometheus-stack
      type: Helm
      overrides:
        # CI only needs component health, not the full upstream alerting rule
        # set. Skipping default rules reduces PrometheusRule churn during
        # install on small kind control planes.
        defaultRules:
          create: false
        prometheus:
          prometheusSpec:
            # Smaller storage for local testing
            storageSpec:
              emptyDir:
                medium: ""
                sizeLimit: 5Gi
            # Reduced resources for local development
            resources:
              requests:
                cpu: 250m
                memory: 512Mi
              limits:
                cpu: 1
                memory: 1Gi
            # Shorter retention for local testing
            retention: 7d
        prometheusOperator:
          # Keep operator-owned monitoring custom resources in the monitoring
          # namespace for kind. Do not scope ServiceMonitor discovery here;
          # GPU, Kubeflow, and Dynamo monitors may live in their own namespaces.
          alertmanagerInstanceNamespaces:
            - monitoring
          alertmanagerConfigNamespaces:
            - monitoring
          prometheusInstanceNamespaces:
            - monitoring
          thanosRulerInstanceNamespaces:
            - monitoring
          # CI kind control planes can be slow under image pulls and controller
          # startup. Avoid restarting the operator on short health probe stalls.
          livenessProbe:
            timeoutSeconds: 10
            failureThreshold: 10
          readinessProbe:
            timeoutSeconds: 10
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
        grafana:
          enabled: false
        alertmanager:
          alertmanagerSpec:
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 250m
                memory: 256Mi

    # nvsentinel: reduce resources for local development
    - name: nvsentinel
      type: Helm
      overrides:
        platformConnector:
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 200m
              memory: 512Mi

    # nodewright-operator: reduce resources for local development
    - name: nodewright-operator
      type: Helm
      overrides:
        controllerManager:
          manager:
            resources:
              requests:
                cpu: 250m
                memory: 512Mi
              limits:
                cpu: 500m
                memory: 1Gi

    # nvidia-dra-driver-gpu: override driver root for kind GPU passthrough
    - name: nvidia-dra-driver-gpu
      type: Helm
      overrides:
        # Use "/" for host-installed drivers (kind GPU passthrough)
        nvidiaDriverRoot: "/"

    # network-operator: NVIDIA Network Operator for high-performance networking
    - name: network-operator
      type: Helm
      source: https://helm.ngc.nvidia.com/nvidia
      version: "26.1.1"
      valuesFile: components/network-operator/values.yaml
      dependencyRefs:
        - nfd
        - cert-manager

  validation:
    conformance:
      checks:
        - platform-health
        - gpu-operator-health
        - dra-support
        - accelerator-metrics
        - ai-service-metrics
