kind: RecipeMetadata
apiVersion: aicr.nvidia.com/v1alpha1
metadata:
  name: h100-gke-cos-training

spec:
  # Inherits from gke-cos-training recipe (GKE COS + training settings)
  base: gke-cos-training

  criteria:
    service: gke
    accelerator: h100
    os: cos
    intent: training

  # Specific constraints for H100 on GKE COS training workloads
  constraints:
    - name: K8s.server.version
      value: ">= 1.32"

  componentRefs:
    # H100-specific GPU Operator overrides (inherits valuesFile from gke-cos-training)
    - name: gpu-operator
      type: Helm
      dependencyRefs:
        - nfd
        - cert-manager
        - kube-prometheus-stack
        - nodewright-customizations
      overrides:
        cdi:
          enabled: true

    # GPUDirect TCPXO components for high-speed inter-node communication.
    # Requires GKE cluster with multi-NIC networking configured for GPU node pool.
    # - nccl-tcpxo-installer: installs NCCL TCPXO plugin on GPU nodes
    # - nri-device-injector: injects GPU NIC devices into pods via NRI annotations
    #   (required for non-privileged workloads; NRI framework enabled by default on GKE 1.29+)
    - name: gke-nccl-tcpxo
      type: Helm
      manifestFiles:
        - components/gke-nccl-tcpxo/manifests/nccl-tcpxo-installer.yaml
        - components/gke-nccl-tcpxo/manifests/nri-device-injector.yaml
      dependencyRefs:
        - gpu-operator

    - name: nodewright-customizations
      type: Helm
      manifestFiles:
        - components/nodewright-customizations/manifests/tuning-gke.yaml
      overrides:
        accelerator: h100
        intent: multiNodeTraining
      dependencyRefs:
        - nodewright-operator

    - name: nfd
      type: Helm
      overrides:
        topologyUpdater:
          enable: true

  validation:
    deployment:
      checks:
        - operator-health
        - expected-resources
        - gpu-operator-version
        - check-nvidia-smi
      constraints:
        - name: Deployment.gpu-operator.version
          value: ">= v24.6.0"
    performance:
      checks:
        - nccl-all-reduce-bw
      # NOTE: this NCCL bus-bandwidth floor is a fixed absolute value calibrated
      # on a full 8-GPU H100 NVLink/SXM node with multi-NIC transport. busbw is
      # fabric-class dependent (not GPU-count scaled), so a smaller or
      # different-fabric H100 SKU — e.g. a single-GPU-per-node shape, whose
      # all-reduce is pure inter-node NIC with no intra-node NVLink — can
      # false-fail. Making the gate fabric/transport-class aware is tracked in
      # https://github.com/NVIDIA/aicr/issues/1256.
      constraints:
        # Fixed absolute floor calibrated on a3-megagpu-8g (8x H100,
        # 8x GPUDirect TCPXO NICs). This recipe is SKU-agnostic — it
        # matches all GKE/H100 instance types, including small shapes
        # (e.g. a3-highgpu-1g: 1 GPU, 1 gVNIC ~100 Gbps) whose pure
        # inter-node NIC path measures single-digit GB/s and cannot
        # clear this floor. See #1256. The proper fix is either a
        # weakest-in-scope liveness floor (option a) or a per-fabric
        # criteria dimension (option b); both need measured numbers
        # from the small SKUs that we don't have yet. Keeping the
        # calibrated value here until then.
        - name: nccl-all-reduce-bw
          value: ">= 250"
    conformance:
      checks:
        - platform-health
        - gpu-operator-health
        - dra-support
        - accelerator-metrics
        - ai-service-metrics
        - gang-scheduling
        - pod-autoscaling
        - cluster-autoscaling
        - robust-controller
        - secure-accelerator-access
