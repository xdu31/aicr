kind: RecipeMetadata
apiVersion: aicr.run/v1alpha2
metadata:
  name: gb200-eks-ubuntu-training

spec:
  # Inherits from gb200-eks-training recipe (GB200 + EKS + training settings)
  # This overlay adds Ubuntu-specific configurations
  base: gb200-eks-training

  criteria:
    service: eks
    accelerator: gb200
    os: ubuntu
    intent: training

  # Ubuntu OS constraints via mixin (defined once in recipes/mixins/os-ubuntu.yaml)
  mixins:
    - os-ubuntu

  # GB200 + EKS specific constraints (not covered by mixin)
  constraints:
    - name: K8s.server.version
      value: ">= 1.32.4"

  componentRefs: []

  # Validation is inherited from gb200-eks-training (not OS-specific)
