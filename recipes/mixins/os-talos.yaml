# os-talos mixin: redirects privileged AICR components to
# pod-security.kubernetes.io/enforce=privileged namespaces and
# bundles the Namespace manifests at sync-wave N-1 so they land
# before the corresponding charts.
#
# Opted into by a leaf overlay via spec.mixins: [os-talos].
# See docs/integrator/talos-integration.md for details.

kind: RecipeMixin
apiVersion: aicr.run/v1alpha2
metadata:
  name: os-talos
spec:
  constraints:
    - name: OS.release.ID
      value: talos

  componentRefs:
    - name: gpu-operator
      namespace: privileged-gpu-operator
      preManifestFiles:
        - components/gpu-operator/manifests/talos-namespace.yaml

    - name: network-operator
      namespace: privileged-network-operator
      preManifestFiles:
        - components/network-operator/manifests/talos-namespace.yaml

    - name: nvsentinel
      namespace: privileged-nvsentinel
      preManifestFiles:
        - components/nvsentinel/manifests/talos-namespace.yaml

    - name: nvidia-dra-driver-gpu
      namespace: privileged-nvidia-dra-driver-gpu
      preManifestFiles:
        - components/nvidia-dra-driver-gpu/manifests/talos-namespace.yaml

    - name: nodewright-operator
      namespace: privileged-nodewright-operator
      preManifestFiles:
        - components/nodewright-operator/manifests/talos-namespace.yaml
