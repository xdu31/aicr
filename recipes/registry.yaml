# Component Registry - Declarative configuration for all AICR components
#
# This file defines the bundler configuration for each component.
# Adding a new component only requires adding an entry here - no Go code needed.
#
# Fields:
#   name:              Component identifier used in recipes (e.g., "gpu-operator")
#   displayName:       Human-readable name for templates and output
#   valueOverrideKeys: Alternative keys for --set flag (e.g., --set gpuoperator:key=value)
#   helm:              Default Helm chart settings (for Helm components)
#     defaultRepository: Helm repository URL
#     defaultChart:      Chart name (e.g., "nvidia/gpu-operator")
#     defaultVersion:    Default chart version if not specified in recipe
#   kustomize:         Default Kustomize settings (for Kustomize components)
#     defaultSource:     Git repository or OCI reference
#     defaultPath:       Path within the repository to the kustomization
#     defaultTag:        Git tag, branch, or commit
#   testTier:          Optional override for component test tier detection
#                      (scheduling, deploy, or gpu-aware). Used by tools/component-test/.
#   nodeScheduling:    Paths in Helm values where node selectors/tolerations are injected
#
# Note: A component must have either 'helm' OR 'kustomize' configuration, not both.
# Node scheduling paths define WHERE CLI flags like --system-node-selector are applied.
# The actual values come from CLI flags, not from this file.
#
apiVersion: aicr.nvidia.com/v1alpha1
kind: ComponentRegistry

components:
  - name: nfd
    displayName: Node Feature Discovery
    valueOverrideKeys:
      - nfd
    healthCheck:
      assertFile: checks/nfd/health-check.yaml
    helm:
      defaultRepository: https://kubernetes-sigs.github.io/node-feature-discovery/charts
      defaultChart: node-feature-discovery
      defaultVersion: "0.18.3"
      defaultNamespace: node-feature-discovery
    nodeScheduling:
      system:
        nodeSelectorPaths:
          - master.nodeSelector
          - gc.nodeSelector
        tolerationPaths:
          - master.tolerations
          - gc.tolerations
          # Worker also inherits system tolerations — the DaemonSet must
          # run on tainted system nodes (not just GPU nodes) to publish
          # hardware features cluster-wide.
          - worker.tolerations
          - topologyUpdater.tolerations
      accelerated:
        # Worker and topologyUpdater intentionally excluded from
        # accelerated nodeSelector — both must run on ALL nodes:
        # worker discovers hardware features, topologyUpdater publishes
        # NUMA topology. Tolerations still applied so they can land on
        # tainted GPU nodes.
        tolerationPaths:
          - worker.tolerations
          - topologyUpdater.tolerations

  - name: gpu-operator
    displayName: gpu-operator
    valueOverrideKeys:
      - gpuoperator
    healthCheck:
      assertFile: checks/gpu-operator/health-check.yaml
    helm:
      defaultRepository: https://helm.ngc.nvidia.com/nvidia
      defaultChart: nvidia/gpu-operator
      defaultVersion: v26.3.1
      defaultNamespace: gpu-operator
    nodeScheduling:
      system:
        nodeSelectorPaths:
          - operator.nodeSelector
        tolerationPaths:
          - operator.tolerations
      accelerated:
        nodeSelectorPaths:
          - daemonsets.nodeSelector
        tolerationPaths:
          - daemonsets.tolerations
    validations:
      - function: CheckHostMofedWithoutNetworkOperator
        severity: warning
        conditions:
          service:
            - aks
        message: "Add --set gpuoperator:driver.rdma.useHostMofed=false when disabling network-operator."

  - name: network-operator
    displayName: network-operator
    valueOverrideKeys:
      - networkoperator
    healthCheck:
      assertFile: checks/network-operator/health-check.yaml
    helm:
      defaultRepository: https://helm.ngc.nvidia.com/nvidia
      defaultChart: nvidia/network-operator
      defaultVersion: "26.1.1"
      defaultNamespace: nvidia-network-operator
    nodeScheduling:
      system:
        nodeSelectorPaths:
          - operator.nodeSelector
        tolerationPaths:
          - operator.tolerations

  - name: gke-nccl-tcpxo
    displayName: gke-nccl-tcpxo
    valueOverrideKeys:
      - gkenccltcpxo
    helm:
      # Manifest-only component - no external Helm chart, uses manifestFiles
      defaultRepository: ""
      defaultNamespace: kube-system

  - name: aws-efa
    displayName: aws-efa
    valueOverrideKeys:
      - awsefa
      - efa
    healthCheck:
      assertFile: checks/aws-efa/health-check.yaml
    helm:
      defaultRepository: https://aws.github.io/eks-charts
      defaultChart: aws-efa-k8s-device-plugin
      defaultVersion: v0.5.26
      defaultNamespace: kube-system
    nodeScheduling:
      accelerated:
        nodeSelectorPaths:
          - nodeSelector
        tolerationPaths:
          - tolerations

  - name: cert-manager
    displayName: cert-manager
    valueOverrideKeys:
      - certmanager
    healthCheck:
      assertFile: checks/cert-manager/health-check.yaml
    helm:
      defaultRepository: https://charts.jetstack.io
      defaultChart: jetstack/cert-manager
      defaultVersion: v1.20.2
      defaultNamespace: cert-manager
    nodeScheduling:
      system:
        nodeSelectorPaths:
          - nodeSelector
          - webhook.nodeSelector
          - cainjector.nodeSelector
          - startupapicheck.nodeSelector
        tolerationPaths:
          - tolerations
          - webhook.tolerations
          - cainjector.tolerations
          - startupapicheck.tolerations

  - name: nodewright-operator
    displayName: nodewright
    valueOverrideKeys:
      - nodewright
      - skyhook
    healthCheck:
      assertFile: checks/nodewright-operator/health-check.yaml
    helm:
      defaultRepository: https://helm.ngc.nvidia.com/nvidia/skyhook
      defaultChart: skyhook-operator
      defaultVersion: v0.15.1
      defaultNamespace: skyhook
    nodeScheduling:
      nodeCountPaths:
        - estimatedNodeCount
      system:
        nodeSelectorPaths:
          - controllerManager.selectors
        tolerationPaths:
          - controllerManager.tolerations
      accelerated:
        taintStrPaths:
          - controllerManager.manager.env.runtimeRequiredTaint

  - name: nodewright-customizations
    displayName: nodewright-customizations
    valueOverrideKeys:
      - nodewrightcustomizations
      - skyhookcustomizations
    healthCheck:
      assertFile: checks/nodewright-customizations/health-check.yaml
    helm:
      # Manifest-only component - no external Helm chart, uses manifestFiles
      defaultRepository: ""
      defaultNamespace: skyhook
    nodeScheduling:
      accelerated:
        nodeSelectorPaths:
          - acceleratedNodeSelector
        tolerationPaths:
          - acceleratedTolerations
    podScheduling:
      workload:
        workloadSelectorPaths:
          - workloadSelector
    validations:
      - function: CheckWorkloadSelectorMissing
        severity: info
        conditions:
          intent:
            - training
        message: "This may cause nodewright to evict running training jobs. Consider setting --workload-selector to prevent eviction."
      - function: CheckAcceleratedSelectorMissing
        severity: info
        conditions:
          intent:
            - training
            - inference
        message: "Without this selector, the customization will run on all nodes. Consider setting --accelerated-node-selector to target specific nodes."

  - name: nvsentinel
    displayName: nvsentinel
    valueOverrideKeys:
      - nv-sentinel
    healthCheck:
      assertFile: checks/nvsentinel/health-check.yaml
    helm:
      defaultRepository: oci://ghcr.io/nvidia
      defaultChart: nvsentinel
      defaultVersion: v1.3.0
      defaultNamespace: nvsentinel
    nodeScheduling:
      system:
        nodeSelectorPaths:
          - global.systemNodeSelector
        tolerationPaths:
          - global.systemNodeTolerations

  - name: nvidia-dra-driver-gpu
    displayName: nvidia-dra-driver-gpu
    valueOverrideKeys:
      - dradriver
    healthCheck:
      assertFile: checks/nvidia-dra-driver-gpu/health-check.yaml
    helm:
      defaultRepository: https://helm.ngc.nvidia.com/nvidia
      defaultChart: nvidia/nvidia-dra-driver-gpu
      defaultVersion: "25.12.0"
      defaultNamespace: nvidia-dra-driver
    nodeScheduling:
      system:
        nodeSelectorPaths:
          - controller.nodeSelector
        tolerationPaths:
          - controller.tolerations
      accelerated:
        nodeSelectorPaths:
          - kubeletPlugin.nodeSelector
        tolerationPaths:
          - kubeletPlugin.tolerations

  - name: kube-prometheus-stack
    displayName: kube-prometheus-stack
    valueOverrideKeys:
      - prometheus
      - kubeprometheusstack
    healthCheck:
      assertFile: checks/kube-prometheus-stack/health-check.yaml
    helm:
      defaultRepository: https://prometheus-community.github.io/helm-charts
      defaultChart: prometheus-community/kube-prometheus-stack
      defaultVersion: 84.4.0
      defaultNamespace: monitoring
    nodeScheduling:
      system:
        nodeSelectorPaths:
          - prometheus.prometheusSpec.nodeSelector
          - alertmanager.alertmanagerSpec.nodeSelector
          - grafana.nodeSelector
          - prometheusOperator.nodeSelector
          - prometheusOperator.admissionWebhooks.patch.nodeSelector
          - kube-state-metrics.nodeSelector
          - prometheus-node-exporter.nodeSelector
          - thanosRuler.thanosRulerSpec.nodeSelector
        tolerationPaths:
          - prometheus.prometheusSpec.tolerations
          - alertmanager.alertmanagerSpec.tolerations
          - grafana.tolerations
          - prometheusOperator.tolerations
          - prometheusOperator.admissionWebhooks.patch.tolerations
          - kube-state-metrics.tolerations
          - prometheus-node-exporter.tolerations
          - thanosRuler.thanosRulerSpec.tolerations
    storageClassPaths:
      - prometheus.prometheusSpec.storageSpec.volumeClaimTemplate.spec.storageClassName

  - name: prometheus-adapter
    displayName: prometheus-adapter
    valueOverrideKeys:
      - prometheusadapter
    healthCheck:
      assertFile: checks/prometheus-adapter/health-check.yaml
    helm:
      defaultRepository: https://prometheus-community.github.io/helm-charts
      defaultChart: prometheus-community/prometheus-adapter
      defaultVersion: 5.3.0
      defaultNamespace: monitoring
    nodeScheduling:
      system:
        nodeSelectorPaths:
          - nodeSelector
        tolerationPaths:
          - tolerations

  - name: aws-ebs-csi-driver
    displayName: aws-ebs-csi-driver
    valueOverrideKeys:
      - ebscsidriver
      - awsebscsidriver
    healthCheck:
      assertFile: checks/aws-ebs-csi-driver/health-check.yaml
    helm:
      defaultRepository: https://kubernetes-sigs.github.io/aws-ebs-csi-driver
      defaultChart: aws-ebs-csi-driver/aws-ebs-csi-driver
      defaultVersion: 2.59.0
      defaultNamespace: kube-system
    nodeScheduling:
      system:
        nodeSelectorPaths:
          - controller.nodeSelector
        tolerationPaths:
          - controller.tolerations
          - node.tolerations
      accelerated:
        # No nodeSelectorPaths — CSI node DaemonSet must run on ALL nodes
        # (not just GPU nodes) since any node may need EBS volumes.
        tolerationPaths:
          - node.tolerations

  - name: k8s-ephemeral-storage-metrics
    displayName: k8s-ephemeral-storage-metrics
    valueOverrideKeys:
      - k8sephemeralstoragemetrics
    healthCheck:
      assertFile: checks/k8s-ephemeral-storage-metrics/health-check.yaml
    helm:
      defaultRepository: https://jmcgrath207.github.io/k8s-ephemeral-storage-metrics/chart
      defaultChart: k8s-ephemeral-storage-metrics/k8s-ephemeral-storage-metrics
      defaultVersion: "1.19.2"
      defaultNamespace: monitoring
    nodeScheduling:
      system:
        nodeSelectorPaths:
          - nodeSelector
        tolerationPaths:
          - tolerations

  - name: kai-scheduler
    displayName: kai-scheduler
    valueOverrideKeys:
      - kaischeduler
    healthCheck:
      assertFile: checks/kai-scheduler/health-check.yaml
    helm:
      defaultRepository: oci://ghcr.io/kai-scheduler/kai-scheduler
      defaultChart: kai-scheduler
      defaultVersion: v0.14.1
      defaultNamespace: kai-scheduler
    nodeScheduling:
      system:
        nodeSelectorPaths:
          - global.nodeSelector
        tolerationPaths:
          - global.tolerations

  - name: grove
    displayName: grove
    valueOverrideKeys:
      - grove
    helm:
      defaultRepository: oci://ghcr.io/ai-dynamo/grove
      defaultChart: grove-charts
      defaultVersion: "v0.1.0-alpha.6"
      defaultNamespace: dynamo-system
    nodeScheduling:
      system:
        nodeSelectorPaths:
          - nodeSelector
        tolerationPaths:
          - tolerations

  - name: dynamo-platform
    displayName: dynamo-platform
    valueOverrideKeys:
      - dynamoplatform
      - dynamo
    healthCheck:
      assertFile: checks/dynamo-platform/health-check.yaml
    helm:
      defaultRepository: https://helm.ngc.nvidia.com/nvidia/ai-dynamo
      defaultChart: dynamo-platform
      defaultVersion: "1.0.2"
      defaultNamespace: dynamo-system
    nodeScheduling:
      system:
        nodeSelectorPaths:
          - dynamo-operator.controllerManager.nodeSelector
        tolerationPaths:
          - dynamo-operator.controllerManager.tolerations

  - name: agentgateway-crds
    displayName: agentgateway-crds
    valueOverrideKeys:
      - agentgatewaycrds
    helm:
      defaultRepository: oci://cr.agentgateway.dev/charts
      defaultChart: agentgateway-crds
      defaultVersion: v2.2.1
      defaultNamespace: agentgateway-system

  - name: agentgateway
    displayName: agentgateway
    valueOverrideKeys:
      - agentgateway
    healthCheck:
      assertFile: checks/agentgateway/health-check.yaml
    helm:
      defaultRepository: oci://cr.agentgateway.dev/charts
      defaultChart: agentgateway
      defaultVersion: v2.2.1
      defaultNamespace: agentgateway-system
    nodeScheduling:
      system:
        nodeSelectorPaths:
          - nodeSelector
        tolerationPaths:
          - tolerations

  - name: k8s-nim-operator
    displayName: k8s-nim-operator
    valueOverrideKeys:
      - nimoperator
      - nim
    healthCheck:
      assertFile: checks/k8s-nim-operator/health-check.yaml
    helm:
      defaultRepository: https://helm.ngc.nvidia.com/nvidia
      defaultChart: k8s-nim-operator
      defaultVersion: "3.1.0"
      defaultNamespace: nvidia-nim
    nodeScheduling:
      system:
        nodeSelectorPaths:
          - operator.nodeSelector
        tolerationPaths:
          - operator.tolerations

  - name: kueue
    displayName: kueue
    valueOverrideKeys:
      - kueue
    healthCheck:
      assertFile: checks/kueue/health-check.yaml
    helm:
      defaultRepository: oci://registry.k8s.io/kueue/charts
      defaultChart: kueue
      defaultVersion: "0.17.1"
      defaultNamespace: kueue-system
    nodeScheduling:
      system:
        nodeSelectorPaths:
          - controllerManager.nodeSelector
        tolerationPaths:
          - controllerManager.tolerations

  - name: kubeflow-trainer
    displayName: kubeflow-trainer
    valueOverrideKeys:
      - kubeflowtrainer
      - trainer
    healthCheck:
      assertFile: checks/kubeflow-trainer/health-check.yaml
    helm:
      defaultRepository: oci://ghcr.io/kubeflow/charts
      defaultChart: kubeflow-trainer
      defaultVersion: 2.2.0
      defaultNamespace: kubeflow
    nodeScheduling:
      system:
        nodeSelectorPaths:
          - manager.nodeSelector
          - jobset.controller.nodeSelector
        tolerationPaths:
          - manager.tolerations
          - jobset.controller.tolerations
      # accelerated paths target top-level keys; consumed by the
      # torch-distributed ClusterTrainingRuntime template in
      # components/kubeflow-trainer/manifests/. Lets users submit a bare
      # TrainJob with no podTemplateOverrides / runtimePatches — the
      # runtime carries the per-cluster scheduling baked in at bundle time.
      accelerated:
        nodeSelectorPaths:
          - acceleratedNodeSelector
        tolerationPaths:
          - acceleratedTolerations

  - name: slinky-slurm-operator-crds
    displayName: slinky-slurm-operator-crds
    valueOverrideKeys:
      - slinkyslurmoperatorcrds
      - slurmoperatorcrds
    helm:
      defaultRepository: oci://ghcr.io/slinkyproject/charts
      defaultChart: slurm-operator-crds
      defaultVersion: "1.1.0"
      defaultNamespace: slinky

  - name: slinky-slurm-operator
    displayName: slinky-slurm-operator
    # The short alias `slurm` is reserved here for the operator. When the Slinky `slurm`
    # cluster chart (oci://ghcr.io/slinkyproject/charts/slurm) is added
    # to AICR, we will assign it a distinct short alias (e.g.
    # `slurm-cluster`) so `slurm` continues to route to the operator.
    valueOverrideKeys:
      - slinkyslurmoperator
      - slurmoperator
      - slurm
    healthCheck:
      assertFile: checks/slinky-slurm-operator/health-check.yaml
    helm:
      defaultRepository: oci://ghcr.io/slinkyproject/charts
      defaultChart: slurm-operator
      # When bumping defaultVersion, re-verify the assumptions baked into
      # components/slinky-slurm-operator/values.yaml against the new chart's
      # values.yaml — in particular that `certManager.enabled: true` and
      # `crds.enabled: false` still match the chart defaults. The values
      # file mirrors the chart defaults explicitly for documentation, but
      # an upstream default flip would otherwise pass through unnoticed.
      defaultVersion: "1.1.0"
      defaultNamespace: slinky
    nodeScheduling:
      system:
        # slurm-operator chart v1.1.0 templates only render
        # operator.{affinity,tolerations} and webhook.{affinity,tolerations}.
        # Setting operator.nodeSelector / webhook.nodeSelector is silently
        # dropped by the chart, so AICR's --system-node-selector flag is a
        # no-op for this component until a chart release that includes
        # https://github.com/SlinkyProject/slurm-operator/pull/187 lands.
        # Once that PR merges and a new chart is published, add
        # `nodeSelectorPaths: [operator.nodeSelector, webhook.nodeSelector]`
        # here and bump defaultVersion above. Workaround in the meantime:
        # pin nodes via valuesFile overrides on
        # operator.affinity.nodeAffinity / webhook.affinity.nodeAffinity.
        tolerationPaths:
          - operator.tolerations
          - webhook.tolerations
