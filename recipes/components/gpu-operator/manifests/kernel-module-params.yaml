# Kernel Module Params ConfigMap for GPU Operator (GB200)
# Generated by aicr - included via Helm per-component bundle for GB200 accelerator
#
# This ConfigMap contains kernel module parameters required for GB200 accelerator.
# The nvidia.conf file sets NVreg_GrdmaPciTopoCheckOverride=1 which is needed
# for proper RDMA/PCIe topology handling on GB200 systems.
{{- $gpuOp := index .Values "gpu-operator" }}
{{- if and $gpuOp $gpuOp.driver $gpuOp.driver.kernelModuleConfig $gpuOp.driver.kernelModuleConfig.name }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $gpuOp.driver.kernelModuleConfig.name | default "kernel-module-params" }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ printf "%s-%s" .Chart.Name .Chart.Version | replace "+" "_" | trunc 63 | trimSuffix "-" }}
data:
  nvidia.conf: |
    options nvidia NVreg_GrdmaPciTopoCheckOverride=1
{{- end }}