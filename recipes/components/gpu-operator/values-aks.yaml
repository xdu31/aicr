# GPU Operator Helm values
# AKS base configuration overrides
#
# By default, GPU Operator manages the NVIDIA driver. Create nodepools
# with `--gpu-driver none` to prevent AKS from also installing drivers.
# To use the AKS-managed driver instead, set driver.enabled to false.
# See https://learn.microsoft.com/en-us/azure/aks/nvidia-gpu-operator
#
# Reference: https://github.com/Azure/aks-rdma-infiniband/blob/main/configs/values/gpu-operator/values.yaml

# NFD is deployed as a standalone shared component from the base recipe.
# Both network-operator and gpu-operator disable their sub-chart copies
# to avoid running duplicate NFD DaemonSets.
nfd:
  enabled: false

# Re-enable GPUDirect RDMA. The AKS overlay deploys network-operator,
# which installs MOFED kernel modules on the host (ND-series InfiniBand
# nodes). useHostMofed: true tells gpu-operator's driver container to
# bind nvidia_peermem against the host's MOFED symbols instead of
# building its own bundled MOFED — required for the network-operator
# integration to actually work end-to-end. The global default in
# components/gpu-operator/values.yaml is off because EFA / non-MOFED
# fabrics trip v26.3.1's driver-validation gate.
driver:
  rdma:
    enabled: true
    useHostMofed: true

