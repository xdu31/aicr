# GPU Operator Helm values
# AKS base configuration overrides
#
# By default, GPU Operator manages the NVIDIA driver. Create nodepools
# with `--gpu-driver none` to prevent AKS from also installing drivers.
# To use the AKS driver-only install profile instead (AKS installs the
# driver), set driver.enabled=false, toolkit.enabled=false, and
# operator.runtimeClass=nvidia-container-runtime together — never just
# one of them. See docs/integrator/aks-gpu-setup.md and
# https://learn.microsoft.com/en-us/azure/aks/nvidia-gpu-operator
#
# Reference: https://github.com/Azure/aks-rdma-infiniband/blob/main/configs/values/gpu-operator/values.yaml

# NFD is deployed as a standalone shared component from the base recipe.
# Both network-operator and gpu-operator disable their sub-chart copies
# to avoid running duplicate NFD DaemonSets.
nfd:
  enabled: false

# Network Operator supplies MOFED through its OFED driver container
# (doca-driver, see network-operator/manifests/nic-cluster-policy-aks.yaml).
# Although that container loads modules into the host kernel, this is NOT
# host-preinstalled MOFED — useHostMofed describes how MOFED is installed
# and coordinated, not where its modules execute. Keep useHostMofed false
# so the GPU Operator driver container builds nvidia_peermem against the
# containerized MOFED stack; true can cause an ib_core symbol mismatch
# (modprobe nvidia-peermem: Invalid argument, observed on aicr-test1).
# This stays false regardless of driver ownership mode: with
# driver.enabled=false it is inert, but the correct value prevents a
# future ownership-mode change from reviving the bug.
driver:
  rdma:
    enabled: true
    useHostMofed: false

