# Kube Prometheus Stack Helm values
# Comprehensive monitoring stack with Prometheus, Grafana, and AlertManager

# CRDs are installed by the sibling prometheus-operator-crds release.
# Splitting them out breaks the helm-diff self-reference where this
# chart's own templates create CRs of kinds defined by its bundled
# `crds` subchart. See registry.yaml for the full rationale (issue #914).
crds:
  enabled: false

# Override release name prefix to avoid aicr-stack- prefix in resource names
fullnameOverride: kube-prometheus

# Prometheus configuration
prometheus:
  prometheusSpec:
    # Discover ServiceMonitors across all namespaces (e.g., dcgm-exporter in nvidia-gpu-operator)
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorNamespaceSelector: {}

    # Resource configuration
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2
        memory: 2Gi

    # Storage configuration
    # Use emptyDir for local testing (no PVC required, data lost on pod restart)
    # For EKS deployments with persistent storage, this is overridden via overlay.
    storageSpec:
      emptyDir:
        medium: ""
        sizeLimit: 10Gi

    # Data retention
    retention: 15d

# Grafana configuration
grafana:
  enabled: true
  fullnameOverride: grafana
  adminPassword: admin  # Change in production
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# AlertManager configuration
alertmanager:
  enabled: true
  alertmanagerSpec:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

# Node Exporter - for node-level metrics
nodeExporter:
  enabled: true
prometheus-node-exporter:
  fullnameOverride: prometheus-node-exporter

# kube-state-metrics - for Kubernetes object metrics
kube-state-metrics:
  fullnameOverride: kube-state-metrics
