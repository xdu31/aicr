# Nodewright EKS Ubuntu GPU Customization (no-op)
# Minimal templating - only tolerations/nodeSelectors are dynamic for CLI flag support
#
# No-op placeholder for accelerators without tuning packages.
# - GRUB parameters for hugepages and nokaslr
# - Containerd service limits
# - Sysctl kernel tuning parameters
{{- $cust := index .Values "nodewright-customizations" }}
{{- if ne (toString (index $cust "enabled")) "false" }}
---
apiVersion: skyhook.nvidia.com/v1alpha1
kind: Skyhook
metadata:
  annotations:
    # Helm hooks ensure this CR is applied after the Skyhook CRD is installed
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation
  labels:
    app.kubernetes.io/part-of: skyhook-operator
    app.kubernetes.io/created-by: aicr
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ printf "%s-%s" .Chart.Name .Chart.Version | replace "+" "_" | trunc 63 | trimSuffix "-" }}
  name: no-op
  namespace: {{ .Release.Namespace }}
spec:
  runtimeRequired: true
  # Default: true. Disable with --set nodewrightcustomizations:autoTaintNewNodes=false
  autoTaintNewNodes: {{ ne (toString ($cust.autoTaintNewNodes | default true)) "false" }}
  # Dynamic: Supports --accelerated-node-toleration CLI flag
  additionalTolerations:
    {{- if $cust.acceleratedTolerations }}
    {{- toYaml $cust.acceleratedTolerations | nindent 4 }}
    {{- else }}
    - key: dedicated
      operator: Exists
    {{- end }}
  # Dynamic: Supports --accelerated-node-selector CLI flag
  {{- if $cust.acceleratedNodeSelector }}
  nodeSelectors:
    matchLabels:
      {{- toYaml $cust.acceleratedNodeSelector | nindent 6 }}
  {{- end }}
  # Static: No-op placeholder for accelerators without tuning packages
  packages:
    no-op:
      image: ghcr.io/nvidia/skyhook-packages/shellscript
      version: 1.1.1
      configMap:
        apply.sh: |
          #!/bin/bash
          echo "No-op package applied"
{{- end }}
