# Nodewright Ubuntu GPU Customization (EKS and AKS)
# Minimal templating - only tolerations/nodeSelectors are dynamic for CLI flag support
#
# This customization configures GPU nodes on Ubuntu with:
# - GRUB parameters for hugepages and nokaslr
# - Containerd service limits
# - Sysctl kernel tuning parameters
{{- $cust := index .Values "nodewright-customizations" }}
{{- if ne (toString (index $cust "enabled")) "false" }}
---
apiVersion: skyhook.nvidia.com/v1alpha1
kind: Skyhook
metadata:
  annotations:
    # Helm hooks ensure this CR is applied after the Skyhook CRD is installed
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation
  labels:
    app.kubernetes.io/part-of: skyhook-operator
    app.kubernetes.io/created-by: aicr
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ printf "%s-%s" .Chart.Name .Chart.Version | replace "+" "_" | trunc 63 | trimSuffix "-" }}
  name: tuning
  namespace: {{ .Release.Namespace }}
spec:
  runtimeRequired: true
  # Default: true. Disable with --set nodewrightcustomizations:autoTaintNewNodes=false
  autoTaintNewNodes: {{ ne (toString ($cust.autoTaintNewNodes | default true)) "false" }}
  # Dynamic: Supports --accelerated-node-toleration CLI flag
  additionalTolerations:
    {{- if $cust.acceleratedTolerations }}
    {{- toYaml $cust.acceleratedTolerations | nindent 4 }}
    {{- else }}
    # Tolerate-all default, matching ParseTolerations()/DefaultTolerations()
    # (operator Exists, no key). Only reached if no acceleratedTolerations are
    # injected from scheduling defaults/flags — note the default `aicr bundle`
    # path always injects the same wildcard via DefaultTolerations(), so the
    # rendered CR carries it either way.
    # AKS caveat: AKS admission collapses a pod toleration list to just the
    # wildcard when one is present, which defeats the nodewright operator
    # drain exemption for its own package pods and deadlocks packages that
    # declare interrupts (NVIDIA/nodewright#296). On AKS always inject keyed
    # acceleratedTolerations (for example nvidia.com/gpu). The
    # CheckWildcardAcceleratedToleration bundle-time validation (registry.yaml,
    # service: aks) blocks the bundle (severity: error) when the effective
    # tolerations include a wildcard, unless the component is disabled via --set.
    - operator: Exists
    {{- end }}
  # Dynamic: Supports --accelerated-node-selector CLI flag
  {{- if $cust.acceleratedNodeSelector }}
  nodeSelectors:
    matchLabels:
      {{- toYaml $cust.acceleratedNodeSelector | nindent 6 }}
  {{- end }}
  # Dynamic: Supports --workload-selector CLI flag
  {{- if $cust.workloadSelector }}
  podNonInterruptLabels:
    matchLabels:
      {{- toYaml $cust.workloadSelector | nindent 6 }}
  {{- end }}
  # Tuning
  packages:
    # Check for kernel being >= to 6.17.0-1019 and if not install.
    # On AKS this package is a designed no-op: the aks defaults omit KERNEL
    # (AKS manages its own Ubuntu kernel) and ensure_kernel exits early.
    nvidia-setup-kernel:
      image: ghcr.io/nvidia/nodewright-packages/nvidia-setup
      version: "0.5.0"
      containerSHA: sha256:f3994267c9b5e62fb7720012dcd4d473fc2f8474f4276e203bba842c970307ad
      configMap:
        {{- if $cust.service }}
        service: {{ $cust.service }}
        {{- end }}
        accelerator: {{ $cust.accelerator }}
      env:
        - name: NVIDIA_SETUP_INSTALL_KERNEL
          value: "true"
        - name: NVIDIA_SETUP_KERNEL_ALLOW_NEWER
          value: "false"
      resources:
        cpuLimit: 4000m
        cpuRequest: 2000m
        memoryLimit: 8192Mi
        memoryRequest: 4096Mi

    nvidia-tuned:
      image: ghcr.io/nvidia/nodewright-packages/nvidia-tuned
      version: "0.3.1"
      containerSHA: sha256:6dedbbb8627dec88acdfd68867f60a3ddca88e5f4c62beddfb704a8e0cfe51d1
      interrupt:
        type: reboot
      env:
        - name: INTERRUPT
          value: "true"
      configMap:
        {{- if $cust.intent }}
        intent: {{ $cust.intent }}
        {{- end }}
        accelerator: {{ $cust.accelerator }}
        {{- if $cust.service }}
        service: {{ $cust.service }}
        {{- end }}
      dependsOn:
        nvidia-setup-kernel: "0.5.0"

    # Full setup after kernel is in place
    nvidia-setup-full:
      image: ghcr.io/nvidia/nodewright-packages/nvidia-setup
      version: "0.5.0"
      containerSHA: sha256:f3994267c9b5e62fb7720012dcd4d473fc2f8474f4276e203bba842c970307ad
      interrupt:
        type: reboot
      resources:
        # Elevated from 4000m/8192Mi for the EFA DKMS build. efa_installer.sh's
        # "Inspecting kernel" autoconf is a highly parallel kernel-module build;
        # inside the skyhook chroot nproc reports the host core count, so make -j
        # oversubscribes. Under the prior 4 CPU / 8Gi cgroup it was CFS-throttled
        # and its feature probes were starved/OOM-killed, so efa misdetected the
        # kernel and emitted compat shims that fail to compile on 6.17. More CPU
        # and memory headroom lets the probes complete and detect correctly.
        cpuLimit: 8000m
        cpuRequest: 4000m
        memoryLimit: 16384Mi
        memoryRequest: 8192Mi
      configMap:
        {{- if $cust.service }}
        service: {{ $cust.service }}
        {{- end }}
        accelerator: {{ $cust.accelerator }}
      env:
        - name: NVIDIA_SETUP_INSTALL_KERNEL
          value: "false"
      dependsOn:
        nvidia-tuned: "0.3.1"
{{- end }}
