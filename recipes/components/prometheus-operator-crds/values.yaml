# Prometheus Operator CRDs Helm values
# Installs the prometheus-operator CRDs that kube-prometheus-stack (and
# any sibling chart creating ServiceMonitor / PodMonitor / Prometheus /
# Alertmanager / etc. CRs) depends on. CRDs live under
# monitoring.coreos.com/v1: Alertmanager, AlertmanagerConfig, PodMonitor,
# Probe, Prometheus, PrometheusRule, ServiceMonitor, ThanosRuler.
#
# This chart has no configurable values upstream — it only installs CRDs.
# `enabled: true` below follows the AICR umbrella convention used by other
# CRD-only components (see components/agentgateway-crds/values.yaml,
# components/slinky-slurm-operator-crds/values.yaml). It is consumed by
# the AICR bundler to mark the component for inclusion; the upstream
# chart itself ignores this value.
enabled: true
