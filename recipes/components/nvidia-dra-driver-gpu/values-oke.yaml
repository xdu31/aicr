# NVIDIA DRA Driver GPU Helm values
# OKE configuration overrides
#
# OKE pre-installs NVIDIA drivers on GPU bare-metal shapes, so the driver
# root is `/` (host-installed) rather than `/run/nvidia/driver` (containerized).
# Compute domains are enabled for multi-node training coordination.
# Reference: https://github.com/oracle-quickstart/oci-hpc-oke/blob/grace-blackwell/manifests/dra/values.yaml

# See values.yaml for why both nameOverride and fullnameOverride are pinned.
nameOverride: nvidia-dra-driver-gpu
fullnameOverride: nvidia-dra-driver-gpu

# Host-installed driver (OKE pre-installs NVIDIA drivers)
nvidiaDriverRoot: /

gpuResourcesEnabledOverride: true
resources:
  gpus:
    enabled: true
  computeDomains:
    enabled: true

controller:
  priorityClassName: ""
kubeletPlugin:
  priorityClassName: ""
