# Node Feature Discovery OCP CR values
#
# Structure mirrors nfd/values.yaml where fields overlap for side-by-side
# comparison. The template maps these into the NodeFeatureDiscovery CR spec.

name: nfd-instance
namespace: openshift-nfd

instance: ''

operand:
  servicePort: 12000

prunerOnDelete: false

# Maps to nfd/values.yaml topologyUpdater.enable
topologyUpdater: false

workerConfig:
  configData: |
    core:
      sleepInterval: 60s
    sources:
      pci:
        deviceClassWhitelist:
          - "02"
          - "03"
          - "0200"
          - "0207"
          - "12"
        deviceLabelFields:
          - "vendor"

# --- Fields present in nfd/values.yaml but NOT in NodeFeatureDiscovery CR ---
# enableNodeFeatureApi: Helm chart setting; OCP operator enables this by default.
# master.enable: OCP operator always deploys the master controller.
# worker.enable: OCP operator always deploys the worker DaemonSet.
# topologyUpdater.createCRDs: OCP operator manages CRDs via OLM.
# topologyUpdater.kubeletStateDir: OCP operator configures this internally.
# gc.enable: OCP operator manages garbage collection internally.
