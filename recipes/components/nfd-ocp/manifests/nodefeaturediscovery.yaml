{{- $v := index .Values "nfd-ocp" }}
apiVersion: nfd.openshift.io/v1
kind: NodeFeatureDiscovery
metadata:
  name: {{ $v.name }}
  namespace: {{ $v.namespace }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "10"
    helm.sh/hook-delete-policy: before-hook-creation
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  instance: {{ $v.instance | quote }}
  operand:
    servicePort: {{ $v.operand.servicePort }}
  prunerOnDelete: {{ $v.prunerOnDelete }}
  topologyUpdater: {{ $v.topologyUpdater }}
  workerConfig:
    configData: {{ $v.workerConfig.configData | quote }}
