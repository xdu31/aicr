# IB Node Configuration DaemonSet for AKS InfiniBand RDMA
#
# Performs one-time host-level setup required for RDMA on AKS ND-series nodes:
#   - Loads ib_umad, rdma_ucm, ib_ucm kernel modules
#   - Persists module loading via /etc/modules-load.d
#   - Sets LimitMEMLOCK=infinity on containerd and kubelet systemd units
#     so container processes inherit an unlimited memlock rlimit, removing
#     the need for IPC_LOCK in workload pod specs
#   - Restarts containerd and kubelet to apply the memlock limit
#
# nodeSelector targets nodes labeled by nfd-network-rule (pci-15b3.present=true)
# so this only runs on IB-capable nodes, not CPU-only nodes.
#
# TODO: Remove once Nodewright (formerly Skyhook) gains AKS support and can
#       handle host-level tuning via the nvidia-tuned package. Nodewright is
#       adding AKS configs (NVIDIA/nodewright-packages#39) but RDMA/MEMLOCK
#       setup is not yet included. Track upstream progress and replace this
#       DaemonSet with a Nodewright SkyhookPackage once available.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ib-node-config-settings
  namespace: kube-system
data:
  # Set to "false" to skip IB host setup on new/restarted nodes without
  # removing the DaemonSet. After patching, restart the DaemonSet to apply:
  #   kubectl rollout restart ds/ib-node-config -n kube-system
  enabled: "true"
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ib-node-config
  namespace: kube-system
  labels:
    app: ib-node-config
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
spec:
  selector:
    matchLabels:
      app: ib-node-config
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: ib-node-config
    spec:
      hostNetwork: true
      hostPID: true
      nodeSelector:
        feature.node.kubernetes.io/pci-15b3.present: "true"
      tolerations:
      - operator: Exists
      volumes:
      - name: ib-node-config-settings
        configMap:
          name: ib-node-config-settings
      initContainers:
      - name: ib-setup
        image: busybox:1.38@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
        securityContext:
          privileged: true
        volumeMounts:
        - name: ib-node-config-settings
          mountPath: /etc/ib-node-config
          readOnly: true
        command:
        - sh
        - -c
        - |
          echo "=== IB Node Configuration ==="

          # Kill switch: skip host setup when disabled via ConfigMap.
          ENABLED=$(cat /etc/ib-node-config/enabled 2>/dev/null || echo "true")
          if [ "$ENABLED" != "true" ]; then
            echo "=== IB node config disabled via ConfigMap, skipping ==="
            exit 0
          fi

          # Short-circuit: verify both config files AND runtime state.
          # Files alone are insufficient — a prior run may have crashed between
          # writing drop-ins and completing the service restarts.
          if nsenter -t 1 -m -u -i -n -- sh -c '
            [ -f /etc/systemd/system/containerd.service.d/memlock.conf ] &&
            [ -f /etc/systemd/system/kubelet.service.d/memlock.conf ] &&
            [ -f /etc/modules-load.d/ib-umad.conf ] &&
            [ -f /etc/security/limits.d/99-ib-memlock.conf ]
          ' && \
          nsenter -t 1 -m -u -i -n -- sh -c '
            systemctl is-active containerd >/dev/null 2>&1 &&
            systemctl is-active kubelet >/dev/null 2>&1 &&
            [ "$(systemctl show containerd -p LimitMEMLOCK --value)" = "infinity" ] &&
            [ "$(systemctl show kubelet -p LimitMEMLOCK --value)" = "infinity" ]
          '; then
            echo "=== Config files present and services running with LimitMEMLOCK=infinity, skipping setup ==="
            exit 0
          fi

          # Load kernel modules — ib_umad is required; rdma_ucm and ib_ucm are
          # optional (not present on all kernel builds).
          if ! nsenter -t 1 -m -u -i -n -- modprobe ib_umad; then
            echo "FAIL: could not load ib_umad" >&2; exit 1
          fi
          nsenter -t 1 -m -u -i -n -- modprobe rdma_ucm 2>/dev/null || true
          nsenter -t 1 -m -u -i -n -- modprobe ib_ucm 2>/dev/null || true
          nsenter -t 1 -m -u -i -n -- lsmod | grep ib_umad && echo "OK: ib_umad" || echo "FAIL: ib_umad"
          nsenter -t 1 -m -u -i -n -- ls /dev/infiniband/rdma_cm && echo "OK: rdma_cm device" || echo "WARN: no rdma_cm device"

          nsenter -t 1 -m -u -i -n -- sh -c 'printf "ib_umad\nrdma_ucm\n" > /etc/modules-load.d/ib-umad.conf'
          nsenter -t 1 -m -u -i -n -- sh -c 'printf "* - memlock unlimited\nroot - memlock unlimited\n" > /etc/security/limits.d/99-ib-memlock.conf'

          nsenter -t 1 -m -u -i -n -- sh -c 'mkdir -p /etc/systemd/system/containerd.service.d && printf "[Service]\nLimitMEMLOCK=infinity\n" > /etc/systemd/system/containerd.service.d/memlock.conf'
          nsenter -t 1 -m -u -i -n -- sh -c 'mkdir -p /etc/systemd/system/kubelet.service.d && printf "[Service]\nLimitMEMLOCK=infinity\n" > /etc/systemd/system/kubelet.service.d/memlock.conf'

          if ! nsenter -t 1 -m -u -i -n -- systemctl daemon-reload; then
            echo "FAIL: systemctl daemon-reload" >&2; exit 1
          fi
          if ! nsenter -t 1 -m -u -i -n -- systemctl restart containerd; then
            echo "FAIL: systemctl restart containerd" >&2; exit 1
          fi
          if ! nsenter -t 1 -m -u -i -n -- systemctl restart kubelet; then
            echo "FAIL: systemctl restart kubelet" >&2; exit 1
          fi

          sleep 10

          nsenter -t 1 -m -u -i -n -- systemctl is-active containerd && echo "OK: containerd active" || { echo "FAIL: containerd not active after restart" >&2; exit 1; }
          nsenter -t 1 -m -u -i -n -- systemctl is-active kubelet && echo "OK: kubelet active" || { echo "FAIL: kubelet not active after restart" >&2; exit 1; }

          echo "=== Setup Complete ==="
      containers:
      - name: keepalive
        image: busybox:1.38@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
        command:
        - sh
        - -c
        - echo IB node config active; while true; do sleep 86400; done
