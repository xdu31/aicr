# agentgateway CRDs Helm values
# Installs agentgateway-specific CRDs (AgentgatewayBackend, AgentgatewayPolicy,
# AgentgatewayParameters) in the agentgateway.dev/v1alpha1 API group.
#
# Note: Standard Gateway API CRDs (GatewayClass, Gateway, HTTPRoute, GRPCRoute,
# ReferenceGrant) and Gateway API Inference Extension CRDs (InferencePool,
# InferenceObjective) must be installed separately before deploying agentgateway.
# See the upstream guide:
# https://gateway-api-inference-extension.sigs.k8s.io/guides/

# This chart has no configurable values — it only installs CRDs.
# The enabled flag is managed by the umbrella chart condition.
enabled: true
