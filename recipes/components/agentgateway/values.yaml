# agentgateway Helm values
# Kubernetes Gateway API + Gateway API Inference Extension implementation.
# Satisfies CNCF AI Conformance Advanced Ingress for AI/ML Inference requirement.
# Provides model-aware routing, weighted traffic splitting, and header-based routing
# for InferencePool backends.

# Override release name prefix to avoid aicr-stack- prefix
fullnameOverride: agentgateway

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

# Enable Gateway API Inference Extension support in the agentgateway controller.
# Required for routing to InferencePool backends.
inferenceExtension:
  enabled: true
