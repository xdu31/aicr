# GPU Operator OCP CR Health Check
#
# Validates that the ClusterPolicy CR applied by the gpu-operator-ocp
# component has reconciled to state=ready. This is the deepest signal
# that the full GPU stack (driver, toolkit, device-plugin DaemonSets,
# validators) is healthy. The operator Deployment itself is validated
# by the gpu-operator-ocp-olm health check.
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: gpu-operator-ocp-health-check
spec:
  timeouts:
    assert: 5m
  steps:
    - name: validate-cluster-policy-ready
      try:
        - assert:
            resource:
              apiVersion: nvidia.com/v1
              kind: ClusterPolicy
              metadata:
                name: cluster-policy
              status:
                state: ready
