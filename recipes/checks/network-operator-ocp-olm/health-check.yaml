# Network Operator OCP OLM Health Check — intentionally a no-op.
#
# OLM operator readiness is verified at deploy time by the bundler's
# --readiness-hooks gate (components/network-operator-ocp-olm/readiness.yaml).
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: network-operator-ocp-olm-health-check
spec:
  timeouts:
    assert: 5m
  steps: []
