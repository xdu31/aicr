# NFD OCP CR Health Check
#
# Validates that the NodeFeatureDiscovery CR applied by the nfd-ocp
# component has been accepted and its operands are available.
# The operator Deployment itself is validated by the nfd-ocp-olm
# health check.
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: nfd-ocp-health-check
spec:
  timeouts:
    assert: 5m
  steps:
    - name: validate-nfd-instance-available
      try:
        - assert:
            resource:
              apiVersion: nfd.openshift.io/v1
              kind: NodeFeatureDiscovery
              metadata:
                name: nfd-instance
                namespace: openshift-nfd
              status:
                (conditions[?type == 'Available']):
                  - status: "True"
