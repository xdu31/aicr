# EKS System Node Profile: m7i.4xlarge
#
# Intel-based general purpose instance for control plane workloads:
# - Cert-manager, Prometheus, GPU Operator controller
# - No GPU resources

apiVersion: aicr.run/v1alpha2
kind: KWOKNodeProfile
metadata:
  name: system-m7i
  labels:
    provider: eks
    nodeType: system

spec:
  # Instance specifications
  instanceType: m7i.4xlarge
  arch: amd64
  osImage: Amazon Linux 2023

  # Resource capacity
  resources:
    cpu: "16"
    memory: 64Gi
    storage: 100Gi
