# EKS Accelerated Node Profile: p5.48xlarge (H100)
#
# NVIDIA H100 GPU instance for training/inference workloads:
# - 8x NVIDIA H100 80GB HBM3 GPUs
# - 192 vCPUs, 2048 GiB memory
# - 3200 Gbps network bandwidth (EFA)

apiVersion: aicr.run/v1alpha2
kind: KWOKNodeProfile
metadata:
  name: p5-h100
  labels:
    provider: eks
    nodeType: accelerated
    accelerator: h100

spec:
  # Instance specifications
  instanceType: p5.48xlarge
  arch: amd64
  osImage: Amazon Linux 2023

  # Resource capacity
  resources:
    cpu: "192"
    memory: 2048Gi
    storage: 3800Gi

  # GPU specifications
  gpu:
    product: NVIDIA-H100-80GB-HBM3
    count: 8
    memory: 81920  # MiB per GPU
    driver: "570.86.16"
    driverMajor: "570"
    driverMinor: "86"
