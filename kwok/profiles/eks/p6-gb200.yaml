# EKS Accelerated Node Profile: p6.48xlarge (GB200)
#
# NVIDIA GB200 Grace Blackwell instance for next-gen training workloads:
# - 8x NVIDIA GB200 GPUs (Blackwell architecture)
# - 288 ARM vCPUs (Grace CPU), 3072 GiB memory
# - NVLink 5.0 interconnect

apiVersion: aicr.run/v1alpha2
kind: KWOKNodeProfile
metadata:
  name: p6-gb200
  labels:
    provider: eks
    nodeType: accelerated
    accelerator: gb200

spec:
  # Instance specifications
  instanceType: p6.48xlarge
  arch: arm64  # Grace CPU is ARM-based
  osImage: Amazon Linux 2023

  # Resource capacity
  resources:
    cpu: "288"
    memory: 3072Gi
    storage: 7600Gi

  # GPU specifications
  gpu:
    product: NVIDIA-GB200-192GB-HBM3e
    count: 8
    memory: 196608  # MiB per GPU (192GB)
    driver: "580.82.07"
    driverMajor: "580"
    driverMinor: "82"
