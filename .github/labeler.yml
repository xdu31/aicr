area/ci:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/**'
          - 'tools/coverage/**'
          - 'tools/evidence-project/**'
          - 'tools/corroborate/**'
          - 'tools/uat-broker/**'

area/recipes:
  - changed-files:
      - any-glob-to-any-file:
          - 'recipes/**'
          - 'pkg/health/**'

area/bundler:
  - changed-files:
      - any-glob-to-any-file: 'pkg/bundler/**'

area/api:
  - changed-files:
      - any-glob-to-any-file:
          - 'pkg/server/**'
          - 'api/**'

area/cli:
  - changed-files:
      - any-glob-to-any-file: 'pkg/cli/**'

area/collector:
  - changed-files:
      - any-glob-to-any-file: 'pkg/collector/**'

area/validator:
  - changed-files:
      - any-glob-to-any-file: 'pkg/validator/**'

area/docs:
  - changed-files:
      - any-glob-to-any-file:
          - 'docs/**'
          - '*.md'

area/infra:
  - changed-files:
      - any-glob-to-any-file: 'infra/**'

area/tests:
  - changed-files:
      - any-glob-to-any-file: 'tests/**'
