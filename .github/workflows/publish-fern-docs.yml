# Publishes the Fern documentation site on release tag push or manual dispatch.
#
# Manual dispatch accepts an optional `tag` input:
#   - empty: resolves to the latest GitHub release tag
#   - explicit (e.g. v0.13.0): publishes that tag
# Manual dispatch always uses the workflow file from main but sources versioned
# docs content from the resolved tag.
#
# On a vX.Y.Z release tag (push or dispatch), the workflow also:
#   1. Generates fern/versions/vX.Y.Z.yml from the tag's docs/index.yml
#   2. Adds a version entry to fern/docs.yml
#   3. Prunes older versions to keep only the 3 most recent (plus Latest)
#   4. Commits changes back to main so future publishes include the new version
#
# Pre-release tags (e.g. v1.6.0-rc1) trigger publish but skip version registration.
#
# Required configuration:
# - Organization secret: DOCS_FERN_TOKEN (from `fern token` for the nvidia Fern org)

name: Publish Fern Docs

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.13.0). Leave empty to use the latest GitHub release tag."
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: fern-publish
  cancel-in-progress: true

env:
  MAX_VERSIONS: 3

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: main
          fetch-tags: true
          # peter-evans/create-pull-request uses its own GH_TOKEN via API,
          # so the persisted credentials from checkout are not needed.
          persist-credentials: false

      - name: Resolve target tag
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -eo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            TAG="${GITHUB_REF#refs/tags/}"
          elif [ -n "${INPUT_TAG}" ]; then
            TAG="${INPUT_TAG}"
          else
            TAG=$(gh release view --repo "${GITHUB_REPOSITORY}" --json tagName -q .tagName)
            if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
              echo "::error::Could not determine latest release tag"
              exit 1
            fi
          fi
          if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?$ ]]; then
            echo "::error::Tag '${TAG}' is not a valid semver tag (expected vMAJOR.MINOR.PATCH[-PRERELEASE])"
            exit 1
          fi
          if ! git show-ref --verify --quiet "refs/tags/${TAG}"; then
            echo "::error::Tag '${TAG}' does not exist in this repository"
            exit 1
          fi
          if [[ "$TAG" == *-* ]]; then
            IS_RELEASE=false
          else
            IS_RELEASE=true
          fi

          # Skip registration when tag = latest release (Latest already covers it)
          LATEST=$(gh release view --repo "${GITHUB_REPOSITORY}" --json tagName -q .tagName 2>/dev/null || true)
          if [ "$IS_RELEASE" = "true" ] && [ "$TAG" = "$LATEST" ]; then
            SHOULD_REGISTER=false
            echo "Tag $TAG is the current latest release — will be shown as 'Latest · $TAG', skipping version entry"
          else
            SHOULD_REGISTER=$IS_RELEASE
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "is_release=$IS_RELEASE" >> "$GITHUB_OUTPUT"
          echo "should_register=$SHOULD_REGISTER" >> "$GITHUB_OUTPUT"
          echo "Resolved target tag: $TAG (is_release=$IS_RELEASE, should_register=$SHOULD_REGISTER)"

      - name: Register new version from tag
        if: steps.resolve.outputs.should_register == 'true'
        env:
          TAG_VERSION: ${{ steps.resolve.outputs.tag }}
        run: |
          set -eo pipefail

          # Skip if version file already exists
          if [ -f "fern/versions/${TAG_VERSION}.yml" ]; then
            echo "Version ${TAG_VERSION} already registered — skipping"
            exit 0
          fi

          # Generate version nav from the tag's docs/index.yml
          echo "Generating fern/versions/${TAG_VERSION}.yml from tag $TAG_VERSION"
          git archive "${TAG_VERSION}" -- docs/index.yml | tar -xO docs/index.yml | \
            sed "s|path: |path: ${TAG_VERSION}-content/|g" > "fern/versions/${TAG_VERSION}.yml"

          # Add version entry to docs.yml (insert after Latest, before older versions)
          export TAG_VERSION
          EXPR='.products[0].versions |= [.[0]] + [{"display-name": env(TAG_VERSION),'
          EXPR+=' "path": "versions/" + env(TAG_VERSION) + ".yml",'
          EXPR+=' "slug": env(TAG_VERSION), "availability": "stable"}] + .[1:]'
          yq -i "$EXPR" fern/docs.yml

          # Sort versioned entries by semver descending (Latest stays at [0])
          SORTED_SLUGS=$(yq '.products[0].versions[1:][].slug' fern/docs.yml | sort -rV)
          yq -i '.products[0].versions = [.products[0].versions[0]]' fern/docs.yml
          for slug in $SORTED_SLUGS; do
            export slug
            yq -i '.products[0].versions += [{"display-name": env(slug), "path": "versions/" + env(slug) + ".yml", "slug": env(slug), "availability": "stable"}]' fern/docs.yml
          done

          echo "--- docs.yml versions after insert + sort ---"
          yq '.products[0].versions[].display-name' fern/docs.yml

      - name: Prune old versions
        if: steps.resolve.outputs.should_register == 'true'
        run: |
          set -eo pipefail
          KEEP=$((MAX_VERSIONS + 1))  # +1 for the Latest entry at index 0

          # Count current versioned entries (including Latest)
          TOTAL=$(yq '.products[0].versions | length' fern/docs.yml)
          if [ "$TOTAL" -le "$KEEP" ]; then
            echo "Only $TOTAL version entries — nothing to prune"
            exit 0
          fi

          # Remove excess entries from the end (oldest) and their version files
          PRUNED=$(yq ".products[0].versions[$KEEP:][].slug" fern/docs.yml)
          yq -i ".products[0].versions |= .[:$KEEP]" fern/docs.yml

          for slug in $PRUNED; do
            rm -f "fern/versions/${slug}.yml"
            echo "Pruned version $slug"
          done

          echo "--- docs.yml versions after prune ---"
          yq '.products[0].versions[].display-name' fern/docs.yml

      - name: Checkout frozen version content
        run: |
          set -eo pipefail
          for version_file in fern/versions/v*.yml; do
            version=$(basename "$version_file" .yml)
            if git show-ref --verify --quiet "refs/tags/${version}"; then
              mkdir -p "fern/versions/${version}-content"
              git archive "refs/tags/${version}" -- docs/ | tar -x --strip-components=1 -C "fern/versions/${version}-content"
              # Sanitize frozen markdown for Fern's MDX parser.
              # Versioned content gets strict MDX parsing; escape all bare
              # { } and < so nothing is interpreted as JSX. Markdown renders
              # &lt; as < and \{ as { so the output is visually identical.
              find "fern/versions/${version}-content" -name '*.md' -print0 | xargs -0 sed -i \
                -e 's/{/\\{/g' \
                -e 's/}/\\}/g' \
                -e 's/</\&lt;/g'
              echo "Extracted docs from $version"
            else
              echo "::error::Tag $version not found — cannot pin frozen docs content"
              exit 1
            fi
          done

      - name: Stamp version in docs.yml
        env:
          TAG: ${{ steps.resolve.outputs.tag }}
        run: |
          cp fern/docs.yml /tmp/docs.yml.preStamp
          export TAG
          yq -i '(.products[0].versions[] | select(.slug == "latest")).display-name = "Latest · " + env(TAG)' fern/docs.yml
          echo "--- docs.yml versions after stamp ---"
          yq '.products[0].versions[].display-name' fern/docs.yml

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Install Fern CLI
        run: npm install -g fern-api@$(jq -r .version fern/fern.config.json)

      - name: Publish Docs
        env:
          FERN_TOKEN: ${{ secrets.DOCS_FERN_TOKEN }}
        working-directory: ./fern
        run: |
          set -o pipefail
          fern generate --docs 2>&1 | tee /tmp/fern-output.log
          URL=$(grep -oP 'Published docs to \K.*(?= \()' /tmp/fern-output.log || true)
          if [ -n "$URL" ]; then
            echo "### Published: [$URL]($URL)" >> "$GITHUB_STEP_SUMMARY"
          fi

      # Persist registry changes back to main via PR. Done AFTER publish
      # because peter-evans/create-pull-request resets the working tree on
      # completion — running it earlier would wipe the registry edits before
      # `fern generate --docs` could read them. Restore the pre-stamp
      # docs.yml first so the transient "Latest · vX.Y.Z" stamp isn't
      # persisted (it's re-applied every run from the latest release).
      #
      # Direct push to main is blocked by repo rulesets (PR-only, required
      # status check "gate", required signatures). PR via API is signed by
      # github-actions[bot] and routes through the standard PR/gate flow.
      - name: Restore unstamped docs.yml for persistence
        if: steps.resolve.outputs.should_register == 'true'
        run: cp /tmp/docs.yml.preStamp fern/docs.yml

      - name: Open PR for version registry changes
        if: steps.resolve.outputs.should_register == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          base: main
          branch: chore/fern-register-${{ steps.resolve.outputs.tag }}
          delete-branch: true
          sign-commits: true
          commit-message: "chore(fern): register ${{ steps.resolve.outputs.tag }}, keep latest ${{ env.MAX_VERSIONS }} versions [automated]"
          title: "chore(fern): register ${{ steps.resolve.outputs.tag }}"
          body: |
            Automated registration of `${{ steps.resolve.outputs.tag }}` in the Fern docs versions registry.

            Generated by the `Publish Fern Docs` workflow.
          add-paths: |
            fern/versions/v*.yml
            fern/docs.yml
          labels: |
            area/ci
