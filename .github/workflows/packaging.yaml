name: Packaging Check

on:
  push:
    branches:
      - main
    paths:
      - '.goreleaser.yaml'
      - '.goreleaser.yml'
      - '.github/workflows/packaging.yaml'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    name: Package (Dry Run)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Load versions
        id: versions
        uses: ./.github/actions/load-versions

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.5.0
        with:
          go-version: ${{ steps.versions.outputs.go }}
          cache: true

      - name: Setup GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94  # v7.2.3
        with:
          version: ${{ steps.versions.outputs.goreleaser }}
          install-only: true

      - name: GoReleaser Dry Run
        env:
          GORELEASER_CURRENT_TAG: v0.0.0
          GOFLAGS: -mod=vendor
          # Empty placeholder so brews templates referencing .Env.HOMEBREW_DEPLOY_KEY
          # evaluate cleanly in dry-run mode (publish is skipped). The real secret is
          # provided by the release workflow in on-tag.yaml.
          HOMEBREW_DEPLOY_KEY: ""
        run: |
          set -euo pipefail
          goreleaser release --snapshot --clean --skip=publish,sbom
