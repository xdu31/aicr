name: On Tag Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'  # Semantic versioning with optional pre-release suffix (e.g., v1.2.3-rc1)

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  VALIDATOR_IMAGE_PREFIX: ghcr.io/nvidia/aicr-validators
  # Keep in sync with build-docker matrix.phase. `aiperf-bench` is an ancillary
  # benchmark runner image (not a Go validator binary) used by the
  # inference-perf check.
  VALIDATOR_PHASES: "deployment performance conformance aiperf-bench"
  EXPECTED_PLATFORMS: "linux/amd64 linux/arm64"

jobs:

  # =============================================================================
  # Detect: Determine if this is a pre-release tag
  # =============================================================================

  detect:
    name: Detect Release Type
    runs-on: ubuntu-latest
    timeout-minutes: 1
    permissions:
      contents: read
    outputs:
      is_prerelease: ${{ steps.check.outputs.is_prerelease }}
    steps:
      - name: Check tag for pre-release suffix
        id: check
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [[ "${TAG}" == *-* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "Pre-release detected: ${TAG}"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "Stable release: ${TAG}"
          fi

  # =============================================================================
  # Test Jobs (reusable workflow — same suite as on-push.yaml)
  # =============================================================================

  tests:
    uses: ./.github/workflows/qualification.yaml
    permissions:
      actions: read
      contents: read
      id-token: write
      security-events: write

  # =============================================================================
  # Build Job: GoReleaser (binaries, ko images, draft GitHub release)
  # =============================================================================

  build-ko:
    name: Build and Release (Draft)
    runs-on: ubuntu-latest
    needs: [tests]
    timeout-minutes: 30
    permissions:
      actions: read
      contents: write
      packages: write
      id-token: write
      attestations: write
      security-events: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0  # Full history for changelog generation
          persist-credentials: false

      - name: Load versions
        id: versions
        uses: ./.github/actions/load-versions

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: ${{ steps.versions.outputs.go }}
          cache: true

      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003  # v4.1.1

      - name: Generate SLSA predicate
        uses: ./.github/actions/generate-slsa-predicate
        with:
          workflow_file: on-tag.yaml

      - name: Build and Release
        id: release
        uses: ./.github/actions/go-build-release
        with:
          ko_version: ${{ steps.versions.outputs.ko }}
          goreleaser_version: ${{ steps.versions.outputs.goreleaser }}
          homebrew_deploy_key: ${{ secrets.HOMEBREW_DEPLOY_KEY }}

      - name: Malware Scan Release Binaries
        if: steps.release.outcome == 'success'
        uses: ./.github/actions/malware-scan
        with:
          scan_path: dist/
          category: 'clamav-release-binaries'

  # =============================================================================
  # Docker Jobs: Native per-arch validator builds (parallel with GoReleaser)
  # =============================================================================

  build-docker:
    name: Docker Validator (${{ matrix.phase }}/${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: [tests]
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        phase: [deployment, performance, conformance, aiperf-bench]  # keep in sync with VALIDATOR_PHASES
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
          # Ancillary (non-Go-validator) images override the default
          # validators/<phase>/Dockerfile path and image title.
          - phase: aiperf-bench
            dockerfile: validators/performance/aiperf-bench.Dockerfile
            image_title: aicr-aiperf-bench
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Authenticate to registry
        uses: ./.github/actions/ghcr-login

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          file: ${{ matrix.dockerfile || format('validators/{0}/Dockerfile', matrix.phase) }}
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.VALIDATOR_IMAGE_PREFIX }}/${{ matrix.phase }}:${{ github.ref_name }}-${{ matrix.arch }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.title=${{ matrix.image_title || format('aicr-validator-{0}', matrix.phase) }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

  # =============================================================================
  # Docker Manifest: Combine per-arch images into multi-arch manifests
  # =============================================================================

  docker-manifest:
    name: Docker Manifest
    runs-on: ubuntu-latest
    needs: [detect, build-docker]
    timeout-minutes: 5
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Authenticate to registry
        uses: ./.github/actions/ghcr-login

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Create version-tagged manifests for validator images
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          for phase in ${VALIDATOR_PHASES}; do
            IMAGE="${VALIDATOR_IMAGE_PREFIX}/${phase}"
            docker buildx imagetools create \
              -t "${IMAGE}:${TAG}" \
              "${IMAGE}:${TAG}-amd64" \
              "${IMAGE}:${TAG}-arm64"
          done

      - name: Create latest-tagged manifests for validator images
        if: needs.detect.outputs.is_prerelease == 'false'
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          for phase in ${VALIDATOR_PHASES}; do
            IMAGE="${VALIDATOR_IMAGE_PREFIX}/${phase}"
            docker buildx imagetools create \
              -t "${IMAGE}:latest" \
              "${IMAGE}:${TAG}-amd64" \
              "${IMAGE}:${TAG}-arm64"
          done

      - name: Verify multi-arch manifests
        env:
          TAG: ${{ github.ref_name }}
          IS_PRERELEASE: ${{ needs.detect.outputs.is_prerelease }}
        run: |
          set -euo pipefail
          ALIASES=("${TAG}")
          if [[ "${IS_PRERELEASE}" == "false" ]]; then
            ALIASES+=("latest")
          fi
          for phase in ${VALIDATOR_PHASES}; do
            IMAGE="${VALIDATOR_IMAGE_PREFIX}/${phase}"
            for alias in "${ALIASES[@]}"; do
              MANIFEST=$(docker buildx imagetools inspect --raw "${IMAGE}:${alias}")

              PLATFORMS=$(echo "${MANIFEST}" | jq -r \
                '[.manifests[] | select(.platform.os != "unknown") | "\(.platform.os)/\(.platform.architecture)"] | sort | .[]')

              for expected in ${EXPECTED_PLATFORMS}; do
                if ! echo "${PLATFORMS}" | grep -qx "${expected}"; then
                  echo "::error::${IMAGE}:${alias} missing platform ${expected}"
                  exit 1
                fi
              done

              if echo "${MANIFEST}" | jq -e '.manifests[] | select(.platform.os == "unknown")' >/dev/null 2>&1; then
                echo "::error::${IMAGE}:${alias} contains unknown/unknown descriptor"
                exit 1
              fi
            done
          done

  # =============================================================================
  # Container Image Vulnerability Scan (runs after all images are built)
  # =============================================================================

  image-vuln-scan:
    name: Image Vuln Scan (${{ matrix.image }})
    runs-on: ubuntu-latest
    needs: [build-ko, docker-manifest]
    timeout-minutes: 15
    permissions:
      actions: read
      contents: read
      packages: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        image:
          - ghcr.io/nvidia/aicr
          - ghcr.io/nvidia/aicrd
          - ghcr.io/nvidia/aicr-validators/deployment
          - ghcr.io/nvidia/aicr-validators/performance
          - ghcr.io/nvidia/aicr-validators/conformance
          - ghcr.io/nvidia/aicr-validators/aiperf-bench
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Authenticate to registry
        uses: ./.github/actions/ghcr-login

      - name: Scan container image
        id: scan
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2  # v7.4.0
        with:
          image: '${{ matrix.image }}:${{ github.ref_name }}'
          severity-cutoff: 'high'
          output-format: sarif
          only-fixed: true
          fail-build: true
          grype-config: .grype.yaml
        continue-on-error: true

      - name: Upload SARIF to GitHub Security
        if: hashFiles('results.sarif') != '' || steps.scan.outputs.sarif != ''
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225  # v4.35.2
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}
          category: 'anchore-image-${{ matrix.image }}'
        continue-on-error: true

      - name: Fail on vulnerabilities
        if: steps.scan.outcome == 'failure'
        shell: bash
        env:
          IMAGE_REF: '${{ matrix.image }}:${{ github.ref_name }}'
        run: |
          set -euo pipefail
          echo "::error::Vulnerability scan found issues in ${IMAGE_REF}"
          echo "Check the Security tab for details."
          exit 1

  # =============================================================================
  # Attestation Job (runs after all images are pushed and scanned)
  # =============================================================================

  attest:
    name: Attest Images
    runs-on: ubuntu-latest
    needs: [image-vuln-scan]
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Load versions
        id: versions
        uses: ./.github/actions/load-versions

      - name: Attest aicr image
        uses: ./.github/actions/attest-image-from-tag
        with:
          image_name: ghcr.io/nvidia/aicr
          tag: ${{ github.ref_name }}
          crane_version: ${{ steps.versions.outputs.crane }}

      - name: Attest aicrd image
        uses: ./.github/actions/attest-image-from-tag
        with:
          image_name: ghcr.io/nvidia/aicrd
          tag: ${{ github.ref_name }}
          crane_version: ${{ steps.versions.outputs.crane }}

      - name: Attest deployment validator image
        uses: ./.github/actions/attest-image-from-tag
        with:
          image_name: ${{ env.VALIDATOR_IMAGE_PREFIX }}/deployment
          tag: ${{ github.ref_name }}
          crane_version: ${{ steps.versions.outputs.crane }}

      - name: Attest performance validator image
        uses: ./.github/actions/attest-image-from-tag
        with:
          image_name: ${{ env.VALIDATOR_IMAGE_PREFIX }}/performance
          tag: ${{ github.ref_name }}
          crane_version: ${{ steps.versions.outputs.crane }}

      - name: Attest conformance validator image
        uses: ./.github/actions/attest-image-from-tag
        with:
          image_name: ${{ env.VALIDATOR_IMAGE_PREFIX }}/conformance
          tag: ${{ github.ref_name }}
          crane_version: ${{ steps.versions.outputs.crane }}

      - name: Attest aiperf-bench image
        uses: ./.github/actions/attest-image-from-tag
        with:
          image_name: ${{ env.VALIDATOR_IMAGE_PREFIX }}/aiperf-bench
          tag: ${{ github.ref_name }}
          crane_version: ${{ steps.versions.outputs.crane }}


  # =============================================================================
  # Cleanup: Warn if attestation failed (images exist without attestation)
  # =============================================================================

  release-check:
    name: Release Integrity Check
    runs-on: ubuntu-latest
    needs: [attest]
    if: always()
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Check attestation status
        env:
          ATTEST_RESULT: ${{ needs.attest.result }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [[ "${ATTEST_RESULT}" != "success" ]]; then
            echo "::error::Attestation failed or was skipped. Images exist on GHCR without attestation."
            echo "::error::Manual action required: verify attestation for ${TAG} or delete the draft release."
            echo ""
            echo "Recovery steps:"
            echo "  1. Re-run the 'Attest Images' job from the Actions tab"
            echo "  2. Or delete the draft release and re-tag"
            exit 1
          fi

          echo "Release integrity check passed."

  # =============================================================================
  # Deploy Job (runs after release is published)
  # =============================================================================

  deploy:
    needs: [detect, publish]
    if: needs.detect.outputs.is_prerelease == 'false'
    uses: ./.github/workflows/deploy.yaml
    permissions:
      contents: read
      packages: read
      id-token: write
    with:
      image_tag: ${{ github.ref_name }}

  # =============================================================================
  # Publish: Flip draft release to public after attestation succeeds
  # =============================================================================

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [release-check]
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh release edit "${TAG}" \
            --repo "${REPO}" \
            --draft=false

  # =============================================================================
  # Site: Deploy versioned documentation to GitHub Pages
  # Dispatched on main (not the tag ref) to satisfy the github-pages
  # environment's branch deployment policy.
  # =============================================================================

  site:
    name: Deploy Site
    runs-on: ubuntu-latest
    needs: [detect, publish]
    if: needs.detect.outputs.is_prerelease == 'false'
    timeout-minutes: 5
    permissions:
      actions: write
    steps:
      - name: Trigger site deploy on main
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh workflow run gh-pages.yaml \
            --repo "${REPO}" \
            --ref main

  # =============================================================================
  # Notify: Post release announcement to Slack
  # =============================================================================

  notify:
    name: Slack Notification
    runs-on: ubuntu-latest
    needs: [detect, publish]
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Post to Slack
        env:
          SLACK_SERVICE: ${{ secrets.SLACK_SERVICE }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          SERVER: ${{ github.server_url }}
          IS_PRERELEASE: ${{ needs.detect.outputs.is_prerelease }}
        run: |
          set -euo pipefail
          RELEASE_TYPE="stable"
          if [[ "${IS_PRERELEASE}" == "true" ]]; then
            RELEASE_TYPE="pre-release"
          fi
          RELEASE_URL="${SERVER}/${REPO}/releases/tag/${TAG}"
          curl -sSf -X POST \
            -H 'Content-type: application/json' \
            --data "{\"text\":\"AICR ${TAG} has been released (${RELEASE_TYPE}): ${RELEASE_URL}\"}" \
            "https://hooks.slack.com/services/${SLACK_SERVICE}"

  # =============================================================================
  # Summary: Release pipeline report (always runs, even on failure)
  # =============================================================================

  summary:
    name: Release Summary
    runs-on: ubuntu-latest
    needs: [detect, tests, build-ko, build-docker, docker-manifest, image-vuln-scan, attest, release-check, publish, deploy, site, notify]
    if: always()
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Release Summary
        env:
          TESTS: ${{ needs.tests.result }}
          BUILD_KO: ${{ needs.build-ko.result }}
          BUILD_DOCKER: ${{ needs.build-docker.result }}
          MANIFEST: ${{ needs.docker-manifest.result }}
          VULN_SCAN: ${{ needs.image-vuln-scan.result }}
          ATTEST: ${{ needs.attest.result }}
          RELEASE_CHECK: ${{ needs.release-check.result }}
          DEPLOY: ${{ needs.deploy.result }}
          PUBLISH: ${{ needs.publish.result }}
          SITE: ${{ needs.site.result }}
          NOTIFY: ${{ needs.notify.result }}
          TAG: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
          IS_PRERELEASE: ${{ needs.detect.outputs.is_prerelease }}
        run: |
          set -euo pipefail
          {
            echo "## Release Summary"
            echo ""
            RELEASE_TYPE="stable"; [[ "${IS_PRERELEASE}" == "true" ]] && RELEASE_TYPE="pre-release"
            echo "**Tag:** \`${TAG}\`  **Commit:** \`${COMMIT}\`  **Type:** ${RELEASE_TYPE}"
            echo ""
            echo "| Phase | Result |"
            echo "|-------|--------|"
            echo "| Tests | ${TESTS} |"
            echo "| Build (Ko) | ${BUILD_KO} |"
            echo "| Build (Docker) | ${BUILD_DOCKER} |"
            echo "| Docker Manifest | ${MANIFEST} |"
            echo "| Vulnerability Scan | ${VULN_SCAN} |"
            echo "| Attestation | ${ATTEST} |"
            echo "| Release Check | ${RELEASE_CHECK} |"
            echo "| Deploy | ${DEPLOY} |"
            echo "| Publish | ${PUBLISH} |"
            echo "| Site | ${SITE} |"
            echo "| Slack Notification | ${NOTIFY} |"
          } >> "$GITHUB_STEP_SUMMARY"
