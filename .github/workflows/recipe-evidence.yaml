# Workflow 1 of 2 for the warning-only recipe-evidence gate.
#
# Runs on `pull_request` (read-only token, no secrets), builds aicr, then
# invokes `.github/scripts/recipe-evidence-check.sh` which discovers
# affected leaf overlays, checks each for an evidence pointer, runs
# `aicr evidence verify`, and compares the signed recipe digest against
# the current canonical digest. Output is a Markdown report uploaded as
# an artifact; the companion recipe-evidence-comment.yaml workflow
# posts the sticky PR comment from `workflow_run`. This split (matching
# fern-docs-preview-build.yml + fern-docs-preview-comment.yml) keeps
# write permissions out of the build job.
#
# Known limitations (tracked as follow-ups):
#   * Pointer file name is computed as `basename overlay .yaml`, while
#     `aicr validate --emit-attestation` writes pointers named after
#     the criteria-derived slug (RecipeNameFor). Overlays not following
#     the canonical naming will be reported as missing-pointer.
#   * Discovery walks `spec.base` ancestors but not `spec.mixins`, and
#     promote-all only matches recipes/registry.yaml or
#     recipes/overlays/base.yaml. Mixin/check/component edits outside
#     literal valuesFile refs are not promoted. Parity with kwok-recipes.
#   * `aicr evidence verify` fetches OCI artifacts from PR-controlled
#     URLs; an allow-list of trusted registries is a follow-up.

name: "Recipe Evidence: Verify"

on:
  pull_request:
    paths:
      - 'recipes/**'
      - '!**.md'
      # The aicr binary that bundles recipes and runs `evidence verify` is
      # built from Go source; a regression there must trigger this gate.
      - 'pkg/recipe/**'
      - 'pkg/bundler/**'
      - 'pkg/evidence/**'
      - 'pkg/cli/**'
      - 'cmd/aicr/**'
      - 'go.mod'
      - 'go.sum'
      - 'vendor/**'
      - '.github/workflows/recipe-evidence.yaml'
      - '.github/scripts/recipe-evidence-check.sh'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  evidence-check:
    name: Verify recipe evidence (warning-only)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Load versions
        id: versions
        uses: ./.github/actions/load-versions

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.5.0
        with:
          go-version: ${{ steps.versions.outputs.go }}
          cache: false

      - name: Build aicr
        env:
          GOFLAGS: -mod=vendor
        run: go build -o ./bin/aicr ./cmd/aicr

      - name: Run evidence check
        env:
          AICR: ${{ github.workspace }}/bin/aicr
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPORT_OUT: ${{ runner.temp }}/report.md
          REPO_URL: https://github.com/${{ github.repository }}
        run: .github/scripts/recipe-evidence-check.sh

      - name: Upload evidence report
        # Always attempt upload so even a partial report (build failed
        # mid-loop, discovery errored) reaches the comment workflow.
        # `if-no-files-found: ignore` makes a genuinely-absent report a
        # no-op instead of a failure. We can NOT guard this with
        # hashFiles(): that expression only matches paths inside
        # GITHUB_WORKSPACE, and the report lives under runner.temp — so
        # the guard always evaluated empty and the upload was always
        # skipped. upload-artifact itself reads the absolute path fine.
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: recipe-evidence-report
          path: ${{ runner.temp }}/report.md
          if-no-files-found: ignore
          retention-days: 7
