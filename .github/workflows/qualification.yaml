name: Qualification

on:
  workflow_call:
    inputs:
      coverage_report:
        description: 'Whether to generate coverage report'
        type: boolean
        required: false
        default: false
      ref:
        description: 'Git ref to checkout (defaults to triggering ref)'
        type: string
        required: false
        default: ''

permissions:
  contents: read

jobs:

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read
      contents: read
    steps:

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ inputs.ref || '' }}
          persist-credentials: false

      - name: Load versions
        id: versions
        uses: ./.github/actions/load-versions

      - name: Run Go Tests
        uses: ./.github/actions/go-test
        with:
          go_version: ${{ steps.versions.outputs.go }}
          coverage_report: ${{ inputs.coverage_report }}
          coverage_threshold: ${{ steps.versions.outputs.coverage_threshold }}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ inputs.ref || '' }}
          persist-credentials: false

      - name: Load versions
        id: versions
        uses: ./.github/actions/load-versions

      - name: Run Linters
        uses: ./.github/actions/go-lint
        with:
          go_version: ${{ steps.versions.outputs.go }}
          golangci_lint_version: ${{ steps.versions.outputs.golangci_lint }}
          addlicense_version: ${{ steps.versions.outputs.addlicense }}
          lint_timeout: ${{ steps.versions.outputs.lint_timeout }}

  cli-e2e:
    name: CLI E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ inputs.ref || '' }}
          persist-credentials: false

      - name: Load versions
        id: versions
        uses: ./.github/actions/load-versions

      - name: Run CLI E2E Tests
        uses: ./.github/actions/cli-e2e
        with:
          go_version: ${{ steps.versions.outputs.go }}
          chainsaw_version: ${{ steps.versions.outputs.chainsaw }}
          chainsaw_sha256: ${{ steps.versions.outputs.chainsaw_sha256_linux_amd64 }}

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ inputs.ref || '' }}
          persist-credentials: false

      - name: Load versions
        id: versions
        uses: ./.github/actions/load-versions

      - name: Run E2E Tests
        uses: ./.github/actions/e2e
        with:
          go_version: ${{ steps.versions.outputs.go }}

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ inputs.ref || '' }}
          persist-credentials: false

      - name: Security Scan
        uses: ./.github/actions/security-scan
        with:
          severity-cutoff: 'medium'
          category: 'anchore-fs'
