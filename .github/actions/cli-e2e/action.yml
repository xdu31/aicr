name: 'CLI E2E Tests'
description: 'Build attested aicr binary and run CLI + conformance chainsaw tests'

inputs:
  go_version:
    description: 'Go version (e.g., 1.25)'
    required: true
  goreleaser_version:
    description: 'GoReleaser version (e.g., v2.15.3)'
    required: true
  chainsaw_version:
    description: 'Chainsaw version (from .settings.yaml via load-versions)'
    required: true
  chainsaw_sha256:
    description: 'Chainsaw SHA256 checksum for linux/amd64 (from .settings.yaml via load-versions)'
    required: true
  helmfile_version:
    description: 'Helmfile version (e.g., v1.5.1) — required by tests/chainsaw/cli/bundle-helmfile'
    required: true
  helmfile_sha256:
    description: 'Helmfile SHA256 checksum for linux/amd64 (from .settings.yaml)'
    required: true
  cosign_version:
    description: 'Cosign version (from .settings.yaml via load-versions; must be >= v3.1.0 so DSSE attestations are logged to Rekor v2 as hashedrekord/PAE)'
    required: true

runs:
  using: 'composite'
  steps:
    # `required: true` on composite-action inputs is not enforced at runtime, so
    # a caller that omits cosign_version would silently get the cosign-installer
    # default (which lags the v3.1.0 floor DSSE-on-v2 needs). Fail closed. See #1650.
    - name: Require cosign_version
      shell: bash
      env:
        COSIGN_VERSION: ${{ inputs.cosign_version }}
      run: '[ -n "$COSIGN_VERSION" ] || { echo "cosign_version input is required (>= v3.1.0 for Rekor v2)" >&2; exit 1; }'
    - name: Setup Go
      uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5  # v6.2.0
      with:
        go-version: '${{ inputs.go_version }}'
        cache: true

    - name: Install Cosign
      uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad  # v4.0.0
      with:
        # Pin from .settings.yaml (>= v3.1.0) so cosign logs DSSE attestations to
        # Rekor v2 as hashedrekord/PAE. The installer default (v3.0.2) writes the
        # legacy dsse entry type, which sigstore-go cannot verify. See #1650.
        cosign-release: '${{ inputs.cosign_version }}'

    - name: Install GoReleaser
      uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29  # v7.0.0
      with:
        version: ${{ inputs.goreleaser_version }}
        install-only: true

    - name: Install Chainsaw
      uses: ./.github/actions/setup-build-tools
      with:
        install_chainsaw: 'true'
        chainsaw_version: '${{ inputs.chainsaw_version }}'
        chainsaw_sha256: '${{ inputs.chainsaw_sha256 }}'

    - name: Install Helmfile
      uses: ./.github/actions/setup-build-tools
      with:
        install_helmfile: 'true'
        helmfile_version: '${{ inputs.helmfile_version }}'
        helmfile_sha256: '${{ inputs.helmfile_sha256 }}'

    - name: Generate SLSA predicate
      if: github.event.pull_request.head.repo.fork == false
      uses: ./.github/actions/generate-slsa-predicate
      with:
        workflow_file: qualification.yaml

    - name: Build attested binary
      shell: bash
      env:
        GOFLAGS: -mod=vendor
      run: |
        set -euo pipefail
        goreleaser build --clean --single-target --snapshot --timeout 10m

    - name: Locate binary and detect attestation
      id: binary
      shell: bash
      run: |
        set -euo pipefail
        # Find binary (linux/amd64 in CI)
        AICR_BIN=""
        for pattern in dist/aicr_linux_amd64_v1/aicr dist/aicr_linux_amd64/aicr; do
          if [ -x "$pattern" ]; then
            AICR_BIN="$(pwd)/$pattern"
            break
          fi
        done
        if [ -z "$AICR_BIN" ]; then
          echo "::error::Built binary not found in dist/"
          exit 1
        fi
        echo "AICR_BIN=$AICR_BIN" >> "$GITHUB_ENV"

        # Detect attestation
        ATTEST_FILE="$(dirname "$AICR_BIN")/aicr-attestation.sigstore.json"
        if [ -f "$ATTEST_FILE" ]; then
          echo "AICR_ATTESTED=true" >> "$GITHUB_ENV"
          echo "Binary attestation found: $ATTEST_FILE"
        else
          echo "AICR_ATTESTED=false" >> "$GITHUB_ENV"
          echo "::warning::No binary attestation found (attestation tests will skip)"
        fi

    ## Forked repos: skip CI-gated tests (no OIDC for attestation). ci!=true
    ## drops every ci="true" test across both dirs.
    - name: Run CLI chainsaw tests (forked repository)
      if: github.event.pull_request.head.repo.fork == true
      shell: bash
      run: |
        set -euo pipefail
        chainsaw test \
          --no-cluster \
          --config tests/chainsaw/chainsaw-config.yaml \
          --test-dir tests/chainsaw/cli/ \
          --test-dir tests/chainsaw/signing/ \
          --selector 'ci!=true'

    ## Same-repo: run the generic CLI tests plus the signing/attestation tests
    ## that only need the CI-built attested binary. external-service!=true drops
    ## tests that require a live external stack (MiniStack KMS, Sigstore
    ## scaffolding); those run only in their dedicated workflows. The selector is
    ## a no-op for tests/chainsaw/cli (none carry the label).
    - name: Run CLI chainsaw tests
      if: github.event.pull_request.head.repo.fork == false
      shell: bash
      run: |
        set -euo pipefail
        chainsaw test \
          --no-cluster \
          --config tests/chainsaw/chainsaw-config.yaml \
          --test-dir tests/chainsaw/cli/ \
          --test-dir tests/chainsaw/signing/ \
          --selector 'external-service!=true'

    - name: Run AI-conformance offline tests
      shell: bash
      run: |
        set -euo pipefail
        chainsaw test \
          --no-cluster \
          --config tests/chainsaw/chainsaw-config.yaml \
          --test-dir tests/chainsaw/ai-conformance/offline/
