name: 'CLI E2E Tests'
description: 'Build attested aicr binary and run CLI + conformance chainsaw tests'

inputs:
  go_version:
    description: 'Go version (e.g., 1.25)'
    required: true
  goreleaser_version:
    description: 'GoReleaser version (e.g., v2.15.3)'
    required: true
  chainsaw_version:
    description: 'Chainsaw version (e.g., v0.2.14)'
    required: true
  chainsaw_sha256:
    description: 'Chainsaw SHA256 checksum for linux/amd64 (from .settings.yaml)'
    required: false
    default: 'f2f4a3f9a541d65db12f5c910950758f7d56fae20ad5b1272cdc271c9568443e'

runs:
  using: 'composite'
  steps:
    - name: Setup Go
      uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5  # v6.2.0
      with:
        go-version: '${{ inputs.go_version }}'
        cache: true

    - name: Install Cosign
      uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003  # v4.1.1

    - name: Install GoReleaser
      uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29  # v7.0.0
      with:
        version: ${{ inputs.goreleaser_version }}
        install-only: true

    - name: Install Chainsaw
      uses: ./.github/actions/setup-build-tools
      with:
        install_chainsaw: 'true'
        chainsaw_version: '${{ inputs.chainsaw_version }}'
        chainsaw_sha256: '${{ inputs.chainsaw_sha256 }}'

    - name: Generate SLSA predicate
      if: github.event.pull_request.head.repo.fork == false
      uses: ./.github/actions/generate-slsa-predicate
      with:
        workflow_file: qualification.yaml

    - name: Build attested binary
      shell: bash
      env:
        GOFLAGS: -mod=vendor
      run: |
        set -euo pipefail
        goreleaser build --clean --single-target --snapshot --timeout 10m

    - name: Locate binary and detect attestation
      id: binary
      shell: bash
      run: |
        set -euo pipefail
        # Find binary (linux/amd64 in CI)
        AICR_BIN=""
        for pattern in dist/aicr_linux_amd64_v1/aicr dist/aicr_linux_amd64/aicr; do
          if [ -x "$pattern" ]; then
            AICR_BIN="$(pwd)/$pattern"
            break
          fi
        done
        if [ -z "$AICR_BIN" ]; then
          echo "::error::Built binary not found in dist/"
          exit 1
        fi
        echo "AICR_BIN=$AICR_BIN" >> "$GITHUB_ENV"

        # Detect attestation
        ATTEST_FILE="$(dirname "$AICR_BIN")/aicr-attestation.sigstore.json"
        if [ -f "$ATTEST_FILE" ]; then
          echo "AICR_ATTESTED=true" >> "$GITHUB_ENV"
          echo "Binary attestation found: $ATTEST_FILE"
        else
          echo "AICR_ATTESTED=false" >> "$GITHUB_ENV"
          echo "::warning::No binary attestation found (attestation tests will skip)"
        fi

    ## skipping attestation tests for forked repository because
    ## OIDC authentication is not available in forked repositories
    - name: Run CLI chainsaw tests (forked repository)
      if: github.event.pull_request.head.repo.fork == true
      shell: bash
      run: |
        set -euo pipefail
        chainsaw test \
          --no-cluster \
          --config tests/chainsaw/chainsaw-config.yaml \
          --test-dir tests/chainsaw/cli/ \
          --selector 'ci!=true'

    - name: Run CLI chainsaw tests
      if: github.event.pull_request.head.repo.fork == false
      shell: bash
      run: |
        set -euo pipefail
        chainsaw test \
          --no-cluster \
          --config tests/chainsaw/chainsaw-config.yaml \
          --test-dir tests/chainsaw/cli/

    - name: Run AI-conformance offline tests
      shell: bash
      run: |
        set -euo pipefail
        chainsaw test \
          --no-cluster \
          --config tests/chainsaw/chainsaw-config.yaml \
          --test-dir tests/chainsaw/ai-conformance/offline/
