name: 'E2E Tests'
description: 'Run end-to-end tests using Kind cluster with fake GPU environment'

inputs:
  go_version:
    description: 'Go version to install (e.g., 1.25)'
    required: true
  upload_artifacts:
    description: 'Whether to upload debug artifacts on failure (true/false)'
    required: false
    default: 'true'
  artifact_retention_days:
    description: 'Number of days to retain debug artifacts'
    required: false
    default: '7'

runs:
  using: 'composite'
  steps:
    - name: Set up Go
      uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5  # v6.2.0
      with:
        go-version: ${{ inputs.go_version }}
        cache: true

    - name: Prep runner for Kind
      uses: ./.github/actions/prep-kind-runner

    - name: Install E2E testing tools
      uses: ./.github/actions/install-e2e-tools

    - name: Create Kind cluster
      shell: bash
      run: make cluster-create

    - name: Deploy aicrd to Kind
      shell: bash
      env:
        GOFLAGS: -mod=vendor
      run: |
        # Build and push aicrd image (replaces Tilt custom_build)
        KO_DOCKER_REPO=localhost:5001/aicrd ko build --bare --tags=tilt ./cmd/aicrd

        # Apply namespace first (must exist before deployment references it)
        kubectl apply -f tilt/k8s/namespace.yaml
        kubectl apply -f tilt/k8s/

        # Build images + CLI binary in parallel while deployment starts
        KO_DOCKER_REPO=localhost:5001/aicr ko build --bare --tags=local ./cmd/aicr &
        pid_aicr=$!
        # Compile validator binaries on host (Go build cache hit) then COPY-only images.
        # This is much faster than building inside Docker (no cache sharing).
        (
          mkdir -p dist/validator
          CGO_ENABLED=0 go build -trimpath -o dist/validator/deployment ./validators/deployment &
          CGO_ENABLED=0 go build -trimpath -o dist/validator/performance ./validators/performance &
          CGO_ENABLED=0 go build -trimpath -o dist/validator/conformance ./validators/conformance &
          # Download chainsaw binary for health check assertions.
          (
            CHAINSAW_VERSION=$(yq eval '.testing_tools.chainsaw' .settings.yaml | sed 's/^v//')
            CHAINSAW_SHA256=$(yq eval '.testing_tools.chainsaw_checksums.linux_amd64' .settings.yaml)
            curl -fsSL -o dist/validator/chainsaw.tar.gz \
              "https://github.com/kyverno/chainsaw/releases/download/v${CHAINSAW_VERSION}/chainsaw_linux_amd64.tar.gz"
            echo "${CHAINSAW_SHA256}  dist/validator/chainsaw.tar.gz" | sha256sum -c
            tar -xzf dist/validator/chainsaw.tar.gz -C dist/validator chainsaw
            rm dist/validator/chainsaw.tar.gz
          ) &
          wait
          # Build per-phase COPY-only images and push to local registry.
          # Ensure testdata dirs exist (conformance has none).
          for phase in deployment performance conformance; do
            mkdir -p "validators/${phase}/testdata"
          done
          for phase in deployment performance conformance; do
            docker build -t "localhost:5001/aicr-validators/${phase}:latest" -f - . <<DOCKERFILE
        FROM gcr.io/distroless/static-debian12:nonroot
        COPY dist/validator/${phase} /${phase}
        COPY validators/${phase}/testdata /app/testdata
        COPY dist/validator/chainsaw /usr/local/bin/chainsaw
        WORKDIR /app
        USER nonroot
        ENTRYPOINT ["/${phase}"]
        DOCKERFILE
            docker push "localhost:5001/aicr-validators/${phase}:latest"
          done
          # aiperf-bench is an ancillary Python image (not a Go validator),
          # required at runtime by the inference-perf check. Build from its
          # own Dockerfile and push to the local registry so any future e2e
          # test that exercises inference-perf can resolve the inner image.
          # Explicit --platform avoids BuildKit pulling the wrong arch manifest
          # (Go validator images are COPY-only so never invoke /bin/sh, but
          # aiperf-bench has RUN steps that need a working shell).
          docker build --platform linux/amd64 \
            -t "localhost:5001/aicr-validators/aiperf-bench:latest" \
            -f validators/performance/aiperf-bench.Dockerfile .
          docker push "localhost:5001/aicr-validators/aiperf-bench:latest"
        ) &
        pid_validators=$!
        go build -o dist/e2e/aicr ./cmd/aicr &
        pid_cli=$!
        wait $pid_aicr $pid_validators $pid_cli

        # Wait for deployment rollout (may already be ready)
        kubectl rollout status deployment/aicrd -n aicr --timeout=120s

        # Verify images are available
        curl -sf http://localhost:5001/v2/aicr/tags/list
        curl -sf http://localhost:5001/v2/aicr-validators/deployment/tags/list
        curl -sf http://localhost:5001/v2/aicr-validators/performance/tags/list
        curl -sf http://localhost:5001/v2/aicr-validators/conformance/tags/list
        curl -sf http://localhost:5001/v2/aicr-validators/aiperf-bench/tags/list

    - name: Set up fake GPU environment
      shell: bash
      run: |
        # Create gpu-operator namespace
        kubectl create namespace gpu-operator --dry-run=client -o yaml | kubectl apply -f -

        # Inject fake nvidia-smi into Kind worker nodes
        for node in $(docker ps --filter "name=-worker" --format "{{.Names}}"); do
          echo "Injecting fake nvidia-smi into $node"
          docker cp tools/fake-nvidia-smi "${node}:/usr/local/bin/nvidia-smi"
          docker exec "$node" chmod +x /usr/local/bin/nvidia-smi
          # Verify it works
          docker exec "$node" nvidia-smi --version
        done

    - name: Set up port forwarding
      shell: bash
      run: |
        kubectl port-forward -n aicr svc/aicrd 8080:8080 &
        sleep 5
        curl -sf http://localhost:8080/health || exit 1

    - name: Run E2E tests
      id: e2e-tests
      shell: bash
      env:
        GOFLAGS: -mod=vendor
        AICR_BIN: ${{ github.workspace }}/dist/e2e/aicr
        AICR_IMAGE: localhost:5001/aicr:local
        AICR_VALIDATOR_IMAGE_REGISTRY: localhost:5001
        FAKE_GPU_ENABLED: "true"
      run: ./tests/e2e/run.sh

    - name: Collect debug artifacts
      if: failure()
      shell: bash
      run: |
        mkdir -p /tmp/debug-artifacts
        kubectl get all --all-namespaces > /tmp/debug-artifacts/all-resources.txt || true
        kubectl get events --all-namespaces --sort-by='.lastTimestamp' > /tmp/debug-artifacts/events.txt || true
        kubectl logs -n aicr -l app.kubernetes.io/name=aicrd --tail=500 > /tmp/debug-artifacts/aicrd-logs.txt || true
        docker images > /tmp/debug-artifacts/docker-images.txt || true

    - name: Export Kind logs
      if: failure()
      shell: bash
      run: |
        mkdir -p /tmp/kind-logs
        kind export logs /tmp/kind-logs --name aicr || true

    - name: Upload debug artifacts
      if: failure() && inputs.upload_artifacts == 'true'
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
      with:
        name: e2e-debug-artifacts-${{ github.run_id }}
        path: |
          /tmp/debug-artifacts/
          /tmp/kind-logs/
        retention-days: ${{ inputs.artifact_retention_days }}

    - name: Cleanup
      if: always()
      shell: bash
      run: |
        make cluster-delete || true
        docker system prune -f || true
