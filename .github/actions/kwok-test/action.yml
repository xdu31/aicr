name: 'KWOK Cluster Test'
description: 'Test a single recipe using KWOK simulated nodes in a Kind cluster'

inputs:
  recipe:
    description: 'Recipe name to test'
    required: true
  deployer:
    description: 'Deployer to exercise: helm | argocd-oci | argocd-helm-oci | flux-oci'
    required: false
    default: 'helm'
  go_version:
    description: 'Go version to install'
    required: true
  kind_version:
    description: 'Kind version to install'
    required: false
    default: '0.31.0'
  goreleaser_version:
    description: 'GoReleaser version to install (from .settings.yaml)'
    required: true
  helm_version:
    description: 'Helm version to install'
    required: false
    default: 'v4.1.1'
  kwok_version:
    description: 'KWOK version to install'
    required: false
    default: 'v0.7.0'
  kubectl_version:
    description: 'kubectl version to install'
    required: false
    default: 'v1.35.0'
  yq_version:
    description: 'yq version to install'
    required: false
    default: 'v4.52.4'
  flux_version:
    description: 'Flux CLI version to install (required for flux-oci deployer)'
    required: false
    default: ''
  kind_node_image:
    description: 'Kind node image for testing'
    required: false
    default: ''
  upload_artifacts:
    description: 'Whether to upload debug artifacts on failure'
    required: false
    default: 'true'
  artifact_retention_days:
    description: 'Number of days to retain debug artifacts'
    required: false
    default: '7'

runs:
  using: 'composite'
  steps:
    - name: Set up Go
      uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5  # v6.2.0
      with:
        go-version: ${{ inputs.go_version }}
        cache: false  # vendor/ provides deps; disable to save disk on constrained runners

    - name: Cache KWOK tools
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306  # v5.0.3
      with:
        path: |
          /usr/local/bin/kind
          /usr/local/bin/helm
          /usr/local/bin/kubectl
          /usr/local/bin/yq
          /usr/local/bin/flux
        key: kwok-tools-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.settings.yaml') }}

    - name: Prep runner for Kind
      uses: ./.github/actions/prep-kind-runner

    - name: Setup build tools
      uses: ./.github/actions/setup-build-tools
      with:
        install_kind: 'true'
        kind_version: '${{ inputs.kind_version }}'
        install_helm: 'true'
        helm_version: '${{ inputs.helm_version }}'
        install_kubectl: 'true'
        kubectl_version: '${{ inputs.kubectl_version }}'
        install_yq: 'true'
        yq_version: '${{ inputs.yq_version }}'
        install_flux: 'true'
        flux_version: '${{ inputs.flux_version }}'
        install_goreleaser: 'true'
        goreleaser_version: '${{ inputs.goreleaser_version }}'

    - name: Build aicr binary
      shell: bash
      env:
        GOFLAGS: -mod=vendor
      run: |
        make build
        ls -la dist/

    - name: Run KWOK recipe test
      id: validate
      shell: bash
      env:
        KIND_NODE_IMAGE: ${{ inputs.kind_node_image }}
      run: |
        KWOK_CLUSTER=aicr-kwok-test bash kwok/scripts/run-all-recipes.sh \
          --deployer ${{ inputs.deployer }} \
          ${{ inputs.recipe }}

    - name: Collect debug artifacts
      if: failure()
      shell: bash
      run: |
        mkdir -p /tmp/kwok-debug-artifacts
        # Collect from whichever cluster is still running
        for cluster in $(kind get clusters 2>/dev/null); do
          kind export kubeconfig --name "$cluster" 2>/dev/null || continue
          kubectl get all --all-namespaces > "/tmp/kwok-debug-artifacts/${cluster}-resources.txt" || true
          kubectl get nodes -o wide > "/tmp/kwok-debug-artifacts/${cluster}-nodes.txt" || true
          kubectl get events --all-namespaces --sort-by='.lastTimestamp' > "/tmp/kwok-debug-artifacts/${cluster}-events.txt" || true
          kubectl get pods --all-namespaces -o wide > "/tmp/kwok-debug-artifacts/${cluster}-pods.txt" || true
          kubectl get applications -n argocd -o yaml > "/tmp/kwok-debug-artifacts/${cluster}-argo-apps.yaml" 2>/dev/null || true
          kubectl logs -n argocd deploy/argocd-repo-server --tail=500 > "/tmp/kwok-debug-artifacts/${cluster}-argo-reposerver.log" 2>/dev/null || true
          kubectl logs -n argocd statefulset/argocd-application-controller --tail=500 > "/tmp/kwok-debug-artifacts/${cluster}-argo-appcontroller.log" 2>/dev/null || true
          kubectl get ocirepositories,kustomizations,helmreleases -A -o yaml > "/tmp/kwok-debug-artifacts/${cluster}-flux-resources.yaml" 2>/dev/null || true
          kubectl logs -n flux-system deploy/source-controller --tail=500 > "/tmp/kwok-debug-artifacts/${cluster}-flux-source-controller.log" 2>/dev/null || true
          kubectl logs -n flux-system deploy/kustomize-controller --tail=500 > "/tmp/kwok-debug-artifacts/${cluster}-flux-kustomize-controller.log" 2>/dev/null || true
          kubectl logs -n flux-system deploy/helm-controller --tail=500 > "/tmp/kwok-debug-artifacts/${cluster}-flux-helm-controller.log" 2>/dev/null || true
          kubectl logs -n aicr-registry deploy/registry --tail=200 > "/tmp/kwok-debug-artifacts/${cluster}-registry.log" 2>/dev/null || true
        done

    - name: Export Kind logs
      if: failure()
      shell: bash
      run: |
        mkdir -p /tmp/kwok-kind-logs
        for cluster in $(kind get clusters 2>/dev/null); do
          kind export logs "/tmp/kwok-kind-logs/${cluster}" --name "$cluster" || true
        done

    - name: Upload debug artifacts
      if: failure() && inputs.upload_artifacts == 'true'
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
      with:
        name: kwok-debug-${{ inputs.recipe }}-${{ inputs.deployer }}-${{ github.run_id }}
        path: |
          /tmp/kwok-debug-artifacts/
          /tmp/kwok-kind-logs/
        retention-days: ${{ inputs.artifact_retention_days }}

    - name: Cleanup
      if: always()
      shell: bash
      run: |
        for cluster in $(kind get clusters 2>/dev/null); do
          kind delete cluster --name "$cluster" || true
        done
        docker system prune -f || true
