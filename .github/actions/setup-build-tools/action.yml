name: 'Setup Build Tools'
description: 'Install build, release, and testing tools (ko, syft, crane, goreleaser, chainsaw, helm, kubectl, kind, yq)'

inputs:
  install_ko:
    description: 'Install ko (true/false)'
    required: false
    default: 'false'
  ko_version:
    description: 'ko version (e.g. v0.18.0)'
    required: false
    default: 'v0.18.0'
  install_syft:
    description: 'Install syft (true/false)'
    required: false
    default: 'false'
  install_crane:
    description: 'Install crane (true/false)'
    required: false
    default: 'false'
  crane_version:
    description: 'crane version (e.g. v0.21.0)'
    required: false
    default: 'v0.21.0'
  install_goreleaser:
    description: 'Install goreleaser (true/false)'
    required: false
    default: 'false'
  goreleaser_version:
    description: 'GoReleaser version (from .settings.yaml)'
    required: false
    default: ''
  install_chainsaw:
    description: 'Install chainsaw (true/false)'
    required: false
    default: 'false'
  chainsaw_version:
    description: 'Chainsaw version (e.g. v0.2.14)'
    required: false
    default: 'v0.2.14'
  chainsaw_sha256:
    description: 'Chainsaw SHA256 checksum for linux/amd64 (from .settings.yaml)'
    required: false
    default: 'f2f4a3f9a541d65db12f5c910950758f7d56fae20ad5b1272cdc271c9568443e'
  install_helm:
    description: 'Install helm (true/false)'
    required: false
    default: 'false'
  helm_version:
    description: 'Helm version (e.g. v4.1.1)'
    required: false
    default: 'v4.1.1'
  install_kubectl:
    description: 'Install kubectl (true/false)'
    required: false
    default: 'false'
  kubectl_version:
    description: 'kubectl version (e.g. v1.35.0)'
    required: false
    default: 'v1.35.0'
  install_kind:
    description: 'Install kind (true/false)'
    required: false
    default: 'false'
  kind_version:
    description: 'Kind version (e.g. 0.31.0)'
    required: false
    default: '0.31.0'
  install_yq:
    description: 'Install yq (true/false)'
    required: false
    default: 'false'
  yq_version:
    description: 'yq version (e.g. v4.52.4)'
    required: false
    default: 'v4.52.4'

runs:
  using: 'composite'
  steps:
    - name: Install ko
      if: inputs.install_ko == 'true'
      shell: bash
      run: |
        set -euo pipefail
        # Install ko from binary release (go install puts in GOPATH which isn't in PATH)
        # Strip 'v' prefix for URL construction
        KO_VERSION="${{ inputs.ko_version }}"
        KO_VERSION="${KO_VERSION#v}"
        KO_BASE="https://github.com/ko-build/ko/releases/download/v${KO_VERSION}"
        KO_TAR="ko_${KO_VERSION}_Linux_x86_64.tar.gz"
        KO_TMP="$(mktemp -d)"
        curl -fsSL -o "${KO_TMP}/${KO_TAR}" "${KO_BASE}/${KO_TAR}"
        curl -fsSL -o "${KO_TMP}/checksums.txt" "${KO_BASE}/checksums.txt"
        EXPECTED=$(grep "${KO_TAR}" "${KO_TMP}/checksums.txt" | head -1 | awk '{print $1}')
        ACTUAL=$(sha256sum "${KO_TMP}/${KO_TAR}" | awk '{print $1}')
        if [[ "${ACTUAL}" != "${EXPECTED}" ]]; then
          echo "::error::ko checksum mismatch: expected ${EXPECTED}, got ${ACTUAL}"
          exit 1
        fi
        tar -xzf "${KO_TMP}/${KO_TAR}" -C "${KO_TMP}"
        sudo mv "$KO_TMP/ko" /usr/local/bin/ko
        sudo chmod +x /usr/local/bin/ko
        rm -rf "$KO_TMP"
        echo "ko installed: $(ko version)"

    - name: Install Syft
      if: inputs.install_syft == 'true'
      uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0

    - name: Install crane
      if: inputs.install_crane == 'true'
      shell: bash
      run: |
        set -euo pipefail
        # Install crane from binary release (go install puts in GOPATH which isn't in PATH)
        # Strip 'v' prefix for URL construction
        CRANE_VERSION="${{ inputs.crane_version }}"
        CRANE_VERSION="${CRANE_VERSION#v}"
        CRANE_BASE="https://github.com/google/go-containerregistry/releases/download/v${CRANE_VERSION}"
        CRANE_TAR="go-containerregistry_Linux_x86_64.tar.gz"
        CRANE_TMP="$(mktemp -d)"
        curl -fsSL -o "${CRANE_TMP}/${CRANE_TAR}" "${CRANE_BASE}/${CRANE_TAR}"
        curl -fsSL -o "${CRANE_TMP}/checksums.txt" "${CRANE_BASE}/checksums.txt"
        EXPECTED=$(grep "${CRANE_TAR}" "${CRANE_TMP}/checksums.txt" | head -1 | awk '{print $1}')
        ACTUAL=$(sha256sum "${CRANE_TMP}/${CRANE_TAR}" | awk '{print $1}')
        if [[ "${ACTUAL}" != "${EXPECTED}" ]]; then
          echo "::error::crane checksum mismatch: expected ${EXPECTED}, got ${ACTUAL}"
          exit 1
        fi
        tar -xzf "${CRANE_TMP}/${CRANE_TAR}" -C "${CRANE_TMP}"
        sudo mv "$CRANE_TMP/crane" /usr/local/bin/crane
        sudo chmod +x /usr/local/bin/crane
        rm -rf "$CRANE_TMP"
        echo "crane installed: $(crane version 2>&1 || echo '${{ inputs.crane_version }}')"

    - name: Validate GoReleaser version input
      if: inputs.install_goreleaser == 'true'
      shell: bash
      env:
        GORELEASER_VERSION: ${{ inputs.goreleaser_version }}
      run: |
        set -euo pipefail
        if [[ -z "${GORELEASER_VERSION}" ]]; then
          echo "::error::goreleaser_version is required when install_goreleaser=true"
          exit 1
        fi

    - name: Install GoReleaser
      if: inputs.install_goreleaser == 'true'
      uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29  # v7.0.0
      with:
        version: ${{ inputs.goreleaser_version }}
        install-only: true

    - name: Install Chainsaw
      if: inputs.install_chainsaw == 'true'
      shell: bash
      run: |
        set -euo pipefail
        if [[ -x /usr/local/bin/chainsaw ]]; then echo "chainsaw already installed"; chainsaw version; exit 0; fi
        VERSION="${{ inputs.chainsaw_version }}"
        VERSION="${VERSION#v}"
        TAR="chainsaw_linux_amd64.tar.gz"
        URL="https://github.com/kyverno/chainsaw/releases/download/v${VERSION}/${TAR}"
        EXPECTED="${{ inputs.chainsaw_sha256 }}"
        TMP="$(mktemp -d)"
        curl -fsSL -o "${TMP}/${TAR}" "${URL}"
        ACTUAL=$(sha256sum "${TMP}/${TAR}" | awk '{print $1}')
        if [[ "${ACTUAL}" != "${EXPECTED}" ]]; then
          echo "::error::chainsaw checksum mismatch: expected ${EXPECTED}, got ${ACTUAL}"
          exit 1
        fi
        tar -xzf "${TMP}/${TAR}" -C "${TMP}"
        sudo mv "${TMP}/chainsaw" /usr/local/bin/chainsaw
        sudo chmod +x /usr/local/bin/chainsaw
        rm -rf "${TMP}"
        chainsaw version

    - name: Install Helm
      if: inputs.install_helm == 'true'
      shell: bash
      run: |
        set -euo pipefail
        if [[ -x /usr/local/bin/helm ]]; then echo "helm already installed"; helm version; exit 0; fi
        HELM_VERSION="${{ inputs.helm_version }}"
        HELM_VERSION="${HELM_VERSION#v}"
        HELM_BASE="https://get.helm.sh"
        HELM_TAR="helm-v${HELM_VERSION}-linux-amd64.tar.gz"
        HELM_TMP="$(mktemp -d)"
        curl -fsSL -o "${HELM_TMP}/${HELM_TAR}" "${HELM_BASE}/${HELM_TAR}"
        curl -fsSL -o "${HELM_TMP}/${HELM_TAR}.sha256sum" "${HELM_BASE}/${HELM_TAR}.sha256sum"
        EXPECTED=$(awk '{print $1}' "${HELM_TMP}/${HELM_TAR}.sha256sum")
        ACTUAL=$(sha256sum "${HELM_TMP}/${HELM_TAR}" | awk '{print $1}')
        if [[ "${ACTUAL}" != "${EXPECTED}" ]]; then
          echo "::error::helm checksum mismatch: expected ${EXPECTED}, got ${ACTUAL}"
          exit 1
        fi
        tar -xzf "${HELM_TMP}/${HELM_TAR}" -C "${HELM_TMP}"
        sudo mv "${HELM_TMP}/linux-amd64/helm" /usr/local/bin/helm
        sudo chmod +x /usr/local/bin/helm
        rm -rf "${HELM_TMP}"
        helm version

    - name: Install kubectl
      if: inputs.install_kubectl == 'true'
      shell: bash
      run: |
        set -euo pipefail
        if [[ -x /usr/local/bin/kubectl ]]; then echo "kubectl already installed"; kubectl version --client; exit 0; fi
        ARCH=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
        curl -fsSL -o kubectl "https://dl.k8s.io/release/${{ inputs.kubectl_version }}/bin/linux/${ARCH}/kubectl"
        chmod +x kubectl
        sudo mv kubectl /usr/local/bin/kubectl
        kubectl version --client

    - name: Install Kind
      if: inputs.install_kind == 'true'
      shell: bash
      run: |
        set -euo pipefail
        if [[ -x /usr/local/bin/kind ]]; then echo "kind already installed"; kind version; exit 0; fi
        curl -fsSL -o kind "https://kind.sigs.k8s.io/dl/v${{ inputs.kind_version }}/kind-linux-amd64"
        chmod +x kind
        sudo mv kind /usr/local/bin/kind
        kind version

    - name: Install yq
      if: inputs.install_yq == 'true'
      shell: bash
      run: |
        set -euo pipefail
        if [[ -x /usr/local/bin/yq ]]; then echo "yq already installed"; yq --version; exit 0; fi
        YQ_VERSION="${{ inputs.yq_version }}"
        sudo curl -fsSL -o /usr/local/bin/yq \
          "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64"
        sudo chmod +x /usr/local/bin/yq
        yq --version
