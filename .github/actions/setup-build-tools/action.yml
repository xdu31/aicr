name: 'Setup Build Tools'
description: 'Install build, release, and testing tools (ko, syft, crane, goreleaser, chainsaw, helm, helmfile, kubectl, kind, yq, flux)'

inputs:
  install_ko:
    description: 'Install ko (true/false)'
    required: false
    default: 'false'
  ko_version:
    description: 'ko version (e.g. v0.18.0)'
    required: false
    default: 'v0.18.0'
  install_syft:
    description: 'Install syft (true/false)'
    required: false
    default: 'false'
  install_crane:
    description: 'Install crane (true/false)'
    required: false
    default: 'false'
  crane_version:
    description: 'crane version (e.g. v0.21.0)'
    required: false
    default: 'v0.21.0'
  install_goreleaser:
    description: 'Install goreleaser (true/false)'
    required: false
    default: 'false'
  goreleaser_version:
    description: 'GoReleaser version (from .settings.yaml)'
    required: false
    default: ''
  install_chainsaw:
    description: 'Install chainsaw (true/false)'
    required: false
    default: 'false'
  chainsaw_version:
    description: 'Chainsaw version (from .settings.yaml via load-versions; required when install_chainsaw=true)'
    required: false
    default: ''
  chainsaw_sha256:
    description: 'Chainsaw SHA256 checksum for linux/amd64 (from .settings.yaml via load-versions; required when install_chainsaw=true)'
    required: false
    default: ''
  install_helm:
    description: 'Install helm (true/false)'
    required: false
    default: 'false'
  helm_version:
    description: 'Helm version (e.g. v4.1.1)'
    required: false
    default: 'v4.1.1'
  install_helmfile:
    description: 'Install helmfile (true/false)'
    required: false
    default: 'false'
  helmfile_version:
    description: 'Helmfile version (e.g. v1.5.1)'
    required: false
    default: 'v1.5.1'
  helmfile_sha256:
    description: 'Helmfile SHA256 checksum for linux/amd64 (from .settings.yaml, refreshed by tools/update-helmfile-checksums)'
    required: false
    default: ''
  install_kubectl:
    description: 'Install kubectl (true/false)'
    required: false
    default: 'false'
  kubectl_version:
    description: 'kubectl version (e.g. v1.35.0)'
    required: false
    default: 'v1.35.0'
  install_kind:
    description: 'Install kind (true/false)'
    required: false
    default: 'false'
  kind_version:
    description: 'Kind version (e.g. 0.31.0)'
    required: false
    default: '0.31.0'
  install_yq:
    description: 'Install yq (true/false)'
    required: false
    default: 'false'
  yq_version:
    description: 'yq version (e.g. v4.52.4)'
    required: false
    default: 'v4.52.4'
  install_hauler:
    description: 'Install hauler (true/false)'
    required: false
    default: 'false'
  hauler_version:
    description: 'Hauler version (e.g. v1.4.3)'
    required: false
    default: ''
  install_zarf:
    description: 'Install zarf (true/false)'
    required: false
    default: 'false'
  zarf_version:
    description: 'Zarf version (e.g. v0.76.0)'
    required: false
    default: ''
  install_flux:
    description: 'Install flux CLI (true/false)'
    required: false
    default: 'false'
  flux_version:
    description: 'Flux CLI version (e.g. v2.8.7)'
    required: false
    default: ''
  install_ctlptl:
    description: 'Install ctlptl (true/false)'
    required: false
    default: 'false'
  ctlptl_version:
    description: 'ctlptl version (e.g. 0.9.3)'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Install ko
      if: inputs.install_ko == 'true'
      shell: bash
      run: |
        set -euo pipefail
        # Install ko from binary release (go install puts in GOPATH which isn't in PATH)
        # Strip 'v' prefix for URL construction
        KO_VERSION="${{ inputs.ko_version }}"
        KO_VERSION="${KO_VERSION#v}"
        KO_BASE="https://github.com/ko-build/ko/releases/download/v${KO_VERSION}"
        KO_TAR="ko_${KO_VERSION}_Linux_x86_64.tar.gz"
        KO_TMP="$(mktemp -d)"
        curl -fsSL --retry 5 --retry-delay 2 --retry-all-errors --retry-max-time 60 -o "${KO_TMP}/${KO_TAR}" "${KO_BASE}/${KO_TAR}"
        curl -fsSL --retry 5 --retry-delay 2 --retry-all-errors --retry-max-time 60 -o "${KO_TMP}/checksums.txt" "${KO_BASE}/checksums.txt"
        EXPECTED=$(grep "${KO_TAR}" "${KO_TMP}/checksums.txt" | head -1 | awk '{print $1}')
        ACTUAL=$(sha256sum "${KO_TMP}/${KO_TAR}" | awk '{print $1}')
        if [[ "${ACTUAL}" != "${EXPECTED}" ]]; then
          echo "::error::ko checksum mismatch: expected ${EXPECTED}, got ${ACTUAL}"
          exit 1
        fi
        tar -xzf "${KO_TMP}/${KO_TAR}" -C "${KO_TMP}"
        sudo mv "$KO_TMP/ko" /usr/local/bin/ko
        sudo chmod +x /usr/local/bin/ko
        rm -rf "$KO_TMP"
        echo "ko installed: $(ko version)"

    - name: Install Syft
      if: inputs.install_syft == 'true'
      uses: anchore/sbom-action/download-syft@62ad5284b8ced813296287a0b63906cb364b73ee  # v0.22.0

    - name: Install crane
      if: inputs.install_crane == 'true'
      shell: bash
      run: |
        set -euo pipefail
        # Install crane from binary release (go install puts in GOPATH which isn't in PATH)
        # Strip 'v' prefix for URL construction
        CRANE_VERSION="${{ inputs.crane_version }}"
        CRANE_VERSION="${CRANE_VERSION#v}"
        CRANE_BASE="https://github.com/google/go-containerregistry/releases/download/v${CRANE_VERSION}"
        CRANE_TAR="go-containerregistry_Linux_x86_64.tar.gz"
        CRANE_TMP="$(mktemp -d)"
        curl -fsSL --retry 5 --retry-delay 2 --retry-all-errors --retry-max-time 60 -o "${CRANE_TMP}/${CRANE_TAR}" "${CRANE_BASE}/${CRANE_TAR}"
        curl -fsSL --retry 5 --retry-delay 2 --retry-all-errors --retry-max-time 60 -o "${CRANE_TMP}/checksums.txt" "${CRANE_BASE}/checksums.txt"
        EXPECTED=$(grep "${CRANE_TAR}" "${CRANE_TMP}/checksums.txt" | head -1 | awk '{print $1}')
        ACTUAL=$(sha256sum "${CRANE_TMP}/${CRANE_TAR}" | awk '{print $1}')
        if [[ "${ACTUAL}" != "${EXPECTED}" ]]; then
          echo "::error::crane checksum mismatch: expected ${EXPECTED}, got ${ACTUAL}"
          exit 1
        fi
        tar -xzf "${CRANE_TMP}/${CRANE_TAR}" -C "${CRANE_TMP}"
        sudo mv "$CRANE_TMP/crane" /usr/local/bin/crane
        sudo chmod +x /usr/local/bin/crane
        rm -rf "$CRANE_TMP"
        echo "crane installed: $(crane version 2>&1 || echo '${{ inputs.crane_version }}')"

    - name: Validate GoReleaser version input
      if: inputs.install_goreleaser == 'true'
      shell: bash
      env:
        GORELEASER_VERSION: ${{ inputs.goreleaser_version }}
      run: |
        set -euo pipefail
        if [[ -z "${GORELEASER_VERSION}" ]]; then
          echo "::error::goreleaser_version is required when install_goreleaser=true"
          exit 1
        fi

    - name: Install GoReleaser
      if: inputs.install_goreleaser == 'true'
      uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29  # v7.0.0
      with:
        version: ${{ inputs.goreleaser_version }}
        install-only: true

    - name: Install Chainsaw
      if: inputs.install_chainsaw == 'true'
      shell: bash
      run: |
        set -euo pipefail
        if [[ -x /usr/local/bin/chainsaw ]]; then echo "chainsaw already installed"; chainsaw version; exit 0; fi
        VERSION="${{ inputs.chainsaw_version }}"
        EXPECTED="${{ inputs.chainsaw_sha256 }}"
        if [[ -z "${VERSION}" || -z "${EXPECTED}" ]]; then
          echo "::error::install_chainsaw=true requires chainsaw_version and chainsaw_sha256 (pass from load-versions outputs to keep .settings.yaml as the single source of truth)"
          exit 1
        fi
        VERSION="${VERSION#v}"
        TAR="chainsaw_linux_amd64.tar.gz"
        URL="https://github.com/kyverno/chainsaw/releases/download/v${VERSION}/${TAR}"
        TMP="$(mktemp -d)"
        curl -fsSL --retry 5 --retry-delay 2 --retry-all-errors --retry-max-time 60 -o "${TMP}/${TAR}" "${URL}"
        ACTUAL=$(sha256sum "${TMP}/${TAR}" | awk '{print $1}')
        if [[ "${ACTUAL}" != "${EXPECTED}" ]]; then
          echo "::error::chainsaw checksum mismatch: expected ${EXPECTED}, got ${ACTUAL}"
          exit 1
        fi
        tar -xzf "${TMP}/${TAR}" -C "${TMP}"
        sudo mv "${TMP}/chainsaw" /usr/local/bin/chainsaw
        sudo chmod +x /usr/local/bin/chainsaw
        rm -rf "${TMP}"
        chainsaw version

    - name: Install Helm
      if: inputs.install_helm == 'true'
      shell: bash
      run: |
        set -euo pipefail
        if [[ -x /usr/local/bin/helm ]]; then echo "helm already installed"; helm version; exit 0; fi
        HELM_VERSION="${{ inputs.helm_version }}"
        HELM_VERSION="${HELM_VERSION#v}"
        HELM_BASE="https://get.helm.sh"
        HELM_TAR="helm-v${HELM_VERSION}-linux-amd64.tar.gz"
        HELM_TMP="$(mktemp -d)"
        curl -fsSL --retry 5 --retry-delay 2 --retry-all-errors --retry-max-time 60 -o "${HELM_TMP}/${HELM_TAR}" "${HELM_BASE}/${HELM_TAR}"
        curl -fsSL --retry 5 --retry-delay 2 --retry-all-errors --retry-max-time 60 -o "${HELM_TMP}/${HELM_TAR}.sha256sum" "${HELM_BASE}/${HELM_TAR}.sha256sum"
        EXPECTED=$(awk '{print $1}' "${HELM_TMP}/${HELM_TAR}.sha256sum")
        ACTUAL=$(sha256sum "${HELM_TMP}/${HELM_TAR}" | awk '{print $1}')
        if [[ "${ACTUAL}" != "${EXPECTED}" ]]; then
          echo "::error::helm checksum mismatch: expected ${EXPECTED}, got ${ACTUAL}"
          exit 1
        fi
        tar -xzf "${HELM_TMP}/${HELM_TAR}" -C "${HELM_TMP}"
        sudo mv "${HELM_TMP}/linux-amd64/helm" /usr/local/bin/helm
        sudo chmod +x /usr/local/bin/helm
        rm -rf "${HELM_TMP}"
        helm version

    - name: Install Helmfile
      if: inputs.install_helmfile == 'true'
      shell: bash
      run: |
        set -euo pipefail
        if [[ -x /usr/local/bin/helmfile ]]; then echo "helmfile already installed"; helmfile --version; exit 0; fi
        HELMFILE_VERSION="${{ inputs.helmfile_version }}"
        HELMFILE_VERSION="${HELMFILE_VERSION#v}"
        EXPECTED="${{ inputs.helmfile_sha256 }}"
        if [[ -z "${EXPECTED}" ]]; then
          echo "::error::helmfile_sha256 input is empty — must be pinned via .settings.yaml testing_tools.helmfile_checksums.linux_amd64 (refresh with tools/update-helmfile-checksums)"
          exit 1
        fi
        HELMFILE_TAR="helmfile_${HELMFILE_VERSION}_linux_amd64.tar.gz"
        HELMFILE_URL="https://github.com/helmfile/helmfile/releases/download/v${HELMFILE_VERSION}/${HELMFILE_TAR}"
        HELMFILE_TMP="$(mktemp -d)"
        curl -fsSL --retry 5 --retry-delay 2 --retry-all-errors --retry-max-time 60 -o "${HELMFILE_TMP}/${HELMFILE_TAR}" "${HELMFILE_URL}"
        ACTUAL=$(sha256sum "${HELMFILE_TMP}/${HELMFILE_TAR}" | awk '{print $1}')
        if [[ "${ACTUAL}" != "${EXPECTED}" ]]; then
          echo "::error::helmfile checksum mismatch: expected ${EXPECTED}, got ${ACTUAL} (if upstream rotated, refresh with tools/update-helmfile-checksums v${HELMFILE_VERSION})"
          exit 1
        fi
        tar -xzf "${HELMFILE_TMP}/${HELMFILE_TAR}" -C "${HELMFILE_TMP}"
        sudo mv "${HELMFILE_TMP}/helmfile" /usr/local/bin/helmfile
        sudo chmod +x /usr/local/bin/helmfile
        rm -rf "${HELMFILE_TMP}"
        helmfile --version

    - name: Install kubectl
      if: inputs.install_kubectl == 'true'
      shell: bash
      env:
        KUBECTL_VERSION: ${{ inputs.kubectl_version }}
      run: |
        set -euo pipefail
        if [[ -x /usr/local/bin/kubectl ]]; then echo "kubectl already installed"; kubectl version --client; exit 0; fi
        ARCH=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
        BASE="https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/${ARCH}"
        TMP="$(mktemp -d)"
        curl -fsSL --retry 5 --retry-delay 2 --retry-all-errors --retry-max-time 60 -o "${TMP}/kubectl" "${BASE}/kubectl"
        curl -fsSL --retry 5 --retry-delay 2 --retry-all-errors --retry-max-time 60 -o "${TMP}/kubectl.sha256" "${BASE}/kubectl.sha256"
        EXPECTED=$(awk '{print $1}' "${TMP}/kubectl.sha256")
        ACTUAL=$(sha256sum "${TMP}/kubectl" | awk '{print $1}')
        if [[ "${ACTUAL}" != "${EXPECTED}" ]]; then
          echo "::error::kubectl checksum mismatch: expected ${EXPECTED}, got ${ACTUAL}"
          exit 1
        fi
        chmod +x "${TMP}/kubectl"
        sudo mv "${TMP}/kubectl" /usr/local/bin/kubectl
        rm -rf "${TMP}"
        kubectl version --client

    - name: Install Kind
      if: inputs.install_kind == 'true'
      shell: bash
      env:
        KIND_VERSION: ${{ inputs.kind_version }}
      run: |
        set -euo pipefail
        if [[ -x /usr/local/bin/kind ]]; then echo "kind already installed"; kind version; exit 0; fi
        BASE="https://kind.sigs.k8s.io/dl/v${KIND_VERSION}"
        TMP="$(mktemp -d)"
        curl -fsSL --retry 5 --retry-delay 2 --retry-all-errors --retry-max-time 60 -o "${TMP}/kind" "${BASE}/kind-linux-amd64"
        curl -fsSL --retry 5 --retry-delay 2 --retry-all-errors --retry-max-time 60 -o "${TMP}/kind.sha256sum" "${BASE}/kind-linux-amd64.sha256sum"
        EXPECTED=$(awk '{print $1}' "${TMP}/kind.sha256sum")
        ACTUAL=$(sha256sum "${TMP}/kind" | awk '{print $1}')
        if [[ "${ACTUAL}" != "${EXPECTED}" ]]; then
          echo "::error::kind checksum mismatch: expected ${EXPECTED}, got ${ACTUAL}"
          exit 1
        fi
        chmod +x "${TMP}/kind"
        sudo mv "${TMP}/kind" /usr/local/bin/kind
        rm -rf "${TMP}"
        kind version

    - name: Install yq
      if: inputs.install_yq == 'true'
      shell: bash
      env:
        YQ_VERSION: ${{ inputs.yq_version }}
      run: |
        set -euo pipefail
        if [[ -x /usr/local/bin/yq ]]; then echo "yq already installed"; yq --version; exit 0; fi
        BASE="https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}"
        TMP="$(mktemp -d)"
        curl -fsSL --retry 5 --retry-delay 2 --retry-all-errors --retry-max-time 60 -o "${TMP}/yq" "${BASE}/yq_linux_amd64"
        # yq publishes a multi-hash 'checksums' file paired with 'checksums_hashes_order'
        # listing column names. SHA-256 column index is derived dynamically so column
        # reordering upstream doesn't silently fall back to a weaker hash.
        curl -fsSL --retry 5 --retry-delay 2 --retry-all-errors --retry-max-time 60 -o "${TMP}/checksums" "${BASE}/checksums"
        curl -fsSL --retry 5 --retry-delay 2 --retry-all-errors --retry-max-time 60 -o "${TMP}/checksums_hashes_order" "${BASE}/checksums_hashes_order"
        HASH_ROW=$(grep -nx 'SHA-256' "${TMP}/checksums_hashes_order" | head -1 | cut -d: -f1)
        if [[ -z "${HASH_ROW}" ]]; then
          echo "::error::SHA-256 column not found in yq checksums_hashes_order"
          exit 1
        fi
        # Column 1 is the filename, then hash columns follow in header order.
        SHA256_COL=$((HASH_ROW + 1))
        EXPECTED=$(awk -v col="${SHA256_COL}" '$1 == "yq_linux_amd64" {print $col}' "${TMP}/checksums")
        if [[ -z "${EXPECTED}" ]]; then
          echo "::error::no checksum row for yq_linux_amd64 in upstream checksums"
          exit 1
        fi
        ACTUAL=$(sha256sum "${TMP}/yq" | awk '{print $1}')
        if [[ "${ACTUAL}" != "${EXPECTED}" ]]; then
          echo "::error::yq checksum mismatch: expected ${EXPECTED}, got ${ACTUAL}"
          exit 1
        fi
        chmod +x "${TMP}/yq"
        sudo mv "${TMP}/yq" /usr/local/bin/yq
        rm -rf "${TMP}"
        yq --version

    - name: Install Hauler
      if: inputs.install_hauler == 'true'
      shell: bash
      env:
        HAULER_VERSION: ${{ inputs.hauler_version }}
      run: |
        set -euo pipefail
        if [[ -x /usr/local/bin/hauler ]]; then echo "hauler already installed"; hauler version; exit 0; fi
        VERSION="${HAULER_VERSION#v}"
        BASE="https://github.com/hauler-dev/hauler/releases/download/v${VERSION}"
        TAR="hauler_${VERSION}_linux_amd64.tar.gz"
        TMP="$(mktemp -d)"
        curl -fsSL --retry 5 --retry-delay 2 --retry-all-errors --retry-max-time 60 -o "${TMP}/${TAR}" "${BASE}/${TAR}"
        curl -fsSL --retry 5 --retry-delay 2 --retry-all-errors --retry-max-time 60 -o "${TMP}/checksums.txt" "${BASE}/hauler_${VERSION}_checksums.txt"
        EXPECTED=$(grep "${TAR}" "${TMP}/checksums.txt" | head -1 | awk '{print $1}')
        ACTUAL=$(sha256sum "${TMP}/${TAR}" | awk '{print $1}')
        if [[ "${ACTUAL}" != "${EXPECTED}" ]]; then
          echo "::error::hauler checksum mismatch: expected ${EXPECTED}, got ${ACTUAL}"
          exit 1
        fi
        tar -xzf "${TMP}/${TAR}" -C "${TMP}"
        sudo mv "${TMP}/hauler" /usr/local/bin/hauler
        sudo chmod +x /usr/local/bin/hauler
        rm -rf "${TMP}"
        hauler version

    - name: Install Zarf
      if: inputs.install_zarf == 'true'
      shell: bash
      env:
        ZARF_VERSION: ${{ inputs.zarf_version }}
      run: |
        set -euo pipefail
        if [[ -x /usr/local/bin/zarf ]]; then echo "zarf already installed"; zarf version; exit 0; fi
        VERSION="${ZARF_VERSION#v}"
        BASE="https://github.com/zarf-dev/zarf/releases/download/v${VERSION}"
        BIN="zarf_v${VERSION}_Linux_amd64"
        TMP="$(mktemp -d)"
        curl -fsSL --retry 5 --retry-delay 2 --retry-all-errors --retry-max-time 60 -o "${TMP}/zarf" "${BASE}/${BIN}"
        curl -fsSL --retry 5 --retry-delay 2 --retry-all-errors --retry-max-time 60 -o "${TMP}/checksums.txt" "${BASE}/checksums.txt"
        EXPECTED=$(grep "  ${BIN}\$" "${TMP}/checksums.txt" | awk '{print $1}')
        ACTUAL=$(sha256sum "${TMP}/zarf" | awk '{print $1}')
        if [[ "${ACTUAL}" != "${EXPECTED}" ]]; then
          echo "::error::zarf checksum mismatch: expected ${EXPECTED}, got ${ACTUAL}"
          exit 1
        fi
        chmod +x "${TMP}/zarf"
        sudo mv "${TMP}/zarf" /usr/local/bin/zarf
        rm -rf "${TMP}"
        zarf version

    - name: Install Flux CLI
      if: inputs.install_flux == 'true'
      shell: bash
      env:
        FLUX_VERSION: ${{ inputs.flux_version }}
      run: |
        set -euo pipefail
        if [[ -x /usr/local/bin/flux ]]; then echo "flux already installed"; flux --version; exit 0; fi
        if [[ -z "${FLUX_VERSION}" ]]; then
          echo "::error::flux_version is required when install_flux=true"
          exit 1
        fi
        VERSION="${FLUX_VERSION#v}"
        BASE="https://github.com/fluxcd/flux2/releases/download/${FLUX_VERSION}"
        TAR="flux_${VERSION}_linux_amd64.tar.gz"
        TMP="$(mktemp -d)"
        curl -fsSL --retry 5 --retry-delay 2 --retry-all-errors --retry-max-time 60 -o "${TMP}/${TAR}" "${BASE}/${TAR}"
        curl -fsSL --retry 5 --retry-delay 2 --retry-all-errors --retry-max-time 60 -o "${TMP}/checksums.txt" "${BASE}/flux_${VERSION}_checksums.txt"
        EXPECTED=$(grep "${TAR}" "${TMP}/checksums.txt" | head -1 | awk '{print $1}')
        ACTUAL=$(sha256sum "${TMP}/${TAR}" | awk '{print $1}')
        if [[ "${ACTUAL}" != "${EXPECTED}" ]]; then
          echo "::error::flux checksum mismatch: expected ${EXPECTED}, got ${ACTUAL}"
          exit 1
        fi
        tar -xzf "${TMP}/${TAR}" -C "${TMP}"
        sudo mv "${TMP}/flux" /usr/local/bin/flux
        sudo chmod +x /usr/local/bin/flux
        rm -rf "${TMP}"
        flux --version

    - name: Install ctlptl
      if: inputs.install_ctlptl == 'true'
      shell: bash
      env:
        CTLPTL_VERSION: ${{ inputs.ctlptl_version }}
      run: |
        set -euo pipefail
        if [[ -x /usr/local/bin/ctlptl ]]; then echo "ctlptl already installed"; ctlptl version; exit 0; fi
        BASE="https://github.com/tilt-dev/ctlptl/releases/download/v${CTLPTL_VERSION}"
        TAR="ctlptl.${CTLPTL_VERSION}.linux.x86_64.tar.gz"
        TMP="$(mktemp -d)"
        curl -fsSL --retry 5 --retry-delay 2 --retry-all-errors --retry-max-time 60 -o "${TMP}/${TAR}" "${BASE}/${TAR}"
        curl -fsSL --retry 5 --retry-delay 2 --retry-all-errors --retry-max-time 60 -o "${TMP}/checksums.txt" "${BASE}/checksums.txt"
        EXPECTED=$(grep "${TAR}" "${TMP}/checksums.txt" | head -1 | awk '{print $1}')
        ACTUAL=$(sha256sum "${TMP}/${TAR}" | awk '{print $1}')
        if [[ "${ACTUAL}" != "${EXPECTED}" ]]; then
          echo "::error::ctlptl checksum mismatch: expected ${EXPECTED}, got ${ACTUAL}"
          exit 1
        fi
        tar -xzf "${TMP}/${TAR}" -C "${TMP}"
        sudo mv "${TMP}/ctlptl" /usr/local/bin/ctlptl
        sudo chmod +x /usr/local/bin/ctlptl
        rm -rf "${TMP}"
        ctlptl version
