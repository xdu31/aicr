name: 'Security Scan with Anchore'
description: 'Run Anchore/Grype vulnerability scan and upload SARIF results to GitHub Security'

inputs:
  path:
    description: 'Filesystem path to scan (mutually exclusive with image)'
    required: false
    default: '.'
  image:
    description: 'Container image to scan (mutually exclusive with path)'
    required: false
    default: ''
  severity-cutoff:
    description: 'Minimum severity to report (negligible, low, medium, high, critical)'
    required: false
    default: 'high'
  output_file:
    description: 'Output SARIF file name'
    required: false
    default: 'scan-results.sarif'
  category:
    description: 'GitHub Security category for upload'
    required: false
    default: 'anchore'

runs:
  using: 'composite'
  steps:
    - name: Run Anchore Security Scan
      id: scan
      uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2  # v7.4.0
      with:
        path: ${{ inputs.image == '' && inputs.path || '' }}
        image: ${{ inputs.image }}
        severity-cutoff: ${{ inputs.severity-cutoff }}
        output-format: sarif
        only-fixed: true
        fail-build: false
      continue-on-error: true

    - name: Check SARIF file exists
      id: check_sarif
      shell: bash
      run: |
        set -euo pipefail
        if [[ -f "${{ steps.scan.outputs.sarif }}" ]]; then
          cp "${{ steps.scan.outputs.sarif }}" "${{ inputs.output_file }}"
          echo "exists=true" >> "$GITHUB_OUTPUT"
        else
          echo "exists=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Upload SARIF to GitHub Security
      if: steps.check_sarif.outputs.exists == 'true'
      id: upload_sarif
      uses: github/codeql-action/upload-sarif@b20883b0cd1f46c72ae0ba6d1090936928f9fa30  # v4.32.0
      with:
        sarif_file: ${{ inputs.output_file }}
        category: ${{ inputs.category }}
      continue-on-error: true  # Don't fail if code scanning is unavailable

    - name: SARIF upload status
      if: steps.check_sarif.outputs.exists == 'true'
      shell: bash
      run: |
        if [[ "${{ steps.upload_sarif.outcome }}" == "failure" ]]; then
          echo "::notice::SARIF upload skipped - GitHub Advanced Security may not be enabled for this repository"
        fi
