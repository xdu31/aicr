name: 'Go Build and Release'
description: 'Setup build tools, authenticate to registry, and run release process'

inputs:
  registry:
    description: 'Container registry (e.g. ghcr.io)'
    required: false
    default: 'ghcr.io'
  ko_version:
    description: 'ko version (e.g. v0.18.0)'
    required: false
    default: 'v0.18.0'
  goreleaser_version:
    description: 'GoReleaser version (from .settings.yaml)'
    required: true
  go_licenses_version:
    description: 'go-licenses version (from .settings.yaml)'
    required: true
  homebrew_deploy_key:
    description: 'SSH deploy key for pushing Homebrew formula'
    required: false
    default: ''

outputs:
  release_outcome:
    description: 'Outcome of the release step (success/failure)'
    value: ${{ steps.release.outcome }}

runs:
  using: 'composite'
  steps:
    - name: Setup build tools
      uses: ./.github/actions/setup-build-tools
      with:
        install_ko: 'true'
        ko_version: ${{ inputs.ko_version }}
        install_syft: 'true'
        install_goreleaser: 'true'
        goreleaser_version: ${{ inputs.goreleaser_version }}

    - name: Install go-licenses
      shell: bash
      env:
        GO_LICENSES_VERSION: ${{ inputs.go_licenses_version }}
      run: |
        set -euo pipefail
        if [[ -z "${GO_LICENSES_VERSION}" ]]; then
          echo "::error::go_licenses_version input is required"
          exit 1
        fi
        # 'go install' must run outside vendor mode, otherwise it errors
        # with "cannot find module providing package". setup-go puts
        # $(go env GOPATH)/bin on PATH, so the binary is reachable from
        # later steps in this job.
        GOFLAGS= go install "github.com/google/go-licenses/v2@${GO_LICENSES_VERSION}"
        go-licenses --help >/dev/null
        echo "go-licenses installed: ${GO_LICENSES_VERSION}"

    - name: Authenticate to registry
      uses: ./.github/actions/ghcr-login
      with:
        registry: ${{ inputs.registry }}

    # Note: the Rekor v2 signing config (AICR_SIGNING_CONFIG) is fetched and
    # exported by the generate-slsa-predicate action, co-located with
    # SLSA_PREDICATE, so it is present here without a separate step. See #1650.

    - name: Build and Release
      id: release
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        GOFLAGS: -mod=vendor
        HOMEBREW_DEPLOY_KEY: ${{ inputs.homebrew_deploy_key }}
        # Repository paths are fully specified in .goreleaser.yaml kos.repositories
      run: |
        set -euo pipefail
        make release
