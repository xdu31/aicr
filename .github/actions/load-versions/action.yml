name: 'Load Versions'
description: 'Loads tool versions from .settings.yaml and Go version from .go-version'

outputs:
  go:
    description: 'Go version'
    value: ${{ steps.versions.outputs.go }}
  goreleaser:
    description: 'GoReleaser version'
    value: ${{ steps.versions.outputs.goreleaser }}
  ko:
    description: 'Ko version'
    value: ${{ steps.versions.outputs.ko }}
  crane:
    description: 'Crane version'
    value: ${{ steps.versions.outputs.crane }}
  golangci_lint:
    description: 'golangci-lint version'
    value: ${{ steps.versions.outputs.golangci_lint }}
  addlicense:
    description: 'addlicense version'
    value: ${{ steps.versions.outputs.addlicense }}
  go_licenses:
    description: 'go-licenses version'
    value: ${{ steps.versions.outputs.go_licenses }}
  kind:
    description: 'Kind version'
    value: ${{ steps.versions.outputs.kind }}
  nvkind:
    description: 'nvkind git ref'
    value: ${{ steps.versions.outputs.nvkind }}
  ctlptl:
    description: 'ctlptl version'
    value: ${{ steps.versions.outputs.ctlptl }}
  tilt:
    description: 'Tilt version'
    value: ${{ steps.versions.outputs.tilt }}
  helm:
    description: 'Helm version'
    value: ${{ steps.versions.outputs.helm }}
  helmfile:
    description: 'Helmfile version'
    value: ${{ steps.versions.outputs.helmfile }}
  helmfile_sha256_linux_amd64:
    description: 'Helmfile SHA256 checksum for linux/amd64'
    value: ${{ steps.versions.outputs.helmfile_sha256_linux_amd64 }}
  helmfile_sha256_linux_arm64:
    description: 'Helmfile SHA256 checksum for linux/arm64'
    value: ${{ steps.versions.outputs.helmfile_sha256_linux_arm64 }}
  grype:
    description: 'Grype version'
    value: ${{ steps.versions.outputs.grype }}
  cosign:
    description: 'Cosign version (must be >= v3.1.0 so DSSE attestations are logged to Rekor v2 as hashedrekord/PAE, not the legacy dsse entry type)'
    value: ${{ steps.versions.outputs.cosign }}
  yamllint:
    description: 'yamllint version'
    value: ${{ steps.versions.outputs.yamllint }}
  kubectl:
    description: 'kubectl version'
    value: ${{ steps.versions.outputs.kubectl }}
  kubelogin:
    description: 'kubelogin version'
    value: ${{ steps.versions.outputs.kubelogin }}
  kwok:
    description: 'KWOK version'
    value: ${{ steps.versions.outputs.kwok }}
  chainsaw:
    description: 'Chainsaw version'
    value: ${{ steps.versions.outputs.chainsaw }}
  chainsaw_sha256_linux_amd64:
    description: 'Chainsaw SHA256 for linux/amd64'
    value: ${{ steps.versions.outputs.chainsaw_sha256_linux_amd64 }}
  chainsaw_sha256_linux_arm64:
    description: 'Chainsaw SHA256 for linux/arm64'
    value: ${{ steps.versions.outputs.chainsaw_sha256_linux_arm64 }}
  yq:
    description: 'yq version'
    value: ${{ steps.versions.outputs.yq }}
  registry_image:
    description: 'OCI registry image (in-cluster registry for KWOK deployer-matrix CI)'
    value: ${{ steps.versions.outputs.registry_image }}
  argocd_chart:
    description: 'Argo CD Helm chart version (for KWOK deployer-matrix CI)'
    value: ${{ steps.versions.outputs.argocd_chart }}
  scaffold_chart:
    description: 'sigstore scaffold Helm chart version (for the private-Sigstore signing e2e)'
    value: ${{ steps.versions.outputs.scaffold_chart }}
  flux:
    description: 'Flux CLI version'
    value: ${{ steps.versions.outputs.flux }}
  hauler:
    description: 'Hauler version'
    value: ${{ steps.versions.outputs.hauler }}
  zarf:
    description: 'Zarf version'
    value: ${{ steps.versions.outputs.zarf }}
  coverage_threshold:
    description: 'Minimum test coverage percentage'
    value: ${{ steps.versions.outputs.coverage_threshold }}
  lint_timeout:
    description: 'Lint timeout duration'
    value: ${{ steps.versions.outputs.lint_timeout }}
  test_timeout:
    description: 'Test timeout duration'
    value: ${{ steps.versions.outputs.test_timeout }}
  kind_node_image:
    description: 'Kind node image for testing'
    value: ${{ steps.versions.outputs.kind_node_image }}
  h100_kind_node_image:
    description: 'Kind node image for H100 GPU tests'
    value: ${{ steps.versions.outputs.h100_kind_node_image }}
  gpu_operator_chart_version:
    description: 'GPU Operator Helm chart version for GPU smoke tests'
    value: ${{ steps.versions.outputs.gpu_operator_chart_version }}
  snapshot_agent_base_image:
    description: 'Base image for the snapshot agent image'
    value: ${{ steps.versions.outputs.snapshot_agent_base_image }}
  awscli:
    description: 'AWS CLI version (pip package, used by the KMS MiniStack e2e)'
    value: ${{ steps.versions.outputs.awscli }}
  ministack_image:
    description: 'MiniStack image (token-free AWS emulator for the KMS e2e)'
    value: ${{ steps.versions.outputs.ministack_image }}
  mkcert:
    description: 'mkcert version (trusted localhost TLS cert for the KMS e2e)'
    value: ${{ steps.versions.outputs.mkcert }}
  mkcert_sha256_linux_amd64:
    description: 'mkcert SHA256 for linux/amd64'
    value: ${{ steps.versions.outputs.mkcert_sha256_linux_amd64 }}
  mkcert_sha256_linux_arm64:
    description: 'mkcert SHA256 for linux/arm64'
    value: ${{ steps.versions.outputs.mkcert_sha256_linux_arm64 }}

runs:
  using: 'composite'
  steps:
    - name: Load versions from .settings.yaml
      id: versions
      shell: bash
      run: |
        set -euo pipefail

        # Languages — Go version is owned by .go-version (single source of truth)
        echo "go=$(cat .go-version)" >> $GITHUB_OUTPUT

        # Build tools
        echo "goreleaser=$(yq eval '.build_tools.goreleaser' .settings.yaml)" >> $GITHUB_OUTPUT
        echo "ko=$(yq eval '.build_tools.ko' .settings.yaml)" >> $GITHUB_OUTPUT
        echo "crane=$(yq eval '.build_tools.crane' .settings.yaml)" >> $GITHUB_OUTPUT

        # Linting
        echo "golangci_lint=$(yq eval '.linting.golangci_lint' .settings.yaml)" >> $GITHUB_OUTPUT
        echo "yamllint=$(yq eval '.linting.yamllint' .settings.yaml)" >> $GITHUB_OUTPUT
        echo "addlicense=$(yq eval '.linting.addlicense' .settings.yaml)" >> $GITHUB_OUTPUT
        echo "go_licenses=$(yq eval '.linting.go_licenses' .settings.yaml)" >> $GITHUB_OUTPUT

        # Security tools
        echo "grype=$(yq eval '.security_tools.grype' .settings.yaml)" >> $GITHUB_OUTPUT
        echo "cosign=$(yq eval '.security_tools.cosign' .settings.yaml)" >> $GITHUB_OUTPUT

        # Testing tools
        echo "kubectl=$(yq eval '.testing_tools.kubectl' .settings.yaml)" >> $GITHUB_OUTPUT
        echo "kubelogin=$(yq eval '.testing_tools.kubelogin' .settings.yaml)" >> $GITHUB_OUTPUT
        echo "kind=$(yq eval '.testing_tools.kind' .settings.yaml)" >> $GITHUB_OUTPUT
        echo "nvkind=$(yq eval '.testing_tools.nvkind' .settings.yaml)" >> $GITHUB_OUTPUT
        echo "ctlptl=$(yq eval '.testing_tools.ctlptl' .settings.yaml)" >> $GITHUB_OUTPUT
        echo "tilt=$(yq eval '.testing_tools.tilt' .settings.yaml)" >> $GITHUB_OUTPUT
        echo "helm=$(yq eval '.testing_tools.helm' .settings.yaml)" >> $GITHUB_OUTPUT
        echo "helmfile=$(yq eval '.testing_tools.helmfile' .settings.yaml)" >> $GITHUB_OUTPUT
        echo "helmfile_sha256_linux_amd64=$(yq eval '.testing_tools.helmfile_checksums.linux_amd64' .settings.yaml)" >> $GITHUB_OUTPUT
        echo "helmfile_sha256_linux_arm64=$(yq eval '.testing_tools.helmfile_checksums.linux_arm64' .settings.yaml)" >> $GITHUB_OUTPUT
        echo "kwok=$(yq eval '.testing_tools.kwok' .settings.yaml)" >> $GITHUB_OUTPUT
        echo "chainsaw=$(yq eval '.testing_tools.chainsaw' .settings.yaml)" >> $GITHUB_OUTPUT
        echo "chainsaw_sha256_linux_amd64=$(yq eval '.testing_tools.chainsaw_checksums.linux_amd64' .settings.yaml)" >> $GITHUB_OUTPUT
        echo "chainsaw_sha256_linux_arm64=$(yq eval '.testing_tools.chainsaw_checksums.linux_arm64' .settings.yaml)" >> $GITHUB_OUTPUT
        echo "yq=$(yq eval '.testing_tools.yq' .settings.yaml)" >> $GITHUB_OUTPUT
        echo "registry_image=$(yq eval '.testing_tools.registry_image' .settings.yaml)" >> $GITHUB_OUTPUT
        echo "argocd_chart=$(yq eval '.testing_tools.argocd_chart' .settings.yaml)" >> $GITHUB_OUTPUT
        echo "scaffold_chart=$(yq eval '.testing_tools.scaffold_chart' .settings.yaml)" >> $GITHUB_OUTPUT
        echo "flux=$(yq eval '.testing_tools.flux_version' .settings.yaml)" >> $GITHUB_OUTPUT
        echo "hauler=$(yq eval '.testing_tools.hauler' .settings.yaml)" >> $GITHUB_OUTPUT
        echo "zarf=$(yq eval '.testing_tools.zarf' .settings.yaml)" >> $GITHUB_OUTPUT
        echo "awscli=$(yq eval '.testing_tools.awscli' .settings.yaml)" >> $GITHUB_OUTPUT
        echo "ministack_image=$(yq eval '.testing_tools.ministack_image' .settings.yaml)" >> $GITHUB_OUTPUT
        echo "mkcert=$(yq eval '.testing_tools.mkcert' .settings.yaml)" >> $GITHUB_OUTPUT
        echo "mkcert_sha256_linux_amd64=$(yq eval '.testing_tools.mkcert_checksums.linux_amd64' .settings.yaml)" >> $GITHUB_OUTPUT
        echo "mkcert_sha256_linux_arm64=$(yq eval '.testing_tools.mkcert_checksums.linux_arm64' .settings.yaml)" >> $GITHUB_OUTPUT

        # Quality thresholds
        echo "coverage_threshold=$(yq eval '.quality.coverage_threshold' .settings.yaml)" >> $GITHUB_OUTPUT
        echo "lint_timeout=$(yq eval '.quality.lint_timeout' .settings.yaml)" >> $GITHUB_OUTPUT
        echo "test_timeout=$(yq eval '.quality.test_timeout' .settings.yaml)" >> $GITHUB_OUTPUT

        # Testing configuration
        echo "kind_node_image=$(yq eval '.testing.kind_node_image' .settings.yaml)" >> $GITHUB_OUTPUT
        echo "h100_kind_node_image=$(yq eval '.testing.h100_kind_node_image' .settings.yaml)" >> $GITHUB_OUTPUT
        echo "gpu_operator_chart_version=$(yq eval '.testing.gpu_operator_chart_version' .settings.yaml)" >> $GITHUB_OUTPUT
        echo "snapshot_agent_base_image=$(yq eval '.testing.snapshot_agent_base_image' .settings.yaml)" >> $GITHUB_OUTPUT

    - name: Display loaded versions
      shell: bash
      run: |
        set -euo pipefail
        echo "Loaded versions from .settings.yaml:"
        echo "  go: ${{ steps.versions.outputs.go }}"
        echo "  goreleaser: ${{ steps.versions.outputs.goreleaser }}"
        echo "  ko: ${{ steps.versions.outputs.ko }}"
        echo "  crane: ${{ steps.versions.outputs.crane }}"
        echo "  golangci_lint: ${{ steps.versions.outputs.golangci_lint }}"
        echo "  yamllint: ${{ steps.versions.outputs.yamllint }}"
        echo "  addlicense: ${{ steps.versions.outputs.addlicense }}"
        echo "  go_licenses: ${{ steps.versions.outputs.go_licenses }}"
        echo "  grype: ${{ steps.versions.outputs.grype }}"
        echo "  cosign: ${{ steps.versions.outputs.cosign }}"
        echo "  kubectl: ${{ steps.versions.outputs.kubectl }}"
        echo "  kubelogin: ${{ steps.versions.outputs.kubelogin }}"
        echo "  kind: ${{ steps.versions.outputs.kind }}"
        echo "  nvkind: ${{ steps.versions.outputs.nvkind }}"
        echo "  ctlptl: ${{ steps.versions.outputs.ctlptl }}"
        echo "  tilt: ${{ steps.versions.outputs.tilt }}"
        echo "  helm: ${{ steps.versions.outputs.helm }}"
        echo "  helmfile: ${{ steps.versions.outputs.helmfile }}"
        echo "  helmfile_sha256_linux_amd64: ${{ steps.versions.outputs.helmfile_sha256_linux_amd64 }}"
        echo "  helmfile_sha256_linux_arm64: ${{ steps.versions.outputs.helmfile_sha256_linux_arm64 }}"
        echo "  kwok: ${{ steps.versions.outputs.kwok }}"
        echo "  chainsaw: ${{ steps.versions.outputs.chainsaw }}"
        echo "  chainsaw_sha256_linux_amd64: ${{ steps.versions.outputs.chainsaw_sha256_linux_amd64 }}"
        echo "  chainsaw_sha256_linux_arm64: ${{ steps.versions.outputs.chainsaw_sha256_linux_arm64 }}"
        echo "  yq: ${{ steps.versions.outputs.yq }}"
        echo "  registry_image: ${{ steps.versions.outputs.registry_image }}"
        echo "  argocd_chart: ${{ steps.versions.outputs.argocd_chart }}"
        echo "  scaffold_chart: ${{ steps.versions.outputs.scaffold_chart }}"
        echo "  flux: ${{ steps.versions.outputs.flux }}"
        echo "  hauler: ${{ steps.versions.outputs.hauler }}"
        echo "  zarf: ${{ steps.versions.outputs.zarf }}"
        echo "  coverage_threshold: ${{ steps.versions.outputs.coverage_threshold }}"
        echo "  lint_timeout: ${{ steps.versions.outputs.lint_timeout }}"
        echo "  test_timeout: ${{ steps.versions.outputs.test_timeout }}"
        echo "  kind_node_image: ${{ steps.versions.outputs.kind_node_image }}"
        echo "  h100_kind_node_image: ${{ steps.versions.outputs.h100_kind_node_image }}"
        echo "  gpu_operator_chart_version: ${{ steps.versions.outputs.gpu_operator_chart_version }}"
        echo "  awscli: ${{ steps.versions.outputs.awscli }}"
        echo "  ministack_image: ${{ steps.versions.outputs.ministack_image }}"
        echo "  mkcert: ${{ steps.versions.outputs.mkcert }}"
        echo "  snapshot_agent_base_image: ${{ steps.versions.outputs.snapshot_agent_base_image }}"
