# UAT reservation registry (#1274, DC1).
#
# Each row enumerates one reserved-capacity GPU pool the day/night UAT
# broker arbitrates. The "name" is the lease key: the shared dispatch
# surface (uat-run.yaml) holds a GitHub Actions concurrency group
# "uat-<name>" so contending runs on the same reservation QUEUE instead of
# racing the hardware. New infrastructure is onboarded by adding a row
# here — no broker code change.
#
# NOTE — these values are identifiers, NOT secrets. A reservation-id (and the
# GCP project path it embeds) grants no access on its own: access to the
# reserved capacity — and to anything running on it — is governed by cloud
# IAM/ACLs bound to the CI federation identity (see infra/uat-aws-account/,
# infra/uat-gcp-account/, and infra/uat-azure-account/), not by knowledge of
# the ID. They are safe to commit; disclosure reveals only internal infra
# naming, not a way in.
#
# Fields:
#   name                human-facing reservation / lease key (must be unique)
#   cloud               aws | gcp | azure
#   reservation-id      the cloud capacity-reservation identifier; GCP uses
#                       the fully-qualified resource path (matches the value
#                       embedded in cluster-config-path verbatim); OPTIONAL —
#                       omitted for quota-backed capacity (azure), where
#                       subscription quota, not a reservation, backs the nodes
#   accelerator         GPU accelerator family on the reservation
#   gpu-count           GPUs per reserved node (forward-looking metadata)
#   cluster-config-path the github.com/mchmarny/cluster Cluster config the
#                       actuator provisions from
#   test-config-dir     directory holding the per-cloud AICRConfig test
#                       files (the ./tests/uat/<cloud>/run phase runner roots
#                       one level up, at the cluster-config)
#   nightly-intents     (optional) the recipe intents the NIGHTLY version-matrix
#                       batch (#1274, DC1) runs on this reservation, as a YAML
#                       list — [training], [inference], or [training,
#                       inference]. Absent defaults to [training] (the
#                       pre-DC3 behavior); an explicit empty list ([]) opts the
#                       reservation out of the nightly batch (bring-up mode —
#                       manual dispatch only). DC3 (#1276) sets it to [training,
#                       inference] on BOTH reservations so training and inference
#                       both run nightly on both clouds. The batch runs the
#                       intents SEQUENTIALLY within each version cell, through
#                       the same per-reservation lease (intent inner-loop,
#                       version outer-loop) — no second cron, no contention, and
#                       `main` lands both intents before any release cell. Each
#                       (version × intent) is a full provision→CUJ→teardown cell,
#                       so listing both intents roughly doubles a reservation's
#                       nightly cell count; the batch time-box drops the oldest
#                       cells first if the budget is exceeded (tune previous_n /
#                       deadline_offset_hours). Entries must be recognized and
#                       unique. Not one-per-cloud (unlike daytime-intent).
#   daytime-intent      (optional) opts this reservation into the daytime
#                       human-access rotation (#1281, DC8) and picks the
#                       flavor stood up during the working day: training |
#                       inference. Empty/absent = nightly batch only. This is
#                       the configurable cloud→flavor split — a data choice,
#                       not hardcoded in a workflow — defaulting to
#                       AWS=training, GCP=inference. Only ONE reservation per
#                       cloud may carry a daytime-intent today: a single
#                       reservation cannot hold both a long-lived daytime
#                       cluster and the nightly batch at once.
reservations:
  - name: aws-h100
    cloud: aws
    reservation-id: cr-0e16ad417f9a5bf69
    accelerator: h100
    gpu-count: 8
    cluster-config-path: tests/uat/aws/cluster-config.yaml
    test-config-dir: tests/uat/aws/tests
    nightly-intents: [training, inference]
    daytime-intent: training
  - name: gcp-h100
    cloud: gcp
    reservation-id: projects/nv-dgxcloudprod-20240108/reservations/h100-a3-mega-phase-1-general-pool-384-us-c1-reservation
    accelerator: h100
    gpu-count: 8
    cluster-config-path: tests/uat/gcp/cluster-config.yaml
    test-config-dir: tests/uat/gcp/tests
    nightly-intents: [training, inference]
    daytime-intent: inference
  - name: azure-h100
    cloud: azure
    # No reservation-id: capacity is Azure subscription QUOTA (westus
    # NDSH100v5), not a capacity reservation. The name is still the lease
    # key, so contending runs queue exactly as on the reserved clouds; a
    # quota-exhausted provision fails loudly at actuator apply time (the
    # same posture as GCP — no pre-flight capacity assertion).
    accelerator: h100
    gpu-count: 8
    cluster-config-path: tests/uat/azure/cluster-config.yaml
    test-config-dir: tests/uat/azure/tests
    # Enrolled with [training] after the green manual acceptance run
    # (29125390442: full provision → CUJ → evidence → teardown). Inference
    # joins after a green manual intent=inference dispatch — the AWS/GCP
    # rows run both, so add it here rather than removing the key (a bare
    # `nightly-intents:` decodes as absent and defaults to [training]).
    nightly-intents: [training]
