# Dynamo vLLM inference workload for ai_service_metrics evidence collection.
# Deploys a DynamoGraphDeployment with vLLM backend (Qwen/Qwen3-0.6B).
# Uses DRA ResourceClaim for GPU allocation (required on DRA-only clusters).
#
# Prerequisites:
#   - KAI Scheduler installed (provides default-parent-queue)
#   - Dynamo platform deployed (dynamo-platform with bundled CRDs)
#   - DRA driver installed (gpu.nvidia.com DeviceClass)
#
# Usage:
#   kubectl apply -f dynamo-vllm-agg.yaml
#
# Cleanup:
#   kubectl delete ns dynamo-workload

---
apiVersion: scheduling.run.ai/v2
kind: Queue
metadata:
  name: dynamo
spec:
  parentQueue: default-parent-queue
  resources:
    gpu:
      limit: -1
      overQuotaWeight: 1
      quota: 0
    cpu:
      limit: -1
      overQuotaWeight: 1
      quota: 0
    memory:
      limit: -1
      overQuotaWeight: 1
      quota: 0

---
apiVersion: v1
kind: Namespace
metadata:
  name: dynamo-workload

---
# DRA ResourceClaim for GPU allocation (required on DRA-only clusters).
# The kai.scheduler/queue label is required for KAI scheduler to manage the claim.
apiVersion: resource.k8s.io/v1
kind: ResourceClaim
metadata:
  name: vllm-gpu-claim
  namespace: dynamo-workload
  labels:
    kai.scheduler/queue: dynamo
spec:
  devices:
    requests:
      - name: gpu
        exactly:
          deviceClassName: gpu.nvidia.com
          allocationMode: ExactCount
          count: 1

---
apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: vllm-agg
  namespace: dynamo-workload
spec:
  services:
    Frontend:
      componentType: frontend
      replicas: 1
      envs:
        - name: SERVED_MODEL_NAME
          value: Qwen/Qwen3-0.6B
        - name: DYN_STORE_KV
          value: mem
        - name: DYN_EVENT_PLANE
          value: zmq
      extraPodSpec:
        nodeSelector:
          nodeGroup: cpu-worker
        tolerations:
          - key: dedicated
            operator: Equal
            value: worker-workload
            effect: NoSchedule
          - key: dedicated
            operator: Equal
            value: worker-workload
            effect: NoExecute
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/dynamo-frontend:0.9.0
    VllmDecodeWorker:
      componentType: worker
      replicas: 1
      envs:
        - name: DYN_STORE_KV
          value: mem
        - name: DYN_EVENT_PLANE
          value: zmq
      resources:
        claims:
          - name: gpu
      extraPodSpec:
        nodeSelector:
          nodeGroup: gpu-worker
        tolerations:
          - key: dedicated
            operator: Equal
            value: worker-workload
            effect: NoSchedule
          - key: dedicated
            operator: Equal
            value: worker-workload
            effect: NoExecute
          - key: nvidia.com/gpu
            operator: Exists
            effect: NoSchedule
        resourceClaims:
          - name: gpu
            resourceClaimName: vllm-gpu-claim
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:0.9.0
          workingDir: /workspace/examples/backends/vllm
          command: ["python3", "-m", "dynamo.vllm"]
          args: ["--model", "Qwen/Qwen3-0.6B"]
