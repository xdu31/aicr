# HPA Pod Autoscaling test with custom GPU metrics
# Demonstrates HPA scaling based on gpu_utilization from prometheus-adapter
# Usage: kubectl apply -f pkg/evidence/scripts/manifests/hpa-gpu-test.yaml
---
apiVersion: v1
kind: Namespace
metadata:
  name: hpa-test
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gpu-workload
  namespace: hpa-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gpu-workload
  template:
    metadata:
      labels:
        app: gpu-workload
    spec:
      restartPolicy: Always
      terminationGracePeriodSeconds: 1
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      tolerations:
        - operator: Exists
      containers:
        - name: gpu-worker
          image: nvcr.io/nvidia/cuda:12.9.0-devel-ubuntu24.04
          command: ["bash", "-c"]
          args:
            - |
              cat > /tmp/s.cu << 'EOF'
              __global__ void k(float *d, int n) {
                int i = blockIdx.x * blockDim.x + threadIdx.x;
                float v = (float)i;
                for (int j = 0; j < n; j++) v = v * v + 0.1f;
                if (i < 1) d[0] = v;
              }
              int main() {
                float *d; cudaMalloc(&d, sizeof(float));
                for (;;) { k<<<4096,256>>>(d, 1000000); cudaDeviceSynchronize(); }
              }
              EOF
              nvcc -o /tmp/s /tmp/s.cu && exec /tmp/s
          securityContext:
            readOnlyRootFilesystem: false  # nvcc writes to /tmp during compile
            allowPrivilegeEscalation: false
          resources:
            limits:
              nvidia.com/gpu: 1
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gpu-workload-hpa
  namespace: hpa-test
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gpu-workload
  minReplicas: 1
  maxReplicas: 2
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 30
  metrics:
    - type: Pods
      pods:
        metric:
          name: gpu_utilization
        target:
          type: AverageValue
          averageValue: "50"
