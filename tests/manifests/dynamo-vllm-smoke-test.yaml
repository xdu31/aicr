# Dynamo vLLM smoke test — minimal aggregated inference deployment.
# Deploys a Frontend (API gateway) and a single vLLM decode worker
# serving Qwen/Qwen3-0.6B (public, ungated, ~1.2GB).
# No HuggingFace token required.
#
# Requires DYN_STORE_KV=mem and DYN_EVENT_PLANE=zmq because etcd/nats
# are disabled in the dynamo-platform v0.9.0 deployment.
#
# Usage:
#   kubectl apply -f tests/manifests/dynamo-vllm-smoke-test.yaml -n dynamo-system
#   kubectl port-forward svc/vllm-smoke-test-frontend 8000:8000 -n dynamo-system
#   curl http://localhost:8000/v1/models
#   curl http://localhost:8000/v1/chat/completions \
#     -H "Content-Type: application/json" \
#     -d '{"model":"Qwen/Qwen3-0.6B","messages":[{"role":"user","content":"Hello!"}],"max_tokens":30,"stream":false}'

apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: vllm-smoke-test
spec:
  services:
    Frontend:
      componentType: frontend
      replicas: 1
      envs:
        - name: DYN_STORE_KV
          value: mem
        - name: DYN_EVENT_PLANE
          value: zmq
      extraPodSpec:
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/dynamo-frontend:0.9.0
    VllmDecodeWorker:
      componentType: worker
      replicas: 1
      envs:
        - name: DYN_STORE_KV
          value: mem
        - name: DYN_EVENT_PLANE
          value: zmq
      resources:
        claims:
          - name: gpu
      extraPodSpec:
        tolerations:
          - key: nvidia.com/gpu
            operator: Exists
            effect: NoSchedule
        resourceClaims:
          - name: gpu
            resourceClaimName: vllm-smoke-gpu-claim
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:0.9.0
          workingDir: /workspace/examples/backends/vllm
          command: ["python3", "-m", "dynamo.vllm"]
          args: ["--model", "Qwen/Qwen3-0.6B"]
