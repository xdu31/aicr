# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: cuj1-training-workload
spec:
  description: |
    CUJ1: Critical User Journey - Training Workload.
    Tests the complete aicr workflow from demos/cuj1-training.md:
      Step 1: recipe (with --platform kubeflow)
      Step 2: validate (deployment phase)
      Step 3: bundle (with node scheduling)
      Step 4: deploy script validation
      Step 5: multi-phase validate
    No cluster needed. Run with:
      AICR_BIN=$(pwd)/dist/e2e/aicr chainsaw test --no-cluster --test-dir tests/chainsaw/cli/cuj1-training
  timeouts:
    exec: 30s
  steps:

    # ── Step 1: Generate recipe with kubeflow platform ───────────────
    - name: generate-recipe
      description: Generate an EKS H100 training recipe with kubeflow platform.
      try:
        - script:
            content: |
              AICR_BIN="${AICR_BIN:?Set AICR_BIN to the path of the aicr binary}"
              WORK="/tmp/chainsaw-cuj1-training"
              rm -rf "${WORK}" && mkdir -p "${WORK}"
              ${AICR_BIN} recipe \
                --service eks \
                --accelerator h100 \
                --intent training \
                --os ubuntu \
                --platform kubeflow \
                --output "${WORK}/recipe.yaml"

    - name: assert-recipe
      description: Verify recipe has correct criteria, kubeflow components, and deployment order.
      try:
        - script:
            content: |
              chainsaw assert \
                --resource /tmp/chainsaw-cuj1-training/recipe.yaml \
                --file ./assert-recipe.yaml \
                --no-color --timeout 5s

    # ── Step 2: Validate recipe (deployment phase) ───────────────────
    - name: validate-deployment
      description: Run deployment validation against a mock snapshot.
      try:
        - script:
            content: |
              AICR_BIN="${AICR_BIN:?Set AICR_BIN to the path of the aicr binary}"
              WORK="/tmp/chainsaw-cuj1-training"
              ${AICR_BIN} validate \
                --recipe "${WORK}/recipe.yaml" \
                --snapshot ./mock-snapshot.yaml \
                --phase deployment \
                --no-cluster \
                --output "${WORK}/validate-deployment.json"

    - name: assert-validate-deployment
      description: Verify deployment validation produces CTRF output.
      try:
        - script:
            content: |
              WORK="/tmp/chainsaw-cuj1-training"
              test -f "${WORK}/validate-deployment.json"
              grep -q 'reportformat: CTRF' "${WORK}/validate-deployment.json" || grep -q '\"reportFormat\"' "${WORK}/validate-deployment.json"
            check:
              ($error == null): true

    # ── Step 3: Generate bundle with node scheduling ─────────────────
    - name: generate-bundle
      description: Generate a Helm bundle with system and accelerated node scheduling.
      try:
        - script:
            content: |
              AICR_BIN="${AICR_BIN:?Set AICR_BIN to the path of the aicr binary}"
              WORK="/tmp/chainsaw-cuj1-training"
              ${AICR_BIN} bundle \
                --recipe "${WORK}/recipe.yaml" \
                --output "${WORK}/bundle" \
                --system-node-selector nodeGroup=system-pool \
                --accelerated-node-selector nodeGroup=gpu-worker \
                --accelerated-node-toleration nvidia.com/gpu=present:NoSchedule

    - name: assert-bundle-structure
      description: Verify bundle contains README, deploy script, recipe, and component values.
      try:
        - script:
            content: |
              WORK="/tmp/chainsaw-cuj1-training"
              test -f "${WORK}/bundle/README.md"
              test -f "${WORK}/bundle/deploy.sh"
              test -f "${WORK}/bundle/recipe.yaml"
              # Components live in NNN-<name>/ folders (per-component bundle layout).
              ls "${WORK}"/bundle/[0-9]*/values.yaml >/dev/null 2>&1
            check:
              ($error == null): true

    - name: assert-bundle-scheduling
      description: Verify gpu-operator values.yaml has scheduling, driver, RDMA, and NFD settings.
      try:
        - script:
            content: |
              WORK="/tmp/chainsaw-cuj1-training"
              # gpu-operator is mixed (helm + manifests): values.yaml lives in the
              # upstream-helm half (NNN-gpu-operator), not the -post sibling.
              GPU_VALUES=$(ls "${WORK}"/bundle/[0-9][0-9][0-9]-gpu-operator/values.yaml 2>/dev/null \
                | grep -v -- '-gpu-operator-post' | head -1)
              [ -n "${GPU_VALUES}" ] || { echo "gpu-operator values.yaml not found" >&2; exit 1; }
              printf 'apiVersion: helm/v1\nkind: Values\n' > "${WORK}/gpu-operator-values.yaml"
              sed '/^---$/d' "${GPU_VALUES}" >> "${WORK}/gpu-operator-values.yaml"
              chainsaw assert \
                --resource "${WORK}/gpu-operator-values.yaml" \
                --file ./assert-bundle-scheduling.yaml \
                --no-color --timeout 5s

    - name: assert-bundle-scheduling-nfd
      description: Verify standalone nfd values.yaml has scheduling for master/gc/worker.
      try:
        - script:
            content: |
              WORK="/tmp/chainsaw-cuj1-training"
              NFD_VALUES=$(ls "${WORK}"/bundle/[0-9][0-9][0-9]-nfd/values.yaml 2>/dev/null | head -1)
              [ -n "${NFD_VALUES}" ] || { echo "nfd values.yaml not found" >&2; exit 1; }
              printf 'apiVersion: helm/v1\nkind: Values\n' > "${WORK}/nfd-values.yaml"
              sed '/^---$/d' "${NFD_VALUES}" >> "${WORK}/nfd-values.yaml"
              chainsaw assert \
                --resource "${WORK}/nfd-values.yaml" \
                --file ./assert-bundle-scheduling-nfd.yaml \
                --no-color --timeout 5s

    - name: assert-bundle-topology-nfd
      description: Verify standalone nfd values.yaml has Topology Updater enabled.
      try:
        - script:
            content: |
              WORK="/tmp/chainsaw-cuj1-training"
              NFD_VALUES=$(ls "${WORK}"/bundle/[0-9][0-9][0-9]-nfd/values.yaml 2>/dev/null | head -1)
              [ -n "${NFD_VALUES}" ] || { echo "nfd values.yaml not found" >&2; exit 1; }
              printf 'apiVersion: helm/v1\nkind: Values\n' > "${WORK}/nfd-values.yaml"
              sed '/^---$/d' "${NFD_VALUES}" >> "${WORK}/nfd-values.yaml"
              chainsaw assert \
                --resource "${WORK}/nfd-values.yaml" \
                --file ./assert-bundle-topology-nfd.yaml \
                --no-color --timeout 5s

    # ── Step 4: Deploy script validation ─────────────────────────────
    - name: assert-deploy-script
      description: Verify deploy.sh exists, is executable, and has correct shebang.
      try:
        - script:
            content: |
              WORK="/tmp/chainsaw-cuj1-training"
              test -f "${WORK}/bundle/deploy.sh"
              test -x "${WORK}/bundle/deploy.sh"
              head -1 "${WORK}/bundle/deploy.sh" | grep -q "#!/usr/bin/env bash"
            check:
              ($error == null): true

    # ── Step 5: Multi-phase validate ─────────────────────────────────
    - name: validate-multiphase
      description: Run all three validation phases (deployment, performance, conformance).
      try:
        - script:
            content: |
              AICR_BIN="${AICR_BIN:?Set AICR_BIN to the path of the aicr binary}"
              WORK="/tmp/chainsaw-cuj1-training"
              ${AICR_BIN} validate \
                --recipe "${WORK}/recipe.yaml" \
                --snapshot ./mock-snapshot.yaml \
                --phase deployment \
                --phase performance \
                --phase conformance \
                --no-cluster \
                --output "${WORK}/validate-multiphase.json"

    - name: assert-validate-multiphase
      description: Verify multiphase validation produces CTRF output.
      try:
        - script:
            content: |
              WORK="/tmp/chainsaw-cuj1-training"
              test -f "${WORK}/validate-multiphase.json"
              grep -q 'reportformat: CTRF' "${WORK}/validate-multiphase.json" || grep -q '\"reportFormat\"' "${WORK}/validate-multiphase.json"
            check:
              ($error == null): true
      cleanup:
        - script:
            content: |
              rm -rf /tmp/chainsaw-cuj1-training
