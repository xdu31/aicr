# Assert that the standalone NFD bundle for CUJ1 training has the
# Topology Updater enabled with the configuration required for it to
# actually function on a tainted GPU cluster:
#
#   - enable: true                    Topology Updater turned on.
#   - createCRDs: true                NRT CRD installed by the chart;
#                                     managed K8s does not preinstall it.
#   - tolerations: <gpu taint>        Bundler must inject the
#                                     --accelerated-node-toleration
#                                     so TU can land on tainted GPU
#                                     nodes (registry must declare the
#                                     scheduling path).
#   - master/gc enabled, NodeFeature  TU has no consumer if its sibling
#     API enabled                     NFD components are off.
#
# NOTE: chainsaw assert --resource requires apiVersion/kind to parse
# the YAML. Helm values files don't have these natively, so the test
# script prepends them. These two lines are not part of the actual
# values.
apiVersion: helm/v1
kind: Values

# ── Topology Updater enabled with required configuration ─────────────
topologyUpdater:
  enable: true
  createCRDs: true
  tolerations:
    - effect: NoSchedule
      key: nvidia.com/gpu
      operator: Equal
      value: present

# ── Sibling NFD components must remain enabled (TU has no consumer otherwise) ──
master:
  enable: true
gc:
  enable: true
