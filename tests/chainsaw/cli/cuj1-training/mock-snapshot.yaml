# Mock snapshot for CUJ1 testing.
# Provides minimal K8s, OS, and Helm measurements so aicr validate can run
# without a real cluster or GPU hardware. Helm data covers all components
# in the EKS H100 training recipe with kubeflow platform.
measurements:
  - type: K8s
    subtypes:
      - subtype: server
        data:
          version: v1.33.0
      - subtype: helm
        data:
          aws-ebs-csi-driver.chart: aws-ebs-csi-driver
          aws-ebs-csi-driver.version: 2.55.0
          aws-ebs-csi-driver.namespace: kube-system
          aws-efa.chart: aws-efa-k8s-device-plugin
          aws-efa.version: v0.5.26
          aws-efa.namespace: kube-system
          cert-manager.chart: cert-manager
          cert-manager.version: v1.17.2
          cert-manager.namespace: cert-manager
          gpu-operator.chart: gpu-operator
          gpu-operator.version: v25.10.1
          gpu-operator.namespace: gpu-operator
          k8s-ephemeral-storage-metrics.chart: k8s-ephemeral-storage-metrics
          k8s-ephemeral-storage-metrics.version: 1.19.2
          k8s-ephemeral-storage-metrics.namespace: monitoring
          kai-scheduler.chart: kai-scheduler
          kai-scheduler.version: v0.13.0
          kai-scheduler.namespace: kai-scheduler
          kube-prometheus-stack.chart: kube-prometheus-stack
          kube-prometheus-stack.version: 82.8.0
          kube-prometheus-stack.namespace: monitoring
          kubeflow-trainer.chart: kubeflow-trainer
          kubeflow-trainer.version: 2.1.0
          kubeflow-trainer.namespace: kubeflow
          nvidia-dra-driver-gpu.chart: nvidia-dra-driver-gpu
          nvidia-dra-driver-gpu.version: 25.12.0
          nvidia-dra-driver-gpu.namespace: nvidia-dra-driver
          nvsentinel.chart: nvsentinel
          nvsentinel.version: v0.10.0
          nvsentinel.namespace: nvsentinel
          prometheus-adapter.chart: prometheus-adapter
          prometheus-adapter.version: 5.3.0
          prometheus-adapter.namespace: monitoring
          nodewright-customizations.chart: nodewright-customizations
          nodewright-customizations.namespace: skyhook
          nodewright-operator.chart: skyhook-operator
          nodewright-operator.version: v0.14.0
          nodewright-operator.namespace: skyhook
  - type: OS
    subtypes:
      - subtype: release
        data:
          ID: ubuntu
          VERSION_ID: "24.04"
      - subtype: sysctl
        data:
          /proc/sys/kernel/osrelease: "6.8.0-1015-aws"
