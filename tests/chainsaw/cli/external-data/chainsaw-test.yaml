# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: cli-external-data
spec:
  description: |
    Validates the --data flag for external data directories.
    Tests non-existent dir, missing registry, valid custom registry,
    custom overlay, and bundle with --data.
    Replaces test_external_data_flag() in tools/e2e.
    No cluster needed.
  timeouts:
    exec: 30s
  steps:
    - name: setup-fixtures
      description: Create external data directory fixtures.
      try:
        - script:
            content: |
              AICR_BIN="${AICR_BIN:?Set AICR_BIN to the path of the aicr binary}"
              WORK="/tmp/chainsaw-external-data"
              rm -rf "${WORK}" && mkdir -p "${WORK}/empty" "${WORK}/valid" "${WORK}/with-overlay/overlays"

              cat > "${WORK}/valid/registry.yaml" << 'EOF'
              apiVersion: aicr.run/v1alpha2
              kind: ComponentRegistry
              components:
                - name: custom-operator
                  displayName: Custom Operator
                  helm:
                    defaultRepository: https://test.example.com/charts
                    defaultChart: custom/operator
                    defaultVersion: v1.0.0
              EOF

              echo 'apiVersion: aicr.run/v1alpha2
              kind: ComponentRegistry
              components: []' > "${WORK}/with-overlay/registry.yaml"

              cat > "${WORK}/with-overlay/overlays/custom.yaml" << 'EOF'
              apiVersion: aicr.run/v1alpha2
              kind: RecipeMetadata
              metadata:
                name: custom-overlay
              spec:
                criteria:
                  service: eks
                  accelerator: h100
                  intent: training
                components:
                  - name: cert-manager
                    type: Helm
                    source: https://charts.jetstack.io
                    version: v1.16.3
              EOF

              # Generate a recipe for bundle test
              ${AICR_BIN} recipe --service eks --accelerator h100 --intent training \
                -o "${WORK}/recipe.yaml"

    - name: non-existent-dir
      description: Non-existent --data directory must fail.
      try:
        - script:
            content: |
              AICR_BIN="${AICR_BIN:?Set AICR_BIN to the path of the aicr binary}"
              ${AICR_BIN} recipe --service eks --accelerator h100 --intent training \
                --data "/non/existent" -o /dev/null 2>&1
            check:
              ($error != null): true

    - name: missing-registry
      description: --data directory without registry.yaml must fail.
      try:
        - script:
            content: |
              AICR_BIN="${AICR_BIN:?Set AICR_BIN to the path of the aicr binary}"
              WORK="/tmp/chainsaw-external-data"
              ${AICR_BIN} recipe --service eks --accelerator h100 --intent training \
                --data "${WORK}/empty" -o /dev/null 2>&1
            check:
              ($error != null): true

    - name: valid-custom-registry
      description: Valid --data directory with registry.yaml succeeds.
      try:
        - script:
            content: |
              AICR_BIN="${AICR_BIN:?Set AICR_BIN to the path of the aicr binary}"
              WORK="/tmp/chainsaw-external-data"
              ${AICR_BIN} recipe --service eks --accelerator h100 --intent training \
                --data "${WORK}/valid" -o "${WORK}/data-recipe.yaml"
              test -f "${WORK}/data-recipe.yaml"
            check:
              ($error == null): true

    - name: custom-overlay
      description: --data directory with custom overlay succeeds.
      try:
        - script:
            content: |
              AICR_BIN="${AICR_BIN:?Set AICR_BIN to the path of the aicr binary}"
              WORK="/tmp/chainsaw-external-data"
              ${AICR_BIN} recipe --service eks --accelerator h100 --intent training \
                --data "${WORK}/with-overlay" -o "${WORK}/overlay-recipe.yaml"
              test -f "${WORK}/overlay-recipe.yaml"
            check:
              ($error == null): true

    - name: bundle-with-data
      description: Bundle generation with --data flag succeeds.
      try:
        - script:
            content: |
              AICR_BIN="${AICR_BIN:?Set AICR_BIN to the path of the aicr binary}"
              WORK="/tmp/chainsaw-external-data"
              ${AICR_BIN} bundle -r "${WORK}/recipe.yaml" -o "${WORK}/bundle" \
                --data "${WORK}/valid"
              test -f "${WORK}/bundle/deploy.sh"
              ls "${WORK}"/bundle/*/values.yaml >/dev/null 2>&1
            check:
              ($error == null): true
      cleanup:
        - script:
            content: |
              rm -rf /tmp/chainsaw-external-data
