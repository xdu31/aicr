# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: ai-conformance-offline
spec:
  description: |
    AI-Conformance Inference Stack — Offline Validation.
    Generates the h100-eks-ubuntu-inference-dynamo recipe and bundle,
    then asserts the recipe has correct criteria, constraints, all 15
    components, and expected deployment order.
    No cluster needed. Run with:
      AICR_BIN=$(pwd)/dist/e2e/aicr chainsaw test --no-cluster --test-dir tests/chainsaw/ai-conformance/offline
  timeouts:
    exec: 30s
  steps:

    # ── Step 1: Generate inference-dynamo recipe ───────────────────────
    - name: generate-recipe
      description: Generate an EKS H100 inference recipe with Dynamo platform.
      try:
        - script:
            content: |
              AICR_BIN="${AICR_BIN:?Set AICR_BIN to the path of the aicr binary}"
              WORK="/tmp/chainsaw-ai-conformance"
              rm -rf "${WORK}" && mkdir -p "${WORK}"
              ${AICR_BIN} recipe \
                --service eks \
                --accelerator h100 \
                --intent inference \
                --os ubuntu \
                --platform dynamo \
                --output "${WORK}/recipe.yaml"

    - name: assert-recipe
      description: Verify recipe has inference-dynamo criteria, constraints, and all 16 components.
      try:
        - script:
            content: |
              chainsaw assert \
                --resource /tmp/chainsaw-ai-conformance/recipe.yaml \
                --file ./assert-recipe.yaml \
                --no-color --timeout 5s

    # ── Step 2: Generate bundle with node scheduling ───────────────────
    - name: generate-bundle
      description: Generate a Helm bundle with system and accelerated node scheduling.
      try:
        - script:
            content: |
              AICR_BIN="${AICR_BIN:?Set AICR_BIN to the path of the aicr binary}"
              WORK="/tmp/chainsaw-ai-conformance"
              ${AICR_BIN} bundle \
                --recipe "${WORK}/recipe.yaml" \
                --output "${WORK}/bundle" \
                --system-node-selector nodeGroup=system-pool \
                --accelerated-node-selector nodeGroup=gpu-worker \
                --accelerated-node-toleration nvidia.com/gpu=present:NoSchedule

    - name: assert-bundle-structure
      description: Verify bundle contains README, deploy script, recipe, and component directories.
      try:
        - script:
            content: |
              WORK="/tmp/chainsaw-ai-conformance"
              test -f "${WORK}/bundle/README.md"
              test -f "${WORK}/bundle/deploy.sh"
              test -x "${WORK}/bundle/deploy.sh"
              test -f "${WORK}/bundle/recipe.yaml"
              # Verify all 15 component directories exist (aws-ebs-csi-driver excluded: disabled by default in EKS overlay)
              # Helm deployer now produces NNN-<component>/ numbered folders
              # (#662). Mixed components (helm + raw manifests) emit two
              # adjacent folders — the primary plus an injected "-post"
              # wrapper — so glob to the primary only by excluding "-post".
              for component in \
                aws-efa cert-manager \
                dynamo-platform grove gpu-operator \
                k8s-ephemeral-storage-metrics kai-scheduler \
                agentgateway agentgateway-crds kube-prometheus-stack \
                nvidia-dra-driver-gpu nvsentinel prometheus-adapter \
                nodewright-customizations nodewright-operator; do
                match=$(ls -d "${WORK}"/bundle/[0-9][0-9][0-9]-"${component}" 2>/dev/null | head -1)
                [ -n "${match}" ] || { echo "missing: ${component}"; exit 1; }
              done
            check:
              ($error == null): true
      cleanup:
        - script:
            content: |
              rm -rf /tmp/chainsaw-ai-conformance
