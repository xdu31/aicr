# Assert the AI-conformance inference recipe has the expected structure.
#
# Validates that `aicr recipe --service eks --accelerator h100 --intent inference
# --os ubuntu --platform dynamo` produces a valid recipe with correct criteria,
# inference-specific components (agentgateway, DRA driver, KAI scheduler, Dynamo),
# and standard GPU stack components.
kind: RecipeResult
apiVersion: aicr.nvidia.com/v1alpha1
criteria:
  service: eks
  accelerator: h100
  intent: inference
  os: ubuntu
  platform: dynamo
constraints:
  - name: K8s.server.version
    value: '>= 1.34'
  - name: OS.release.ID
    value: ubuntu
  - name: OS.release.VERSION_ID
    value: "24.04"
  - name: OS.sysctl./proc/sys/kernel/osrelease
    value: '>= 6.8'
componentRefs: ## alphabetically sorted
  - name: agentgateway
  - name: agentgateway-crds
  - name: aws-ebs-csi-driver
  - name: aws-efa
  - name: cert-manager
  - name: dynamo-platform
  - name: gpu-operator
  - name: grove
  - name: k8s-ephemeral-storage-metrics
  - name: kai-scheduler
  - name: kube-prometheus-stack
  - name: nfd
  - name: nodewright-customizations
  - name: nodewright-operator
  - name: nvidia-dra-driver-gpu
  - name: nvsentinel
  - name: prometheus-adapter
deploymentOrder:
  - agentgateway-crds
  - aws-ebs-csi-driver
  - aws-efa
  - cert-manager
  - agentgateway
  - grove
  - kube-prometheus-stack
  - k8s-ephemeral-storage-metrics
  - nfd
  - nodewright-operator
  - nodewright-customizations
  - gpu-operator
  - kai-scheduler
  - dynamo-platform
  - nvidia-dra-driver-gpu
  - nvsentinel
  - prometheus-adapter
