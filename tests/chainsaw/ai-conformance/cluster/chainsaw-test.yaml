# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: ai-conformance-cluster-health
spec:
  description: |
    AI-Conformance Inference Stack — Cluster Health Check.
    Validates that all components of the h100-eks-ubuntu-inference-dynamo recipe
    are healthy on a production cluster. This test does NOT deploy anything —
    it validates already-deployed resources.
    Prerequisites: Cluster with the AI-conformance stack deployed.
    Run with: chainsaw test --test-dir tests/chainsaw/ai-conformance/cluster
  timeouts:
    assert: 300s
  steps:

    # ── Namespaces ─────────────────────────────────────────────────────
    - name: assert-namespaces
      description: Verify all expected namespaces exist and are active.
      timeouts:
        assert: 120s
      try:
        - assert:
            file: assert-namespaces.yaml

    # ── CRDs ───────────────────────────────────────────────────────────
    - name: assert-crds
      description: Verify critical CRDs are installed (agentgateway, dynamo, GPU operator, cert-manager).
      timeouts:
        assert: 120s
      try:
        - assert:
            file: assert-crds.yaml

    # ── cert-manager ───────────────────────────────────────────────────
    - name: assert-cert-manager
      description: Verify cert-manager controller, webhook, and cainjector are available.
      try:
        - assert:
            file: ../common/assert-cert-manager.yaml

    # ── GPU Operator ───────────────────────────────────────────────────
    - name: assert-gpu-operator
      description: Verify GPU operator, ClusterPolicy, and all GPU DaemonSets are healthy.
      timeouts:
        assert: 600s
      try:
        - assert:
            file: assert-gpu-operator.yaml

    # ── Monitoring ─────────────────────────────────────────────────────
    - name: assert-monitoring
      description: Verify kube-prometheus-stack, ephemeral storage metrics, and prometheus-adapter.
      try:
        - assert:
            file: ../common/assert-monitoring.yaml

    # ── kube-system (AWS EFA) ──────────────────────────────────────────
    - name: assert-kube-system
      description: Verify AWS EFA device plugin DaemonSet is healthy.
      try:
        - assert:
            file: assert-kube-system.yaml

    # ── agentgateway ───────────────────────────────────────────────────
    - name: assert-agentgateway
      description: Verify agentgateway controller is available.
      try:
        - assert:
            file: assert-agentgateway.yaml

    # ── Skyhook ────────────────────────────────────────────────────────
    - name: assert-skyhook
      description: Verify Skyhook operator controller-manager is available.
      try:
        - assert:
            file: ../common/assert-skyhook.yaml

    # ── NVSentinel ─────────────────────────────────────────────────────
    - name: assert-nvsentinel
      description: Verify NVSentinel controller and platform connector are healthy.
      try:
        - assert:
            file: assert-nvsentinel.yaml

    # ── NVIDIA DRA Driver ──────────────────────────────────────────────
    - name: assert-dra-driver
      description: Verify DRA driver controller and kubelet plugin are healthy.
      timeouts:
        assert: 600s
      try:
        - assert:
            file: ../common/assert-dra-driver.yaml

    # ── KAI Scheduler ──────────────────────────────────────────────────
    - name: assert-kai-scheduler
      description: Verify KAI scheduler is available.
      try:
        - assert:
            file: ../common/assert-kai-scheduler.yaml

    # ── Dynamo Platform ────────────────────────────────────────────────
    - name: assert-dynamo
      description: Verify Dynamo operator, etcd, and NATS are healthy.
      try:
        - assert:
            file: assert-dynamo.yaml
