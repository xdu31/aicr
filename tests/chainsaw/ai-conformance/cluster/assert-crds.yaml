# Assert that critical CRDs are installed by the AI-conformance inference stack.
# Covers CRD-only components (agentgateway-crds) and operator-managed CRDs (dynamo-platform).

# ── GPU Operator ───────────────────────────────────────────────────────
# ClusterPolicy CRD — the GPU operator's primary configuration object
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: clusterpolicies.nvidia.com
---
# ── cert-manager ───────────────────────────────────────────────────────
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: certificates.cert-manager.io
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: issuers.cert-manager.io
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: clusterissuers.cert-manager.io
---
# ── agentgateway-crds (Gateway API + Inference Extension) ────────────
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: gateways.gateway.networking.k8s.io
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: httproutes.gateway.networking.k8s.io
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: inferencepools.inference.networking.x-k8s.io
---
# ── dynamo-platform (bundled CRDs) ────────────────────────────────────
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: dynamocomponentdeployments.nvidia.com
---
# ── Skyhook ────────────────────────────────────────────────────────────
apiVersion: apiextensions.k8s.io/v1
