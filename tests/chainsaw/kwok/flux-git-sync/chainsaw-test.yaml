# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
#
# KWOK flux-git sync gate (issue #963). Sibling of ../flux-sync/ — the
# ONLY intended divergence is step 1, which asserts the GitRepository
# source instead of the OCIRepository (chainsaw cannot template the
# resource `kind:` of an assert, so a parameterized single test is not
# an option). Steps 2-4 (Kustomization, the HelmRelease terminal-pass
# predicate, ArtifactGenerator) MUST stay byte-identical with
# flux-sync/chainsaw-test.yaml; when changing one, change both. See
# ADR-009 (docs/design/009-kwok-git-source-lanes.md).
#
# Bindings passed via `chainsaw test --set <key>=<value>`:
#   - gitRepositoryName: name of the outer GitRepository CR applied by
#     validate-scheduling.sh's flux-git branch (default "aicr-bundle").
#     Note: the bundle ALSO carries an inner GitRepository source CR with
#     a sanitized-URL name; it is not asserted by name here — the
#     error-polarity sub-step below covers it generically.
#   - kustomizationName: name of the root Kustomization wrapping the
#     bundle (`aicr-<recipe>`, set by the validate-scheduling.sh driver).
#
# Flux reconciliation is a 4-stage pipeline; each stage is its own step
# so failure diagnostics name the stage that broke:
#
#   1. GitRepository Ready  — source-controller cloned the Gitea repo.
#   2. Kustomization Ready  — kustomize-controller parsed and applied the bundle's manifests.
#   3. HelmRelease Ready    — helm-controller reconciled each release.
#   4. ArtifactGenerator    — source-watcher extracted local-chart subdirectories
#      (only when present; bundles without local charts skip this stage).
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: kwok-flux-git-sync
spec:
  description: |
    Wait for Flux reconciliation of a Git-sourced (Gitea) bundle to
    converge on the KWOK deployer matrix. Asserts each stage of the
    pipeline reaches Ready=True in sequence.
  bindings:
    # See the argocd-sync test for the $values vs bindings pattern.
    # CLI `--set <key>=<value>` populates `$values.<key>`; the bindings
    # below pull that through with a default fallback for ad-hoc runs.
    - name: gitRepositoryName
      value: ($values.gitRepositoryName || 'aicr-bundle')
    - name: kustomizationName
      value: ($values.kustomizationName || 'aicr-bundle')
  timeouts:
    # KWOK_FLUX_SYNC_TIMEOUT default (500s in the bash gate). Flux's
    # reconcile loop has longer default intervals than Argo CD's
    # controller; 8 minutes accommodates the additional latency.
    # `error` needs the same budget as `assert`: the no-failed-
    # GitRepository, all-HelmReleases, and ArtifactGenerator steps use
    # error-polarity (poll until NO resource matches the bad-state
    # predicate), and chainsaw's default error timeout is only 30s —
    # far less than a dependsOn chain needs to converge. Both are
    # overridden per-run by the driver (validate-scheduling.sh passes
    # --assert-timeout AND --error-timeout from KWOK_FLUX_SYNC_TIMEOUT).
    assert: 8m
    error: 8m
  # See the comment on the argocd-sync test: chainsaw's default cleanup
  # deletes the auto-created per-test namespace, which on KWOK stalls
  # in Terminating because there's no kube-controller-manager to
  # finalize the namespace. We create no resources ourselves, so
  # skipDelete is safe.
  skipDelete: true
  steps:
    - name: assert-gitrepository-ready
      description: |
        The outer GitRepository must reach Ready=True. Proves
        source-controller could CLONE the bundle repo from the in-cluster
        Gitea (anonymous HTTP read of a public push-to-create repo, branch
        main). This is the Git-source regression surface — flux-oci covers
        the same class of bug for the OCI artifact path. A second
        error-polarity assertion then requires that NO GitRepository in
        flux-system is non-Ready, which covers the bundle's INNER
        sanitized-name source CR (rendered into sources/gitrepo-*.yaml by
        the bundler from --repo) without having to reproduce the Go
        sanitizeSourceName() naming in the test driver. The inner source
        exists by the time this matters: it only affects HelmRelease
        chart resolution, which step 3 gates on anyway.
      try:
        - assert:
            # Flux v2.x serves GitRepository under source.toolkit.fluxcd.io/v1
            # (same group/version the bundler templates emit at
            # pkg/bundler/deployer/flux/templates/gitrepo-source.yaml.tmpl).
            resource:
              apiVersion: source.toolkit.fluxcd.io/v1
              kind: GitRepository
              metadata:
                name: ($gitRepositoryName)
                namespace: flux-system
              status:
                (conditions[?type=='Ready']|[0].status == 'True'): true
      catch:
        - script:
            content: |
              echo "--- GitRepositories ---"
              kubectl get gitrepository -A 2>&1 || true
              kubectl get gitrepository -n flux-system -o yaml 2>&1 || true
              echo "--- source-controller (tail=200) ---"
              kubectl logs -n flux-system deploy/source-controller --tail=200 2>&1 || true
              echo "--- gitea (tail=100) ---"
              kubectl logs -n aicr-registry deploy/gitea --tail=100 2>&1 || true

    - name: assert-no-gitrepository-failed
      description: |
        No GitRepository in flux-system may sit in a non-Ready state once
        the outer source is Ready. Catches the bundle's inner
        sanitized-name GitRepository source (URL typo, branch mismatch,
        private-repo regression) without naming it. Error polarity:
        passes on zero matches, fails when any GitRepository is
        not Ready=True.
      try:
        - error:
            resource:
              apiVersion: source.toolkit.fluxcd.io/v1
              kind: GitRepository
              metadata:
                namespace: flux-system
              status:
                (conditions[?type=='Ready']|[0].status != 'True'): true
      catch:
        - script:
            content: |
              echo "--- GitRepositories ---"
              kubectl get gitrepository -A 2>&1 || true
              kubectl get gitrepository -n flux-system -o yaml 2>&1 || true
              echo "--- source-controller (tail=200) ---"
              kubectl logs -n flux-system deploy/source-controller --tail=200 2>&1 || true

    - name: assert-kustomization-ready
      description: |
        Kustomization must reach Ready=True. Proves kustomize-controller
        could PARSE the bundle's root kustomization.yaml and APPLY all
        manifests (no template-render bugs, no missing files, no schema
        violations).
      try:
        - assert:
            resource:
              apiVersion: kustomize.toolkit.fluxcd.io/v1
              kind: Kustomization
              metadata:
                name: ($kustomizationName)
                namespace: flux-system
              status:
                (conditions[?type=='Ready']|[0].status == 'True'): true
      catch:
        - script:
            content: |
              echo "--- Kustomizations ---"
              kubectl get kustomization -A 2>&1 || true
              kubectl get kustomization -n flux-system -o yaml 2>&1 || true
              echo "--- kustomize-controller (tail=200) ---"
              kubectl logs -n flux-system deploy/kustomize-controller --tail=200 2>&1 || true

    - name: assert-all-helmreleases-ready
      description: |
        All HelmReleases must reach a terminal pass state. The accepted
        pass set mirrors the bash wait_for_flux_sync contract:
          1. Ready=True
                — canonical pass.
          2. Released=True + history[0].status=='deployed' + Stalled!=True
                — terminal fallback for KWOK lanes where helm-controller
                installed the chart successfully but the Ready condition
                lags (KWOK pod readiness sim gap, mirroring the argocd
                Progressing arm). The Stalled gate prevents masking a
                genuinely failed reconcile that left a stale Released
                from a prior revision.
        Encoded as existence + error-polarity pair: a name-less chainsaw
        `assert` passes when ANY resource matches (exists semantics), so
        a single Ready HelmRelease would short-circuit the gate while a
        dependsOn chain is still converging (observed on the flux-git
        lane: 1 Ready + 12 dependency-blocked HRs passed instantly).
        The `error` op has the inverse semantics — it polls until NO
        resource matches the bad-state predicate — which is the actual
        "all HelmReleases terminal" contract. The bare assert in front
        keeps the existence check the old assert provided implicitly
        (zero HelmReleases must fail, not pass vacuously).
      try:
        # Without metadata.namespace chainsaw scopes the resource
        # selector to the auto-created per-test temp namespace
        # (where no HelmReleases exist). The bundler places every
        # HelmRelease in the Flux install namespace — flux-system
        # by default, set via the Generator's Namespace field at
        # pkg/bundler/deployer/flux/flux.go.
        - assert:
            resource:
              apiVersion: helm.toolkit.fluxcd.io/v2
              kind: HelmRelease
              metadata:
                namespace: flux-system
        # negation of the terminal-pass predicate above:
        # NOT (Ready==True || (Released==True && deployed && !Stalled))
        #   = Ready!=True && (Released!=True || !deployed || Stalled==True)
        - error:
            resource:
              apiVersion: helm.toolkit.fluxcd.io/v2
              kind: HelmRelease
              metadata:
                namespace: flux-system
              status:
                ((conditions[?type=='Ready']|[0].status != 'True') && ((conditions[?type=='Released']|[0].status != 'True') || (history|[0].status != 'deployed') || (conditions[?type=='Stalled']|[0].status == 'True'))): true
      catch:
        - script:
            content: |
              echo "--- HelmReleases (name / namespace / Ready) ---"
              kubectl get helmrelease -A -o json 2>/dev/null \
                | jq -r '.items[] | {
                    name: .metadata.name,
                    namespace: .metadata.namespace,
                    ready: (.status.conditions // [] | map(select(.type=="Ready")) | .[0] // {})
                  }' \
                2>&1 || true
              echo "--- helm-controller (tail=200) ---"
              kubectl logs -n flux-system deploy/helm-controller --tail=200 2>&1 || true

    - name: assert-all-artifactgenerators-ready
      description: |
        When ArtifactGenerator CRs exist (local-chart bundles), they must
        reach Ready=True. Proves source-watcher extracted local-chart
        sub-directories from the bundle into ExternalArtifacts that
        helm-controller can consume. Regression surface for issue #964.
        Step is a no-op when zero ArtifactGenerators exist — and on the
        flux-git lane that is the EXPECTED steady state: with a
        filesystem --output the bundler references local charts through
        the GitRepository source directly (chart: ./<dir>) and emits no
        ArtifactGenerators. Kept identical to flux-sync anyway so the
        two gates cannot drift.
      try:
        # Inverted polarity vs assert: error matches if ANY resource
        # satisfies the predicate. We want "no ArtifactGenerator in a
        # non-Ready state", which:
        #   - PASSES on zero AGs (pure-Helm bundles don't emit them).
        #   - PASSES when every AG is Ready=True.
        #   - FAILS when any AG is missing the Ready=True condition.
        # Chainsaw's `assert:` fails on zero-match, so we'd need a
        # pre-existence check to make it conditional — `error:` is
        # the cleaner expression of the same semantics.
        #
        # ArtifactGenerator lives under source.extensions.fluxcd.io
        # (extension API). The bundler emits this group/version at
        # pkg/bundler/deployer/flux/templates/artifactgenerator.yaml.tmpl;
        # namespace is the Flux install namespace (flux-system).
        - error:
            resource:
              apiVersion: source.extensions.fluxcd.io/v1beta1
              kind: ArtifactGenerator
              metadata:
                namespace: flux-system
              status:
                (conditions[?type=='Ready']|[0].status != 'True'): true
      catch:
        - script:
            content: |
              echo "--- ArtifactGenerators ---"
              kubectl get artifactgenerator -A 2>&1 || true
              kubectl get artifactgenerator -A -o yaml 2>&1 || true
              echo "--- source-watcher (tail=200) ---"
              kubectl logs -n flux-system deploy/source-watcher --tail=200 2>&1 \
                || kubectl logs -n flux-system statefulset/source-watcher --tail=200 2>&1 \
                || true
