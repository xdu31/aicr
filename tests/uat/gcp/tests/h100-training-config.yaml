# AICRConfig consumed by `aicr {snapshot,recipe,bundle,validate} --config`.
#
# Drives the GKE H100 training UAT — codifies the workflow demonstrated in
# `demos/cuj1-training.md` (GKE config-driven section) against the cluster provisioned by
# `../cluster-config.yaml`. Scheduling fields match that cluster's node
# labels/taints.
#
# `spec.validate.evidence.attestation.push` carries the stable repo prefix
# only; `../run` appends `-${RUN_ID}` at runtime so each UAT execution
# publishes evidence to a uniquely traceable OCI repo.
kind: AICRConfig
apiVersion: aicr.nvidia.com/v1alpha1
metadata:
  name: gke-h100-training-uat

spec:
  snapshot:
    output:
      path: snapshot.yaml
    agent:
      namespace: aicr-validation
      nodeSelector:
        nodeGroup: gpu-worker
      tolerations:
        - dedicated=gpu-workload:NoSchedule
        - nvidia.com/gpu=present:NoSchedule

  recipe:
    criteria:
      service: gke
      accelerator: h100
      os: cos
      intent: training
      platform: kubeflow
    output:
      path: recipe.yaml

  bundle:
    input:
      recipe: recipe.yaml
    output:
      target: ./bundle
    deployment:
      deployer: helmfile
    scheduling:
      acceleratedNodeSelector:
        nodeGroup: gpu-worker
      acceleratedNodeTolerations:
        - dedicated=gpu-workload:NoSchedule
        - nvidia.com/gpu=present:NoSchedule
      systemNodeSelector:
        nodeGroup: system-worker
      # GKE pd-ssd-backed default; matches the UAT GPU node disk type.
      storageClass: premium-rwo

  validate:
    input:
      recipe: recipe.yaml
      snapshot: snapshot.yaml
    agent:
      namespace: aicr-validation
      tolerations:
        - dedicated=gpu-workload:NoSchedule
        - nvidia.com/gpu=present:NoSchedule
    evidence:
      attestation:
        # Setting `out` enables emit. The push target below is the stable
        # repo prefix; ../run appends `-${RUN_ID}` for per-run isolation.
        out: ./evidence
        push: ghcr.io/nvidia/aicr-uat-gke-h100-training
