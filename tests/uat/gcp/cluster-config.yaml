apiVersion: github.com/mchmarny/cluster/v1alpha1
kind: Cluster

deployment:
  id: aicr-uat
  provider: gke
  tenancy: eidosx
  location: us-central1
  state: tenancy
  destroy: false
  tags:
    env: demo

cluster:
  gke:
    version: "1.35"
    controlPlane:
      authorizedNetworks:
        - cidr: 216.228.127.128/30
          name: hq
        - cidr: 52.41.222.58/32
          name: nw1
        - cidr: 54.68.11.139/32
          name: nw2
        - cidr: 128.77.49.32/30
          name: nw3

network:
  gke:
    subnets:
      nodes:
        - name: system-subnet
          cidr: "10.0.0.0/22"
        - name: worker-subnet
          cidr: "10.0.128.0/17"
    gpuNets:
      count: 8
      mtu: 8244
      cidrBase: "192.168.0.0/16"
      # No gvnicCidr: an extra gVNIC additional network on an a3-megagpu-8g GPU
      # pool has no free PCI slot, so it takes a GPU-NIC slot (0000:06:00.0) and
      # displaces gpu-nic-7 onto a virtio slot. RxDM then detects only 7/8 GPU
      # NICs in the PCI tree, exits 1, and never binds its UDS, so NCCL fails
      # with "connect() 111: Connection refused" on NET/FasTrak. Nothing here
      # consumes the gVNIC network. See docs/integrator/gke-tcpxo-networking.md.
    firewallRules:
      # Allows all intra-VPC TCP/UDP/ICMP from 10.0.0.0/8, which covers node
      # subnets and the GKE pod secondary ranges. NATS (4222) is already
      # permitted by this rule, so no dedicated allow-nats rule is needed.
      - name: nccl-internal
        direction: INGRESS
        priority: 900
        sourceRanges:
          - "10.0.0.0/8"
        allowed:
          - protocol: tcp
          - protocol: udp
          - protocol: icmp

compute:
  gke:
    nodePools:
      system:
        machineType: e2-standard-4
        autoscaling:
          enabled: true
          minNodes: 1
          maxNodes: 3
        nodeConfig:
          labels:
            nodeGroup: system-worker
            dedicated: system-workload

      workers:
        - name: cpu-worker
          machineType: n2-standard-8
          diskType: pd-ssd
          diskSizeGb: 200
          zones:
            - us-central1-c
          autoscaling:
            enabled: true
            minNodes: 1
            maxNodes: 1
          nodeConfig:
            labels:
              nodeGroup: cpu-worker
              dedicated: user-workload

        - name: gpu-worker
          machineType: a3-megagpu-8g
          diskType: pd-ssd
          diskSizeGb: 200
          zones:
            - us-central1-c
          autoscaling:
            # Two GPU nodes: activates the multi-node NCCL East-West fabric
            # check (nccl-all-reduce-bw, which skips on a single GPU node) and
            # lets the TrainJob (numNodes: 2) span both nodes. Drawn from the
            # 384-node general-pool reservation below, so no capacity gate.
            enabled: true
            minNodes: 2
            maxNodes: 2
          guestAccelerator:
            type: nvidia-h100-mega-80gb
            count: 8
            gpuDriverInstallation:
              gpuDriverVersion: DEFAULT
          nodeConfig:
            gvnic: true
            capacityReservations:
              - projects/nv-dgxcloudprod-20240108/reservations/h100-a3-mega-phase-1-general-pool-384-us-c1-reservation
            taints:
              - key: dedicated
                value: gpu-workload
                effect: NO_SCHEDULE
            labels:
              nodeGroup: gpu-worker
              dedicated: user-workload
