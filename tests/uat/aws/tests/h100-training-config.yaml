# AICRConfig consumed by `aicr {snapshot,recipe,bundle,validate} --config`.
#
# Drives the EKS H100 training UAT — codifies the workflow demonstrated in
# `demos/cuj1-training.md` (EKS section) against the cluster provisioned by
# `../cluster-config.yaml`.
#
# Scheduling note: the EKS actuator auto-applies `dedicated=worker-workload`
# taints to GPU nodes and `dedicated=system-workload` taints to system
# nodes (both NoSchedule + NoExecute), even though the cluster-config.yaml
# does not declare them. The taint *value* intentionally differs from the
# `dedicated` *label* on the node (`user-workload` / `system-workload`) —
# label drives scheduling targeting, the unrelated taint key drives
# admission, per the demo. Tolerations below must match the actual taints,
# not the labels.
#
# `spec.validate.evidence.attestation.push` carries the stable repo prefix
# only; `../run` appends `-${RUN_ID}` at runtime so each UAT execution
# publishes evidence to a uniquely traceable OCI repo.
kind: AICRConfig
apiVersion: aicr.nvidia.com/v1alpha1
metadata:
  name: eks-h100-training-uat

spec:
  snapshot:
    output:
      path: snapshot.yaml
    agent:
      namespace: aicr-validation
      nodeSelector:
        nodeGroup: gpu-worker
      tolerations:
        - dedicated=worker-workload:NoSchedule
        - dedicated=worker-workload:NoExecute
        - nvidia.com/gpu=present:NoSchedule

  recipe:
    criteria:
      service: eks
      accelerator: h100
      os: ubuntu
      intent: training
      platform: kubeflow
    output:
      path: recipe.yaml

  bundle:
    input:
      recipe: recipe.yaml
    output:
      target: ./bundle
    deployment:
      deployer: helmfile
    scheduling:
      acceleratedNodeSelector:
        nodeGroup: gpu-worker
      acceleratedNodeTolerations:
        - dedicated=worker-workload:NoSchedule
        - dedicated=worker-workload:NoExecute
        - nvidia.com/gpu=present:NoSchedule
      systemNodeSelector:
        nodeGroup: system-worker
      systemNodeTolerations:
        - dedicated=system-workload:NoSchedule
        - dedicated=system-workload:NoExecute
      # EKS default backed by the EBS CSI driver. Matches the UAT cluster.
      storageClass: gp3

  validate:
    execution:
      # The deployment phase is the readiness barrier (gpu-operator ClusterPolicy
      # reaches state=ready, the DRA kubelet-plugin DaemonSet rolls out, nodewright
      # node tuning completes). failFast stops the run if that phase fails, so the
      # conformance/performance phases are not evaluated against a not-yet-converged
      # cluster — which previously surfaced as misleading accelerator-metrics /
      # ai-service-metrics / pod-autoscaling failures. The `../run` readiness gate
      # gives the operator-driven stack time to converge before validate, so on a
      # healthy cluster the deployment phase passes and all phases still run.
      failFast: true
    input:
      recipe: recipe.yaml
      snapshot: snapshot.yaml
    agent:
      namespace: aicr-validation
      tolerations:
        - dedicated=worker-workload:NoSchedule
        - dedicated=worker-workload:NoExecute
        - nvidia.com/gpu=present:NoSchedule
    evidence:
      attestation:
        # Setting `out` enables emit. The push target below is the stable
        # repo prefix; ../run appends `-${RUN_ID}` for per-run isolation.
        out: ./evidence
        push: ghcr.io/nvidia/aicr-uat-eks-h100-training
