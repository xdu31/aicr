apiVersion: github.com/mchmarny/cluster/v1alpha1
kind: Cluster

deployment:
  id: aicr-uat
  provider: eks
  tenancy: "615299774277"
  location: us-east-1
  state: tenancy
  destroy: false
  tags:
    env: dev

cluster:
  eks:
    version: "1.35"
    adminRoles:
      - AWSReservedSSO_CS-Admin_55d42b5a9a2a8c35
    controlPlane:
      allowedCidrs:
        - 216.228.127.128/30
        - 52.41.222.58/32
        - 54.68.11.139/32
        - 128.77.49.32/30
    addOns:
      coreDns: ""
      kubeProxy: ""
      vpcCni: ""

network:
  eks:
    cidrs:
      host: 10.0.0.0/16
      pod: 100.65.0.0/16
    subnets:
      public:
        - cidr: 10.0.1.0/27
          zone: us-east-1a
        - cidr: 10.0.2.0/27
          zone: us-east-1c
      system:
        - cidr: 10.0.4.0/22
          zone: us-east-1a
        - cidr: 10.0.8.0/22
          zone: us-east-1c
      worker:
        - cidr: 10.0.128.0/17
          zone: us-east-1e
          disableEndpoints: true
      pod:
        - cidr: 100.65.0.0/16
          zone: us-east-1e
          disableEndpoints: true
    securityGroups:
      additionalRules:
        - target: system
          direction: ingress
          fromPort: 4222
          toPort: 4222
          protocol: tcp
          # VPC-CNI does not SNAT in-VPC pod-to-pod traffic, so NATS on the
          # system node sees the pod source IP (pod subnet), not the node IP.
          cidrBlocks: ["10.0.128.0/17", "100.65.0.0/16"]  # worker node + pod subnet CIDRs
          description: "Allow NATS from worker nodes and pods"

compute:
  eks:
    nodeGroups:
      system:
        instanceType: m7i.xlarge
        capacity:
          desired: 3
        labels:
          nodeGroup: system-worker
          dedicated: system-workload
      workers:
        - name: gpu-worker
          instanceType: p5.48xlarge
          capacity:
            # Two GPU nodes: activates the multi-node NCCL East-West fabric
            # check (nccl-all-reduce-bw, which skips on a single GPU node) and
            # lets the TrainJob (numNodes: 2) span both nodes. Requires the
            # capacity reservation below to hold >=2 p5.48xlarge instances —
            # the post-lease capacity assertion in uat-aws.yaml fails closed
            # otherwise.
            desired: 2
            reservation:
              preference: capacity-reservations-only
              target: cr-0cbe491320188dfa6
          labels:
            nodeGroup: gpu-worker
            dedicated: user-workload
          taints:
            - key: skyhook.nvidia.com
              value: runtime-required
              effect: NoSchedule
