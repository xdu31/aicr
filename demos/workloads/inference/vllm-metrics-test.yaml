# Standalone vLLM inference server with Prometheus ServiceMonitor.
# Used for CNCF AI Conformance ai_service_metrics evidence collection.
#
# Deploys vLLM serving Qwen/Qwen3-0.6B with a GPU requested via the device
# plugin (nvidia.com/gpu) and a ServiceMonitor for Prometheus auto-discovery.
#
# Prerequisites:
#   - NVIDIA device plugin installed (nvidia.com/gpu resource)
#   - Prometheus with ServiceMonitor support (kube-prometheus-stack)
#
# Intended for device-plugin-mode clusters (full-GPU DRA disabled — the
# recommended configuration in docs/integrator/aks-gpu-setup.md and the
# post-#1327 production default). On a DUAL-advertised cluster (full-GPU DRA
# and device plugin both on), the scalar request schedules but the two
# allocators keep independent ledgers: if other workloads hold GPUs through
# gpu.nvidia.com ResourceClaims, this pod's plugin-assigned GPU may collide
# with a claim-held device. Prefer a quiet node or a device-plugin-mode
# cluster. On DRA-only clusters (device plugin disabled) this pod is
# unschedulable.
#
# Usage:
#   kubectl apply -f vllm-metrics-test.yaml
#   # Wait for pod to be ready, then send requests:
#   kubectl exec -n vllm-metrics-test vllm-server -- python3 -c "
#     import urllib.request, json
#     req = urllib.request.Request('http://localhost:8000/v1/completions',
#         data=json.dumps({'model': 'Qwen/Qwen3-0.6B', 'prompt': 'Hello', 'max_tokens': 20}).encode(),
#         headers={'Content-Type': 'application/json'})
#     print(json.loads(urllib.request.urlopen(req).read())['choices'][0]['text'])"
#
# Cleanup:
#   kubectl delete ns vllm-metrics-test

---
apiVersion: v1
kind: Namespace
metadata:
  name: vllm-metrics-test

---
# Service name must NOT be "vllm" — Kubernetes injects VLLM_PORT env var
# from service discovery, which conflicts with vLLM's own VLLM_PORT env var.
apiVersion: v1
kind: Service
metadata:
  name: vllm-inference
  namespace: vllm-metrics-test
  labels:
    app: vllm-inference
spec:
  selector:
    app: vllm-inference
  ports:
    - name: http
      port: 8000
      targetPort: 8000

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: vllm-inference
  namespace: vllm-metrics-test
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app: vllm-inference
  endpoints:
    - port: http
      path: /metrics
      interval: 15s

---
apiVersion: v1
kind: Pod
metadata:
  name: vllm-server
  namespace: vllm-metrics-test
  labels:
    app: vllm-inference
spec:
  restartPolicy: Never
  securityContext:
    # vLLM/PyTorch requires root — getpass.getuser() fails without /etc/passwd entry,
    # and the upstream image does not define a non-root user.
    runAsNonRoot: false
    seccompProfile:
      type: RuntimeDefault
  tolerations:
    - operator: Exists
  containers:
    - name: vllm
      image: vllm/vllm-openai:v0.18.0
      args: ["--model", "Qwen/Qwen3-0.6B", "--port", "8000"]
      env:
        - name: HF_HOME
          value: /.cache/huggingface
        - name: VLLM_CACHE_ROOT
          value: /.cache/vllm
      ports:
        - containerPort: 8000
      securityContext:
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
      volumeMounts:
        - name: hf-cache
          mountPath: /root/.cache
        - name: tmp
          mountPath: /tmp
      resources:
        requests:
          cpu: "1"
          memory: 4Gi
        limits:
          cpu: "4"
          memory: 16Gi
          nvidia.com/gpu: 1
  volumes:
    - name: hf-cache
      emptyDir: {}
    - name: tmp
      emptyDir: {}
