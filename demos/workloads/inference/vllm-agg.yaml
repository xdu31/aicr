# Prerequisites:
#   - KAI Scheduler installed (provides default-parent-queue)
#   - Dynamo platform deployed (dynamo-crds + dynamo-platform)
#
# NOTE (#1327 / PR 3 scope): this manifest deliberately KEEPS DRA
# ResourceClaims. It is a user-facing static entry point applied as-is, and
# today's default (dual-advertised) clusters schedule it through kai, which
# rejects scalar device-plugin GPU requests on nodes bearing raw node-local GPU ResourceSlices —
# a scalar conversion would break it there, while keeping main's DRA form is
# zero regression in either direction. Its device-plugin conversion lands
# atomically with PR 3's recipe flip (ComputeDomain-only default).

---
# KAI Scheduler queue for Dynamo workloads
apiVersion: scheduling.run.ai/v2
kind: Queue
metadata:
  name: dynamo
spec:
  parentQueue: default-parent-queue
  resources:
    gpu:
      limit: -1
      overQuotaWeight: 1
      quota: 0
    cpu:
      limit: -1
      overQuotaWeight: 1
      quota: 0
    memory:
      limit: -1
      overQuotaWeight: 1
      quota: 0

---
apiVersion: v1
kind: Namespace
metadata:
  name: dynamo-workload

---
# DRA ResourceClaim for GPU allocation (required on DRA-only clusters).
# The kai.scheduler/queue label is required for KAI scheduler to manage the claim.
apiVersion: resource.k8s.io/v1
kind: ResourceClaim
metadata:
  name: vllm-gpu-claim
  namespace: dynamo-workload
  labels:
    kai.scheduler/queue: dynamo
spec:
  devices:
    requests:
      - name: gpu
        exactly:
          deviceClassName: gpu.nvidia.com
          allocationMode: ExactCount
          count: 1

---
apiVersion: nvidia.com/v1beta1
kind: DynamoGraphDeployment
metadata:
  name: vllm-agg
  namespace: dynamo-workload
spec:
  backendFramework: vllm
  components:
    - name: Frontend
      type: frontend
      replicas: 1
      podTemplate:
        spec:
          nodeSelector:
            nodeGroup: cpu-worker
          tolerations:
            - key: dedicated
              operator: Equal
              value: worker-workload
              effect: NoSchedule
            - key: dedicated
              operator: Equal
              value: worker-workload
              effect: NoExecute
          containers:
            - name: main
              image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.2.1
              env:
                - name: SERVED_MODEL_NAME
                  value: Qwen/Qwen3-0.6B
                - name: DYN_ROUTER_MODE
                  value: kv
    - name: VllmDecodeWorker
      type: worker
      replicas: 1
      sharedMemorySize: 2Gi
      podTemplate:
        spec:
          nodeSelector:
            nodeGroup: gpu-worker
          tolerations:
            - key: dedicated
              operator: Equal
              value: worker-workload
              effect: NoSchedule
            - key: dedicated
              operator: Equal
              value: worker-workload
              effect: NoExecute
            - key: nvidia.com/gpu
              operator: Exists
              effect: NoSchedule
          resourceClaims:
            - name: gpu
              resourceClaimName: vllm-gpu-claim
          containers:
            - name: main
              image: nvcr.io/nvidia/ai-dynamo/vllm-runtime:1.2.1
              workingDir: /workspace/examples/backends/vllm
              command: ["python3", "-m", "dynamo.vllm"]
              args:
                - --model
                - Qwen/Qwen3-0.6B
                - --kv-events-config
                - '{"enable_kv_cache_events":true,"publisher":"zmq","endpoint":"tcp://*:5557"}'
              resources:
                claims:
                  - name: gpu
